<!DOCTYPE html>
<html lang="fa">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>بازی گردونه سفارشی</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
            direction: rtl;
            text-align: center;
            overflow: hidden;
            position: relative;
            height: 100vh;
        }

        .header {
            background-color: black;
            color: white;
            padding: 15px 0;
            font-size: 20px;
            font-weight: bold;
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        .oval {
            position: absolute;
            width: 120px;
            height: 50px;
            background-color: lightgray;
            border-radius: 25px;
            line-height: 50px;
            font-weight: bold;
            text-align: center;
        }

        .oval.left {
            top: 60px;
            left: 20px;
        }

        .oval.right {
            top: 60px;
            right: 20px;
            cursor: pointer;
        }

        .wheel-container {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 300px;
            height: 300px;
        }

        .wheel {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            position: relative;
            background-image: url('Picsart_24-11-20_02-55-22-285.png');
            background-size: cover;
            background-position: center;
            transform: rotate(0deg);
            transition: transform 3s ease-out;
        }

        .pointer {
            width: 0;
            height: 0;
            border-left: 15px solid transparent;
            border-right: 15px solid transparent;
            border-bottom: 30px solid red;
            position: absolute;
            top: -40px;
            left: 50%;
            transform: translateX(-50%);
        }

        .spin-button {
            position: absolute;
            top: 75%;
            left: 50%;
            transform: translateX(-50%);
            width: 150px;
            height: 50px;
            border-radius: 25px;
            background-color: blue;
            color: white;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            border: none;
        }

        .result {
            margin-top: 20px;
            font-size: 18px;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <div class="header">بازی گردونه سفارشی</div>

    <div class="oval left" id="user-info">کاربر</div>
    <div class="oval right" onclick="showPrizes()">جوایز</div>

    <div class="wheel-container">
        <div class="pointer"></div>
        <div class="wheel" id="wheel"></div>
    </div>

    <button class="spin-button" id="spin-btn" onclick="spinWheel()">چرخاندن</button>

    <div class="result" id="result"></div>

    <script>
        let spinning = false;
        const prizeChances = [
            { angle: 360, prize: 30, chance: 35 }, // 30 سکه، 35 درصد
            { angle: 60, prize: 60, chance: 35 }, // 60 سکه، 35 درصد
            { angle: 120, prize: 90, chance: 20 }, // 90 سکه، 20 درصد
            { angle: 180, prize: 120, chance: 10 }, // 120 سکه، 10 درصد
            { angle: 240, prize: 150, chance: 10 }, // 150 سکه، 10 درصد
            { angle: 300, prize: 180, chance: 10 }, // 180 سکه، 10 درصد
        ];

        function spinWheel() {
            if (spinning) return;
            spinning = true;

            const spinBtn = document.getElementById("spin-btn");
            const wheel = document.getElementById("wheel");
            const result = document.getElementById("result");
            result.textContent = "";

            spinBtn.disabled = true;

            // انتخاب جایزه بر اساس شانس‌ها
            const selectedPrize = selectPrize();
            const randomSpin = selectedPrize.angle + 3600; // اضافه کردن چند دور کامل
            wheel.style.transform = `rotate(${randomSpin}deg)`;

            setTimeout(() => {
                result.textContent = `شما ${selectedPrize.prize} سکه بردید!`;
                spinBtn.disabled = false;
                spinning = false;
            }, 3000);
        }

        function selectPrize() {
            const random = Math.random() * 100;
            let cumulativeChance = 0;

            for (const prize of prizeChances) {
                cumulativeChance += prize.chance;
                if (random <= cumulativeChance) {
                    return prize;
                }
            }

            return prizeChances[0]; // پیش‌فرض، اگر هیچ جایزه‌ای انتخاب نشد
        }
    </script>
</body>
</html>
