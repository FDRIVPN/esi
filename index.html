<!DOCTYPE html>
<html lang="fa">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>سکه مجانی</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
            direction: rtl;
            text-align: center;
            overflow: hidden;
            position: relative;
            height: 100vh;
        }

        /* صفحه بارگذاری */
        

        .input-container {
            position: absolute;
            top: 40%;
            left: 50%;
            transform: translateX(-50%);
            width: 80%;
            max-width: 400px;
            background-color: #d3d3d3;
            padding: 20px;
            border-radius: 50px;
            text-align: center;
        }

        .input-box {
            width: 100%;
            padding: 10px;
            margin: 10px 0;
            border-radius: 50px;
            border: 1px solid #ccc;
            background-color: white;
        }

        .confirm-button {
            background-color: green;
            color: white;
            padding: 10px 20px;
            font-size: 18px;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            width: 100%;
        }

        .spin-button {
            position: absolute;
            bottom: -70px;
            left: 50%;
            transform: translateX(-50%);
            width: 150px;
            height: 50px;
            border-radius: 50px;
            font-size: 18px;
            font-weight: bold;
            text-align: center;
            line-height: 50px;
            background-color: gray;
            color: white;
            cursor: pointer;
            border: none;
            display: none;
        }

        .spin-button:hover {
            background-color: darkgray;
        }

        .timer {
            display: none;
            font-size: 20px;
            color: black;
        }

        .wheel-container {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 300px;
            height: 300px;
        }

        .wheel {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            position: relative;
            background-image: url('wheel.png'); /* Replace with your image */
            background-size: cover;
            background-position: center;
            transform: rotate(0deg);
            transition: transform 3s ease-out;
        }

        .pointer {
            width: 0;
            height: 0;
            border-left: 15px solid transparent;
            border-right: 15px solid transparent;
            border-bottom: 30px solid red;
            position: absolute;
            top: -40px;
            left: 50%;
            transform: translateX(-50%);
        }

        .oval {
            position: absolute;
            width: 120px;
            height: 50px;
            background-color: lightgray;
            border-radius: 25px;
            line-height: 50px;
            font-weight: bold;
            text-align: center;
        }

        .oval.left {
            top: 10px;
            left: 20px;
        }

        .oval.right {
            top: 10px;
            right: 20px;
        }

        .result {
            margin-top: 20px;
            font-size: 18px;
            font-weight: bold;
        }

        .hidden {
            display: none;
        }

        /* Menu Styles */
        #menu {
            position: absolute;
            top: 20%;
            left: 50%;
            transform: translateX(-50%);
            background-color: #f4f4f4;
            border-radius: 25px;
            padding: 20px;
            width: 80%;
            max-width: 400px;
            display: none;
            text-align: center;
        }

        .menu-item {
            background-color: lightblue;
            padding: 10px;
            margin: 5px 0;
            border-radius: 25px;
            cursor: pointer;
        }
        
        .menu-item:hover {
            background-color: lightgray;
        }
    </style>
</head>
<body>
    <!-- صفحه بارگذاری -->
    
    <!-- بیضی‌ها و گردونه -->
    <div class="oval left hidden" id="user-info"></div>
    <div class="oval right hidden" id="coins-info">
        <span id="coins-text">0 سکه بردی</span>
    </div>

    <!-- صفحه ورود شناسه -->
    <div class="input-container" id="input-container">
        <input type="text" id="user-id" class="input-box" placeholder="شناسه خود را وارد کنید" />
        <button class="confirm-button" onclick="confirmUserId()">تایید</button>
    </div>

    <!-- صفحه گردونه -->
    <div class="wheel-container" id="wheel-container" style="display: none;">
        <div class="pointer"></div>
        <div class="wheel" id="wheel"></div>
        <button class="spin-button" id="spin-btn" onclick="spinWheel()">چرخاندن</button>
        <div class="timer" id="timer"></div>
        <div class="result" id="result" style="display: none;"></div>
    </div>

    <!-- Menu -->
    <div id="menu">
        <div class="menu-item">بازی‌ها</div>
        <div class="menu-item">سکه‌های من</div>
        <div class="menu-item">اضافه اسم</div>
        <div class="menu-item">تغییر شناسه</div>
        <div class="menu-item">کمک گیری</div>
        <div class="menu-item">گزارشات</div>
        <div class="menu-item">گزارشات متداول</div>
    </div>

    <script>
        let spinning = false;
        const prizeChances = [
            { angle: 0, prize: 30, chance: 70 },
            { angle: 15, prize: 60, chance: 15 },
            { angle: 45, prize: 90, chance: 2.5 },
            { angle: 75, prize: 120, chance: 2.5 },
            { angle: 105, prize: 150, chance: 2.5 },
            { angle: 135, prize: 180, chance: 2.5 },
        ];

        let lastSpinTime = localStorage.getItem('lastSpinTime');
        let coins = parseInt(localStorage.getItem('coins')) || 0;
        const userId = localStorage.getItem('userId');
        const allowedUsers = ['داسی']; // فقط DASI بدون تایمر
        const restrictedUsers = ['ASI', 'ZALA']; // کاربران محدود برای دسترسی به سایت

        // بررسی ورود کاربران مجاز
        if (!allowedUsers.includes(userId) && !restrictedUsers.includes(userId)) {
            document.body.innerHTML = "<h1>کاربر عزیز سایت در حال بروزرسانی است لطفا بعدا دوباره تلاش کنید.</h1>";
            throw new Error("کاربر مجاز نیست.");
        }

        function confirmUserId() {
    const inputUserId = document.getElementById('user-id').value.trim();
    if (inputUserId && !userId) {
        localStorage.setItem('userId', inputUserId);
        localStorage.setItem('coins', 0);
        localStorage.setItem('lastSpinTime', null);
        loadWheelPage(); // مستقیماً صفحه گردونه را بارگذاری کنید
    } else if (!inputUserId) {
        alert("لطفا شناسه خود را وارد کنید.");
    } else {
        alert("شما قبلاً شناسه وارد کرده‌اید.");
    }
}

       
        function loadWheelPage() {
            hideLoadingScreen();
            document.getElementById('input-container').style.display = 'none';
            document.getElementById('wheel-container').style.display = 'block';

            updateUserInfo();
            setupMenuButton();
        }

        function updateUserInfo() {
            document.getElementById('user-info').textContent = "کاربر: " + userId;
            document.getElementById('coins-info').textContent = coins + " سکه";
            document.getElementById('user-info').classList.remove('hidden');
            document.getElementById('coins-info').classList.remove('hidden');
        }

        function setupMenuButton() {
            const menuButton = document.createElement('button');
            menuButton.textContent = 'منو';
            menuButton.onclick = toggleMenu;
            menuButton.style.position = 'absolute';
            menuButton.style.top = '10px';
            menuButton.style.left = '10px';
            document.body.appendChild(menuButton);
        }

        function toggleMenu() {
            const menu = document.getElementById('menu');
            if (menu.style.display === 'none' || !menu.style.display) {
                menu.style.display = 'block';
            } else {
                menu.style.display = 'none';
            }
        }

        function spinWheel() {
            if (spinning) return;
            spinning = true;
            const randomAngle = Math.floor(Math.random() * 360);
            const prize = prizeChances.find(prize => randomAngle >= prize.angle && randomAngle < (prize.angle + 30));
            const totalRotation = 3600 + randomAngle; // چرخش نهایی

            document.getElementById('wheel').style.transform = `rotate(${totalRotation}deg)`;

            // اعمال جوایز
            setTimeout(() => {
                alert(`شما ${prize.prize} سکه بردید!`);
                coins += prize.prize;
                localStorage.setItem('coins', coins);
                document.getElementById('coins-info').textContent = coins + " سکه";
                spinning = false;
            }, 3000); // زمان تا پایان چرخش
        }

    </script>
</body>
</html>
