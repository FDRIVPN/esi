<!DOCTYPE html>
<html lang="fa">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>بازی گردونه سفارشی</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
            direction: rtl;
            text-align: center;
            overflow: hidden;
            position: relative;
            height: 100vh;
        }

        .oval {
            position: absolute;
            width: 120px;
            height: 50px;
            background-color: lightgray;
            border-radius: 25px;
            line-height: 50px;
            font-weight: bold;
            text-align: center;
        }

        .oval.left {
            top: 10px;
            left: 20px;
        }

        .oval.right {
            top: 10px;
            right: 20px;
            cursor: pointer;
        }

        .input-container {
            position: absolute;
            top: 40%;
            left: 50%;
            transform: translateX(-50%);
            text-align: center;
        }

        .input-box {
            width: 200px;
            padding: 10px;
            margin: 10px;
            border-radius: 10px;
            border: 1px solid #ccc;
        }

        .confirm-button {
            background-color: green;
            color: white;
            padding: 10px 20px;
            font-size: 18px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
        }

        .wheel-container {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 300px;
            height: 300px;
        }

        .wheel {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            position: relative;
            background-image: url('Picsart_24-11-20_02-55-22-285.png');
            background-size: cover;
            background-position: center;
            transform: rotate(0deg);
            transition: transform 3s ease-out;
        }

        .pointer {
            width: 0;
            height: 0;
            border-left: 15px solid transparent;
            border-right: 15px solid transparent;
            border-bottom: 30px solid red;
            position: absolute;
            top: -40px;
            left: 50%;
            transform: translateX(-50%);
        }

        .spin-button {
            position: absolute;
            top: 75%;
            left: 50%;
            transform: translateX(-50%);
            width: 150px;
            height: 50px;
            border-radius: 25px;
            background-color: blue;
            color: white;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            border: none;
        }

        .result {
            margin-top: 20px;
            font-size: 18px;
            font-weight: bold;
        }

        .score-page {
            padding: 20px;
            text-align: center;
        }

        .score-header {
            font-size: 22px;
            font-weight: bold;
        }

        .iranian-date {
            font-size: 18px;
            margin-top: 10px;
        }

        .back-button {
            background-color: blue;
            color: white;
            padding: 10px 20px;
            font-size: 18px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            margin-top: 20px;
        }
    </style>
</head>
<body>

    <!-- Ovals for User Info and Prizes -->
    <div class="oval left" id="user-info">کاربر</div>
    <div class="oval right" onclick="openScorePage()">جوایز</div>

    <!-- Coins won display -->
    <div class="oval" id="coins-info" style="top: 10px; left: 150px;">
        <span id="coins-text">0 سکه بردی</span>
    </div>

    <!-- Input container to enter User ID -->
    <div class="input-container" id="input-container">
        <input type="text" id="user-id" class="input-box" placeholder="شناسه خود را وارد کنید" />
        <button class="confirm-button" onclick="confirmUserId()">تایید</button>
    </div>
    
    <!-- Wheel and Spin Button (hidden initially) -->
    <div class="wheel-container" id="wheel-container" style="display: none;">
        <div class="pointer"></div>
        <div class="wheel" id="wheel"></div>
    </div>
    
    <button class="spin-button" id="spin-btn" onclick="spinWheel()" style="display: none;">چرخاندن</button>

    <div class="result" id="result" style="display: none;"></div>

    <script>
        let spinning = false;
        let totalCoins = 0; // Track total coins won
        const prizeChances = [
            { angle: 360, prize: 30, chance: 35 }, // 30 سکه، 35 درصد
            { angle: 60, prize: 60, chance: 35 }, // 60 سکه، 35 درصد
            { angle: 120, prize: 90, chance: 20 }, // 90 سکه، 20 درصد
            { angle: 180, prize: 120, chance: 10 }, // 120 سکه، 10 درصد
            { angle: 240, prize: 150, chance: 10 }, // 150 سکه، 10 درصد
            { angle: 300, prize: 180, chance: 10 }, // 180 سکه، 10 درصد
        ];

        // Handle user ID confirmation
        function confirmUserId() {
            const userId = document.getElementById('user-id').value.trim();
            if (userId) {
                localStorage.setItem('userId', userId);
                document.getElementById('user-info').textContent = userId;
                document.getElementById('input-container').style.display = 'none';
                document.getElementById('wheel-container').style.display = 'block';
                document.getElementById('spin-btn').style.display = 'inline-block';
            } else {
                alert("لطفا شناسه خود را وارد کنید.");
            }
        }

        function spinWheel() {
            if (spinning) return;
            spinning = true;

            const spinBtn = document.getElementById("spin-btn");
            const wheel = document.getElementById("wheel");
            const result = document.getElementById("result");
            result.textContent = "";

            spinBtn.disabled = true;

            // انتخاب جایزه بر اساس شانس‌ها
            const selectedPrize = selectPrize();
            const randomSpin = selectedPrize.angle + 3600; // اضافه کردن چند دور کامل
            wheel.style.transform = `rotate(${randomSpin}deg)`;

            setTimeout(() => {
                result.textContent = `شما ${selectedPrize.prize} سکه بردید!`;
                totalCoins += selectedPrize.prize;
                document.getElementById("coins-text").textContent = `${totalCoins} سکه بردی`;
                spinBtn.disabled = false;
                spinning = false;
            }, 3000);
        }

        function selectPrize() {
            const random = Math.random() * 100;
            let cumulativeChance = 0;

            for (const prize of prizeChances) {
                cumulativeChance += prize.chance;
                if (random <= cumulativeChance) {
                    return prize;
                }
            }

            return prizeChances[0]; // پیش‌فرض، اگر هیچ جایزه‌ای انتخاب نشد
        }

        // Navigate to score page
        function openScorePage() {
            const userId = localStorage.getItem('userId');
            if (userId) {
                window.location.href = `scorePage.html?userId=${userId}&coins=${totalCoins}`;
            }
        }
    </script>

</body>
</html>
