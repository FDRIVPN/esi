<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Coin Game</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            height: 100vh;
            font-family: sans-serif;
            background-color: black; /* پس‌زمینه پیش‌فرض */
        }
        #gameCanvas, #coin {
            width: 350px;
            height: 350px;
            cursor: pointer;
            display: none; /* به طور پیش‌فرض مخفی است */
        }
        #score {
            font-size: 30px;
            color: white;
            display: none; /* به طور پیش‌فرض مخفی است */
        }
        #inactiveMessage {
            font-size: 24px;
            color: white;
            display: none; /* به طور پیش‌فرض مخفی است */
        }
    </style>
</head>
<body>

<div id="score">Score: 0</div>
<img id="coin" src="ggg.png" alt="Coin">
<div id="inactiveMessage">This system is currently inactive. Manager ID: 765041693</div>

<script src="https://telegram.org/js/telegram-web-app.js"></script>
<script>
    const managerId = "765041693"; // ID مدیر
    const scoreElement = document.getElementById('score');
    const coinElement = document.getElementById('coin');
    const inactiveMessage = document.getElementById('inactiveMessage');

    // بررسی اطلاعات کاربر از تلگرام
    Telegram.WebApp.ready();
    const userId = Telegram.WebApp.initDataUnsafe.user ? Telegram.WebApp.initDataUnsafe.user.id : null;

    // اگر کاربر مدیر است، صفحه بازی را نمایش بده
    if (userId == managerId) {
        document.body.style.backgroundImage = 'url("background.png")';  // پس‌زمینه مخصوص مدیر
        scoreElement.style.display = 'block';
        coinElement.style.display = 'block';
    } else {
        // اگر کاربر مدیر نیست، صفحه غیرفعال را نمایش بده
        inactiveMessage.style.display = 'block';
    }

    // امتیازدهی در صورت کلیک روی سکه
    let score = parseInt(localStorage.getItem('score')) || 0;
    coinElement.addEventListener('click', function() {
        score++;
        localStorage.setItem('score', score);
        scoreElement.textContent = `Score: ${score}`;
    });

    // نمایش امتیاز اولیه
    scoreElement.textContent = `Score: ${score}`;
</script>

</body>
</html>
