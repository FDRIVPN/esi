<!DOCTYPE html>
<html lang="fa">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Coin Game</title>
    <style>
        html, body {
            background-color: black;
            margin: 0;
            font-family: Arial, sans-serif;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: flex-start;
            align-items: center;
        }

        #score-container {
            position: relative;
            top: 20px;
            color: white;
            font-size: 36px; /* کاهش اندازه متن */
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
        }

        .decorative-oval {
            position: relative;
            width: 300px; /* طول بیضی */
            height: 30px; /* ارتفاع بیضی */
            background-color: white; /* رنگ سفید */
            border-radius: 15px; /* گرد کردن گوشه‌ها */
            margin-top: 10px; /* فاصله بین بیضی‌ها */
        }

        #ovals-container {
            margin-top: 100px; /* فاصله از متن امتیاز */
            display: flex;
            flex-direction: column; /* قرار دادن بیضی‌ها به صورت ستونی */
            align-items: center; /* وسط چین کردن بیضی‌ها */
        }

        #showMore {
            margin-top: 10px;
            color: white;
            cursor: pointer;
            font-size: 20px; /* اندازه متن "Show More" */
            display: none; /* مخفی بودن اولیه */
        }

        .arrow {
            display: inline-block;
            margin-left: 5px;
            transform: rotate(180deg); /* چرخاندن فلش به سمت پایین */
        }

        #content {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 24px;
            text-align: center;
        }

        #comingSoon {
            display: none;
        }

        #bottom-bar {
            position: fixed;
            bottom: 0;
            width: 100%;
            height: 70px;
            background-color: #1a1a1a;
            display: flex;
            justify-content: space-around;
            align-items: center;
        }

        .icon-container {
            text-align: center;
            cursor: pointer;
            transition: color 0.3s, font-weight 0.3s;
            outline: none; /* حذف نوار آبی */
            -webkit-tap-highlight-color: transparent; /* حذف نوار آبی در موبایل */
        }

        .icon-container img {
            width: 20px;
            height: 20px;
        }

        .icon-container p {
            margin: 2px 0 0 0;
            font-size: 14px;
            font-weight: 300;
            display: none;
        }

        .active img {
            transform: scale(1.2);
        }

        .active p {
            color: white;
            font-weight: 700;
            display: block;
        }

        .icon-container:not(.active) img {
            transform: scale(1);
        }
    </style>
</head>
<body>
    <div id="score-container">
        <img src="tortles.png" alt="Tortles" style="width: 50px; height: 50px;">
        <div id="score-content">
            <span id="userScore">0</span>
            <span style="margin-left: 10px;">tortles</span>
        </div>
    </div>

    <div id="ovals-container">
        <!-- بیضی‌ها در اینجا اضافه می‌شوند -->
    </div>

    <div id="showMore">
        Show More <span class="arrow">▼</span>
    </div>

    <div id="content">
        <div id="homeContent"></div>
        <div id="comingSoon">Coming Soon...</div>
    </div>

    <div id="bottom-bar">
        <div class="icon-container active" id="icon1" tabindex="0">
            <img src="image11.png" alt="Home" id="icon1Img"> <!-- تغییر تصویر به image11 -->
            <p>Home</p>
        </div>
        <div class="icon-container" id="icon2" tabindex="0">
            <img src="image3.png" alt="Leaderboard" id="icon2Img">
            <p>Leaderboard</p>
        </div>
        <div class="icon-container" id="icon3" tabindex="0">
            <img src="image2.png" alt="Friend" id="icon3Img">
            <p>Friend</p>
        </div>
    </div>

    <script>
        const icon1 = document.getElementById('icon1');
        const icon2 = document.getElementById('icon2');
        const icon3 = document.getElementById('icon3');
        const scoreElement = document.getElementById('userScore');
        const scoreContainer = document.getElementById('score-container');
        const ovalsContainer = document.getElementById('ovals-container');
        const showMore = document.getElementById('showMore');

        let score = parseInt(localStorage.getItem('score')) || 0;
        scoreElement.textContent = score;

        let showAll = false; // وضعیت نشان دادن همه بیضی‌ها

        function createOvals() {
            // اضافه کردن بیضی‌ها
            for (let i = 0; i < 10; i++) {
                const oval = document.createElement('div');
                oval.classList.add('decorative-oval');
                oval.style.display = i < 5 ? 'block' : 'none'; // نمایش فقط ۵ بیضی اولیه
                ovalsContainer.appendChild(oval);
            }
        }

        function updateShowMore() {
            showMore.style.display = 'block'; // نمایش متن "Show More"
            showMore.textContent = showAll ? 'Show Less ▲' : 'Show More ▼'; // تغییر متن بر اساس وضعیت
        }

        function toggleOvals() {
            showAll = !showAll; // معکوس کردن وضعیت
            const ovals = ovalsContainer.querySelectorAll('.decorative-oval');
            ovals.forEach((oval, index) => {
                oval.style.display = showAll || index < 5 ? 'block' : 'none'; // تغییر نمایش بیضی‌ها
            });
            updateShowMore(); // بروزرسانی متن "Show More"
        }

        function showContent(contentId) {
            document.getElementById('homeContent').style.display = 'none';
            document.getElementById('comingSoon').style.display = 'none';
            ovalsContainer.innerHTML = ''; // پاک کردن بیضی‌ها

            const selectedContent = document.getElementById(contentId);
            selectedContent.style.display = 'block';
            selectedContent.style.opacity = 0;
            setTimeout(() => {
                selectedContent.style.transition = 'opacity 0.5s';
                selectedContent.style.opacity = 1;
            }, 10);

            if (contentId === 'homeContent') {
                scoreContainer.style.display = 'flex';
                createOvals(); // ایجاد بیضی‌ها فقط در صفحه Home
                updateShowMore(); // بروزرسانی وضعیت "Show More"
            } else {
                scoreContainer.style.display = 'none';
                showMore.style.display = 'none'; // مخفی کردن "Show More" در سایر صفحات
            }
        }

        function activateIcon(icon, newImageSrc, contentId) {
            document.querySelectorAll('.icon-container').forEach(el => {
                el.classList.remove('active');
                const img = el.querySelector('img');
                if (el.id === 'icon1') {
                    img.src = 'image1.png'; // تغییر به تصویر اولیه
                } else if (el.id === 'icon2') {
                    img.src = 'image3.png';
                } else if (el.id === 'icon3') {
                    img.src = 'image2.png';
                }
                el.querySelector('p').style.display = 'none';
            });

            icon.classList.add('active');
            icon.querySelector('img').src = newImageSrc; // تغییر به تصویر جدید
            icon.querySelector('p').style.display = 'block';
            showContent(contentId);
        }

        icon1.addEventListener('click', () => {
            activateIcon(icon1, 'image11.png', 'homeContent'); // تصویر icon1 به image11 تغییر کرد
            scoreElement.textContent = score;
        });

        icon2.addEventListener('click', () => {
            activateIcon(icon2, 'image22.png', 'comingSoon');
            scoreElement.textContent = score;
        });

        icon3.addEventListener('click', () => {
            activateIcon(icon3, 'image33.png', 'comingSoon');
            scoreElement.textContent = score;
        });

        showMore.addEventListener('click', toggleOvals); // افزودن رویداد برای کلیک
