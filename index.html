<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Coin Game</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: black;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            height: 100vh;
        }
        #coin {
            width: 350px;
            height: 350px;
            cursor: pointer;
        }
        #score {
            position: absolute;
            top: 20px;
            left: 20px;
            display: flex;
            align-items: center;
        }
        #score img {
            width: 50px;
            height: 50px;
            margin-right: 10px;
        }
        #score span {
            font-size: 30px;
            color: white;
            font-family: sans-serif;
        }
        .no-highlight {
            -webkit-tap-highlight-color: transparent;
        }
        #user-info {
            display: none; /* فقط برای مدیر */
            position: absolute;
            bottom: 20px;
            left: 20px;
            background-color: rgba(0, 0, 0, 0.7);
            padding: 10px;
            color: white;
            font-family: sans-serif;
        }
    </style>
</head>
<body>

<div id="score">
    <img src="Coin_6.png" alt="Coin">
    <span id="userScore">0</span>
</div>
<img id="coin" src="ggg.png" alt="Coin" class="no-highlight">
<div id="user-info">
    <h3>User Info</h3>
    <p id="userName"></p>
    <p id="userCoins"></p>
</div>

<script>
    const scoreElement = document.getElementById('userScore');
    const coinElement = document.getElementById('coin');
    const userInfoElement = document.getElementById('user-info');
    let score = parseInt(localStorage.getItem('score')) || 0;

    // به‌روزرسانی امتیاز
    function updateScore() {
        score++;
        localStorage.setItem('score', score);
        scoreElement.textContent = score;
    }

    // رویداد کلیک روی سکه
    coinElement.addEventListener('click', function(event) {
        updateScore();
        const plusOne = document.createElement('div');
        plusOne.textContent = "+1";
        plusOne.style.position = "absolute";
        plusOne.style.color = "white";
        plusOne.style.left = event.clientX + 'px';
        plusOne.style.top = event.clientY + 'px';
        document.body.appendChild(plusOne);
        setTimeout(() => plusOne.remove(), 1000);
    });

    // غیرفعال کردن highlight
    document.querySelectorAll('img').forEach(img => {
        img.addEventListener('mousedown', e => e.preventDefault());
    });

    // متد بررسی مدیر بودن
    function isAdmin() {
        const userId = 765041693; // ID مدیر
        const currentUserId = 123456789; // باید با متدهای تلگرام جایگزین شود
        return currentUserId === userId;
    }

    // نمایش اطلاعات کاربر برای مدیر
    function displayUserInfo(user) {
        userInfoElement.style.display = 'block';
        document.getElementById('userName').textContent = `Username: ${user.username}`;
        document.getElementById('userCoins').textContent = `Coins: ${user.coins}`;
    }

    // بررسی مدیر و نمایش اطلاعات کاربران
    if (isAdmin()) {
        document.body.style.backgroundImage = 'url("background_for_admin.jpg")';
        // نمونه داده کاربر برای مدیر
        const userData = { username: 'user123', coins: score };
        displayUserInfo(userData);
    } else {
        document.body.style.backgroundColor = 'white';
        document.body.innerHTML = '<h1 style="color: black; text-align: center;">Mini app is currently under maintenance</h1>';
    }

</script>

</body>
</html>
