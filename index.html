<!DOCTYPE html>
<html lang="fa">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>گردونه شانس</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            color: black;
        }

        .hidden {
            display: none;
        }

        .section {
            width: 90%;
            max-width: 400px;
            padding: 20px;
            text-align: center;
            background: #ffffff;
            border: 2px solid #000;
            border-radius: 10px;
            box-shadow: 0px 10px 20px rgba(0, 0, 0, 0.2);
        }

        h2 {
            margin-bottom: 20px;
        }

        input {
            padding: 15px;
            width: 100%;
            max-width: 280px;
            border: none;
            border-radius: 50px;
            background: #d3d3d3;
            color: black;
            font-size: 1rem;
            text-align: center;
            margin: 0 auto;
        }

        input:focus {
            outline: none;
            box-shadow: 0px 0px 10px #3498db;
        }

        button {
            margin-top: 10px;
            padding: 10px 20px;
            font-size: 1rem;
            color: white;
            background: #3498db;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            box-shadow: 0px 5px 10px rgba(0, 0, 0, 0.3);
        }

        button:hover {
            background: #2980b9;
        }

        .wheel-container {
            position: relative;
            width: 300px;
            height: 300px;
            margin: 20px auto;
        }

        .wheel {
            position: relative;
            width: 100%;
            height: 100%;
            border-radius: 50%;
            border: 5px solid #000;
            background: conic-gradient(
                #ff7675 0 60deg,
                #55efc4 60deg 120deg,
                #74b9ff 120deg 180deg,
                #ffeaa7 180deg 240deg,
                #a29bfe 240deg 300deg,
                #fab1a0 300deg 360deg
            );
            transition: transform 4s cubic-bezier(0.25, 0.1, 0.25, 1);
        }

        .wheel .number {
            position: absolute;
            font-size: 1.2rem;
            font-weight: bold;
            color: black;
            background: #fff;
            padding: 5px 10px;
            border-radius: 50px;
        }

        .wheel .n1 { transform: rotate(30deg) translate(120px, 0); }
        .wheel .n2 { transform: rotate(90deg) translate(120px, 0); }
        .wheel .n3 { transform: rotate(150deg) translate(120px, 0); }
        .wheel .n4 { transform: rotate(210deg) translate(120px, 0); }
        .wheel .n5 { transform: rotate(270deg) translate(120px, 0); }
        .wheel .n6 { transform: rotate(330deg) translate(120px, 0); }

        .arrow {
            position: absolute;
            bottom: -20px;
            left: 50%;
            transform: translateX(-50%) rotate(180deg);
            width: 40px;
            height: 40px;
            background: #ffcc00;
            clip-path: polygon(50% 0%, 0% 100%, 100% 100%);
            z-index: 2;
        }

        .prize-bar {
            margin: 10px 0;
            padding: 10px;
            background: #f8f8f8;
            color: black;
            border: 1px solid #000;
            border-radius: 10px;
            text-align: right;
        }

        #spin-btn, #show-prizes-btn {
            background: #d3d3d3;
            color: black;
            padding: 10px 20px;
            margin: 0 10px;
            border-radius: 10px;
            border: none;
        }

        #spin-btn:hover, #show-prizes-btn:hover {
            background: #a9a9a9;
        }

        #result {
            margin-top: 20px;
            font-size: 1.2rem;
            font-weight: bold;
            color: #3498db;
        }

        @media (max-width: 400px) {
            .section {
                width: 100%;
                padding: 10px;
            }
            .wheel-container {
                width: 250px;
                height: 250px;
            }
        }
    </style>
</head>
<body>
    <!-- صفحات برنامه -->
    <div class="section" id="sign-section">
        <h2>ثبت شناسه</h2>
        <input type="text" id="game-id-input" placeholder="شناسه بازی">
        <button id="login-btn">تایید</button>
    </div>

    <div class="section hidden" id="spin-section">
        <h2>گردونه شانس</h2>
        <div class="wheel-container">
            <div class="arrow"></div>
            <div class="wheel" id="wheel">
                <div class="number n1">10</div>
                <div class="number n2">20</div>
                <div class="number n3">40</div>
                <div class="number n4">80</div>
                <div class="number n5">160</div>
                <div class="number n6">200</div>
            </div>
        </div>
        <div id="countdown" style="margin-top: 20px; font-size: 1.2rem;">زمان باقی‌مانده: </div>
        <button id="spin-btn">چرخاندن گردونه</button>
        <button id="show-prizes-btn">نمایش جوایز</button>
        <div id="result"></div>
    </div>

    <div class="section hidden" id="prizes-page">
        <h2>جوایز شما</h2>
        <div id="prizes-list"></div>
        <button id="back-to-main">بازگشت</button>
    </div>

    <script>
        const signSection = document.getElementById("sign-section");
        const spinSection = document.getElementById("spin-section");
        const prizesPage = document.getElementById("prizes-page");

        const gameIdInput = document.getElementById("game-id-input");
        const spinBtn = document.getElementById("spin-btn");
        const countdown = document.getElementById("countdown");
        const showPrizesBtn = document.getElementById("show-prizes-btn");
        const backToMainBtn = document.getElementById("back-to-main");
        const prizesList = document.getElementById("prizes-list");
        const resultDiv = document.getElementById("result");

        let lastSpinTime = localStorage.getItem("lastSpinTime") || 0;
        const prizes = JSON.parse(localStorage.getItem("prizes") || "[]");

        function updateCountdown() {
            const now = Date.now();
            const timeRemaining = 24 * 60 * 60 * 1000 - (now - lastSpinTime);
            if (timeRemaining > 0) {
                const hours = Math.floor(timeRemaining / 1000 / 60 / 60);
                const minutes = Math.floor((timeRemaining % (1000 * 60 * 60)) / (1000 * 60));
                const seconds = Math.floor((timeRemaining % (1000 * 60)) / 1000);
                countdown.textContent = ` ${hours}:${minutes}:${seconds}`;
                spinBtn.disabled = true;
            } else {
                countdown.textContent = "گردونه آماده چرخش است.";
                spinBtn.disabled = false;
            }
        }

        document.getElementById("login-btn").onclick = function () {
            const gameId = gameIdInput.value.trim();
            if (gameId) {
                localStorage.setItem("gameId", gameId);
                signSection.classList.add("hidden");
                spinSection.classList.remove("hidden");
                updateCountdown();
            }
        };

        spinBtn.onclick = function () {
            if (spinBtn.disabled) return;

            const spins = [10, 20, 40, 80, 160, 200];
            const randomIndex = Math.floor(Math.random() * spins.length);
            const degree = randomIndex * 60 + 720;
            const wheel = document.getElementById("wheel");

            wheel.style.transform = `rotate(${degree}deg)`;
            setTimeout(() => {
                const prize = spins[randomIndex];
                prizes.push(prize);
                localStorage.setItem("prizes", JSON.stringify(prizes));
                resultDiv.textContent = ` ${prize} سکه بردی`;
                lastSpinTime = Date.now();
                localStorage.setItem("lastSpinTime", lastSpinTime);
                updateCountdown();
            }, 4000);
        };

        showPrizesBtn.onclick = function () {
            prizesPage.classList.remove("hidden");
            spinSection.classList.add("hidden");

            prizesList.innerHTML = prizes.length
                ? prizes.map(p => `<div class="prize-bar">اسکه دریافتی: ${p}</div>`).join("")
                : `<div class="prize-bar">هنوز جایزه‌ای دریافت نکردید</div>`;
        };

        backToMainBtn.onclick = function () {
            prizesPage.classList.add("hidden");
            spinSection.classList.remove("hidden");
        };

        setInterval(updateCountdown, 1000);
    </script>
</body>
</html>
