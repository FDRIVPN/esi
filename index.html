<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Coin Game</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            height: 100vh;
            background-size: cover;
        }
        #coin {
            width: 350px;
            height: 350px;
            cursor: pointer;
            position: relative;
        }
        #scoreContainer {
            display: flex;
            align-items: center;
            justify-content: center;
            position: absolute;
            top: -60px;
        }
        #scoreImg {
            width: 50px;
            height: 50px;
            margin-right: 10px;
        }
        #score {
            font-size: 40px;
            color: white;
            font-family: sans-serif;
        }
        .plusOne {
            position: absolute;
            font-size: 30px;
            color: white;
            animation: fadeOut 1s forwards;
        }
        @keyframes fadeOut {
            0% {
                opacity: 1;
                transform: translateY(0);
            }
            100% {
                opacity: 0;
                transform: translateY(-30px);
            }
        }
        #inactiveMessage {
            font-size: 30px;
            color: black;
            background-color: white;
            text-align: center;
        }
    </style>
</head>
<body>

<div id="mainContent" style="display: none;">
    <div id="scoreContainer">
        <img id="scoreImg" src="Coin_6.png" alt="Coin Image for Score">
        <div id="score">0</div>
    </div>
    <img id="coin" src="ggg.png" alt="Coin">
</div>

<div id="inactiveMessage" style="display: none;">
    This page is not active right now. Manager ID: 765041693
</div>

<script>
    // فرض کنیم که این اطلاعات از تلگرام دریافت می‌شود
    const managerId = '765041693'; // آی‌دی مدیر
    const userId = '123456789'; // فرض کنید این آی‌دی کاربر از طریق API تلگرام گرفته شده است
    const userIsManager = (userId === managerId);

    if (userIsManager) {
        document.body.style.backgroundImage = 'url("manager_background.jpg")'; // قرار دادن بک‌گراند برای مدیر
        document.getElementById('mainContent').style.display = 'block';
    } else {
        document.body.style.backgroundColor = 'white'; // نمایش پس‌زمینه سفید
        document.getElementById('inactiveMessage').style.display = 'block';
    }

    const coinElement = document.getElementById('coin');
    const scoreElement = document.getElementById('score');
    let score = parseInt(localStorage.getItem('score')) || 0;

    function updateScore() {
        score++;
        localStorage.setItem('score', score);
        scoreElement.textContent = score;
    }

    scoreElement.textContent = score;

    function showPlusOne(x, y) {
        const plusOne = document.createElement('div');
        plusOne.textContent = '+1';
        plusOne.classList.add('plusOne');
        plusOne.style.left = `${x}px`;
        plusOne.style.top = `${y}px`;
        document.body.appendChild(plusOne);

        setTimeout(() => {
            plusOne.remove();
        }, 1000);
    }

    coinElement.addEventListener('click', function(event) {
        updateScore();

        const clickX = event.clientX;
        const clickY = event.clientY;
        showPlusOne(clickX, clickY);
    });
</script>

</body>
</html>
