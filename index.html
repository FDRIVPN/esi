<!DOCTYPE html>
<html lang="fa">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>سکه مجانی</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
            direction: rtl;
            text-align: center;
            overflow: hidden;
            position: relative;
            height: 100vh;
        }

        .input-container {
            position: absolute;
            top: 40%;
            left: 50%;
            transform: translateX(-50%);
            width: 80%;
            max-width: 400px;
            background-color: #d3d3d3;
            padding: 20px;
            border-radius: 50px;
            text-align: center;
        }

        .input-box {
            width: 100%;
            padding: 10px;
            margin: 10px 0;
            border-radius: 50px;
            border: 1px solid #ccc;
            background-color: white;
        }

        .confirm-button {
            background-color: green;
            color: white;
            padding: 10px 20px;
            font-size: 18px;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            width: 100%;
        }

        .spin-button {
            position: absolute;
            bottom: -70px;
            left: 50%;
            transform: translateX(-50%);
            width: 150px;
            height: 50px;
            border-radius: 50px;
            font-size: 18px;
            font-weight: bold;
            text-align: center;
            line-height: 50px;
            background-color: gray;
            color: white;
            cursor: pointer;
            border: none;
            display: none;
        }

        .spin-button:hover {
            background-color: darkgray;
        }

        .timer {
            display: none;
            font-size: 20px;
            color: black;
        }

        .wheel-container {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 300px;
            height: 300px;
        }

        .wheel {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            position: relative;
            background-image: url('wheel.png'); /* Replace with your image */
            background-size: cover;
            background-position: center;
            transform: rotate(0deg);
            transition: transform 3s ease-out;
        }

        .pointer {
            width: 0;
            height: 0;
            border-left: 15px solid transparent;
            border-right: 15px solid transparent;
            border-bottom: 30px solid red;
            position: absolute;
            top: -40px;
            left: 50%;
            transform: translateX(-50%);
        }

        .oval {
            position: absolute;
            width: 120px;
            height: 50px;
            background-color: lightgray;
            border-radius: 25px;
            line-height: 50px;
            font-weight: bold;
            text-align: center;
        }

        .oval.left {
            top: 10px;
            left: 20px;
        }

        .oval.right {
            top: 10px;
            right: 20px;
        }

        .result {
            margin-top: 20px;
            font-size: 18px;
            font-weight: bold;
        }

        .hidden {
            display: none;
        }
    </style>
</head>
<body>
    <!-- بیضی‌ها و گردونه -->
    <div class="oval left hidden" id="user-info"></div>
    <div class="oval right hidden" id="coins-info">
        <span id="coins-text">0 سکه بردی</span>
    </div>

    <!-- صفحه ورود شناسه -->
    <div class="input-container" id="input-container">
        <input type="text" id="user-id" class="input-box" placeholder="شناسه خود را وارد کنید" />
        <button class="confirm-button" onclick="confirmUserId()">تایید</button>
    </div>

    <!-- صفحه گردونه -->
    <div class="wheel-container" id="wheel-container" style="display: none;">
        <div class="pointer"></div>
        <div class="wheel" id="wheel"></div>
        <button class="spin-button" id="spin-btn" onclick="spinWheel()">چرخاندن</button>
        <div class="timer" id="timer"></div>
        <div class="result" id="result" style="display: none;"></div>
    </div>

    <script>
        let spinning = false;
        const prizeChances = [
            { angle: 0, prize: 30 },
            { angle: 15, prize: 60 },
            { angle: 45, prize: 90 },
            { angle: 75, prize: 120 },
            { angle: 105, prize: 150 },
            { angle: 135, prize: 180 },
        ];

        let coins = parseInt(localStorage.getItem('coins')) || 0;
        const userId = localStorage.getItem('userId');

        function confirmUserId() {
            const inputUserId = document.getElementById('user-id').value.trim();
            if (inputUserId && !userId) {
                localStorage.setItem('userId', inputUserId);
                localStorage.setItem('coins', 0);
                loadWheelPage();
            } else if (!inputUserId) {
                alert("لطفا شناسه خود را وارد کنید.");
            } else {
                alert("شما قبلاً شناسه وارد کرده‌اید.");
            }
        }

        function loadWheelPage() {
            document.getElementById('input-container').style.display = 'none';
            document.getElementById('wheel-container').style.display = 'block';

            updateUserInfo();
        }

        function updateUserInfo() {
            document.getElementById('user-info').textContent = "کاربر: " + localStorage.getItem('userId');
            document.getElementById('coins-info').textContent = coins + " سکه";
            document.getElementById('user-info').classList.remove('hidden');
            document.getElementById('coins-info').classList.remove('hidden');
        }

        function spinWheel() {
            if (spinning) return;
            spinning = true;
            const randomIndex = Math.floor(Math.random() * prizeChances.length);
            const prize = prizeChances[randomIndex];
            const totalRotation = 3600 + prize.angle;

            document.getElementById('wheel').style.transform = `rotate(${totalRotation}deg)`;

            setTimeout(() => {
                alert(`شما ${prize.prize} سکه بردید!`);
                coins += prize.prize;
                localStorage.setItem('coins', coins);
                document.getElementById('coins-info').textContent = coins + " سکه";
                spinning = false;
            }, 3000);
        }
    </script>
</body>
</html>
