<!DOCTYPE html>
<html lang="fa">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>بازی شرط بندی سکه</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
            direction: rtl;
            text-align: center;
            overflow: hidden;
            position: relative;
            height: 100vh;
        }

        .input-container, .menu, .wheel-container, .betting-container, .coin-info-container {
            display: none;
        }

        /* صفحه ورود شناسه */
        .input-container {
            position: absolute;
            top: 40%;
            left: 50%;
            transform: translateX(-50%);
            width: 80%;
            max-width: 400px;
            background-color: #d3d3d3;
            padding: 20px;
            border-radius: 50px;
            text-align: center;
        }

        .input-box {
            width: 100%;
            padding: 10px;
            margin: 10px 0;
            border-radius: 50px;
            border: 1px solid #ccc;
            background-color: white;
        }

        .confirm-button {
            background-color: green;
            color: white;
            padding: 10px 20px;
            font-size: 18px;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            width: 100%;
        }

        /* گردونه */
        .wheel-container {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 300px;
            height: 300px;
            display: none;
        }

        .wheel {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            background-image: url('wheel.png');
            background-size: cover;
            background-position: center;
            transform: rotate(0deg);
            transition: transform 3s ease-out;
        }

        .pointer {
            width: 0;
            height: 0;
            border-left: 15px solid transparent;
            border-right: 15px solid transparent;
            border-bottom: 30px solid red;
            position: absolute;
            top: -40px;
            left: 50%;
            transform: translateX(-50%);
        }

        /* منو */
        .menu-icon {
            position: fixed;
            top: 10px;
            right: 10px;
            width: 50px;
            height: 50px;
            cursor: pointer;
            background-image: url('menu.png');
            background-size: cover;
            background-position: center;
        }

        .menu {
            display: none;
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 80%;
            max-width: 400px;
            background-color: white;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
            border-radius: 20px;
            padding: 20px;
        }

        .menu .menu-option {
            margin: 10px 0;
            padding: 15px;
            background-color: #f0f0f0;
            border-radius: 25px;
            font-size: 18px;
            cursor: pointer;
            text-align: center;
        }

        .menu .menu-option:hover {
            background-color: #ddd;
        }

        /* نمایش شناسه و سکه */
        .coin-info-container {
            position: absolute;
            top: 10px;
            right: 10px;
            width: 300px;
            height: 50px;
            background-color: lightgray;
            border-radius: 25px;
            line-height: 50px;
            font-weight: bold;
            text-align: center;
        }

        .bet-option {
            display: inline-block;
            padding: 10px;
            margin: 10px;
            border-radius: 25px;
            cursor: pointer;
        }

        .green {
            background-color: green;
            color: white;
        }

        .red {
            background-color: red;
            color: white;
        }

        .bet-button {
            margin-top: 20px;
            padding: 10px 20px;
            background-color: blue;
            color: white;
            border: none;
            border-radius: 25px;
            cursor: pointer;
        }

        .back-button {
            margin-top: 10px;
            padding: 10px 20px;
            background-color: gray;
            color: white;
            border: none;
            border-radius: 25px;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <!-- صفحه ورود شناسه -->
    <div class="input-container" id="input-container">
        <input type="text" id="user-id" class="input-box" placeholder="شناسه خود را وارد کنید" />
        <button class="confirm-button" onclick="confirmUserId()">تایید</button>
    </div>

    <!-- منو -->
    <div class="menu-icon" id="menu-icon" onclick="toggleMenu()"></div>
    <div class="menu" id="menu">
        <div class="menu-option" onclick="loadGames()">بازی‌ها</div>
        <div class="menu-option" onclick="viewCoins()">سکه‌های من</div>
        <div class="menu-option" onclick="addName()">اضافه کردن اسم</div>
        <div class="menu-option" onclick="changeId()">تغییر شناسه</div>
        <div class="menu-option">آپدیت بعدی</div>
        <div class="menu-option">کمک‌گیری</div>
        <div class="menu-option">گزارشات</div>
    </div>

    <!-- صفحه گردونه -->
    <div class="wheel-container" id="wheel-container">
        <div class="pointer"></div>
        <div class="wheel" id="wheel"></div>
        <button class="bet-button" onclick="spinWheel()">چرخاندن گردونه</button>
    </div>

    <!-- صفحه شرط بندی -->
    <div class="betting-container" id="betting-container">
        <h3>مبلغ شرط بندی</h3>
        <input type="number" id="bet-amount" placeholder="مقدار شرط بندی" />
        <div class="bet-option green" onclick="placeBet('up')">بالا</div>
        <div class="bet-option red" onclick="placeBet('down')">پایین</div>
        <button class="bet-button" onclick="confirmBet()">شرط بندی می‌کنم</button>
        <button class="back-button" onclick="backToMenu()">بازگشت</button>
    </div>

    <!-- نمایش اطلاعات سکه -->
    <div class="coin-info-container" id="coin-info-container"></div>

    <script>
        let userId = localStorage.getItem('userId');
        let coins = parseInt(localStorage.getItem('coins')) || 0;
        let betAmount = 0;
        let betValid = true;
        let currentBet = 0;
        let lastSpinCoins = 0;
        let spinCooldown = false;

        // چک کردن شناسه کاربر
        if (userId) {
            loadMenu();
        } else {
            document.getElementById('input-container').style.display = 'block';
        }

        // تایید شناسه کاربر
        function confirmUserId() {
            const inputUserId = document.getElementById('user-id').value.trim();
            if (inputUserId) {
                localStorage.setItem('userId', inputUserId);
                localStorage.setItem('coins', 0);
                loadMenu();
            } else {
                alert("لطفاً شناسه خود را وارد کنید.");
            }
        }

        // بارگذاری منو
        function loadMenu() {
            document.getElementById('input-container').style.display = 'none';
            document.getElementById('menu').style.display = 'block';
            document.getElementById('coin-info-container').style.display = 'block';
            updateCoinInfo();
        }

        // آپدیت اطلاعات سکه
        function updateCoinInfo() {
            document.getElementById('coin-info-container').innerHTML = `سکه‌های من: ${coins}`;
        }

        // بارگذاری صفحه بازی‌ها
        function loadGames() {
            alert("صفحه بازی‌ها بارگذاری می‌شود");
            // افزودن جزئیات بازی‌ها در اینجا
        }

        // نمایش سکه‌های من
        function viewCoins() {
            alert("موجودی سکه شما: " + coins + " سکه");
        }

        // چرخاندن گردونه
        function spinWheel() {
            if (spinCooldown) {
                alert("فقط 24 ساعت یک بار می‌توانید گردونه را بچرخانید.");
                return;
            }
            const wheel = document.getElementById('wheel');
            const spinAmount = Math.floor(Math.random() * 100) + 1;
            wheel.style.transform = `rotate(${spinAmount * 360}deg)`;

            setTimeout(() => {
                lastSpinCoins = spinAmount;
                alert(`شما ${spinAmount} سکه برنده شدید!`);
                spinCooldown = true;
                setTimeout(() => {
                    spinCooldown = false;
                }, 86400000); // 24 ساعت
            }, 3000); // بعد از 3 ثانیه چرخش
        }

        // بارگذاری شرط بندی
        function placeBet(direction) {
            betAmount = parseInt(document.getElementById('bet-amount').value);
            if (betAmount > coins) {
                alert("موجودی ناکافی.");
                return;
            }
            currentBet = betAmount;
            alert(`شما شرط خود را بر روی ${direction} قرار دادید.`);
        }

        // تایید شرط بندی
        function confirmBet() {
            if (currentBet > 0) {
                alert(`شرط شما تایید شد. مقدار شرط: ${currentBet} سکه.`);
                // فرضی: 50% شانس برنده شدن
                if (Math.random() > 0.5) {
                    coins += currentBet * 2;
                    alert(`شما برنده شدید! ${currentBet * 2} سکه برنده شدید.`);
                } else {
                    coins -= currentBet;
                    alert(`شما باختید! ${currentBet} سکه از دست دادید.`);
                }
                currentBet = 0;
                updateCoinInfo();
            } else {
                alert("لطفاً مبلغ شرط را وارد کنید.");
            }
        }

        // برگشت به منو
        function backToMenu() {
            document.getElementById('betting-container').style.display = 'none';
            loadMenu();
        }
    </script>
</body>
</html>
