<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Coin Game</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-image: url('./background.png'); /* تصویر پس‌زمینه */
            background-size: cover; /* تصویر تمام صفحه */
            background-position: center; /* قرارگیری تصویر در مرکز */
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            height: 100vh;
            position: relative; /* برای نمایش +1 در موقعیت‌های مختلف */
        }
        #coin {
            width: 350px; /* اندازه سکه */
            height: 350px; /* اندازه سکه */
            cursor: pointer; /* نشان‌گر ماوس روی سکه */
            user-select: none; /* جلوگیری از انتخاب تصویر */
        }
        #score {
            position: absolute;
            top: 100px;
            left: 100px;
            font-size: 30px;
            color: white;
            font-family: sans-serif;
        }
        .plus-one {
            position: absolute;
            font-size: 20px;
            color: white;
            animation: fadeOut 1s forwards;
        }
        @keyframes fadeOut {
            0% {
                opacity: 1;
                transform: translateY(0);
            }
            100% {
                opacity: 0;
                transform: translateY(-50px); /* حرکت به سمت بالا */
            }
        }
    </style>
</head>
<body>

<div id="score">0</div>
<img id="coin" src="./ggg.png" alt="Coin">

<script>
    const scoreElement = document.getElementById('score');
    const coinElement = document.getElementById('coin');
    let score = parseInt(localStorage.getItem('score')) || 0; // دریافت امتیاز از localStorage

    // به‌روزرسانی امتیاز
    function updateScore(event) {
        score++;
        localStorage.setItem('score', score); // ذخیره امتیاز در localStorage
        scoreElement.textContent = `Score: ${score}`; // به‌روز رسانی نمایش امتیاز

        // ایجاد عنصر برای نمایش +1
        const plusOne = document.createElement('div');
        plusOne.className = 'plus-one';
        plusOne.textContent = '+1';
        plusOne.style.left = `${event.clientX}px`;
        plusOne.style.top = `${event.clientY}px`;
        document.body.appendChild(plusOne);

        // حذف عنصر +1 بعد از انیمیشن
        setTimeout(() => {
            plusOne.remove();
        }, 1000);
    }

    // رویداد کلیک روی سکه
    coinElement.addEventListener('click', updateScore);

    // نمایش امتیاز اولیه
    scoreElement.textContent = `Score: ${score}`;
</script>

</body>
</html>
