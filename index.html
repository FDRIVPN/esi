<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>سیستم جوایز سه‌بعدی</title>
    <style>
        /* تنظیمات عمومی */
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #1e3c72, #2a5298);
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }

        .container {
            text-align: center;
            width: 90%;
            max-width: 600px;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 20px;
            box-shadow: 0px 8px 20px rgba(0, 0, 0, 0.3);
        }

        h1 {
            font-size: 2.5rem;
            margin-bottom: 20px;
            text-shadow: 2px 2px 5px rgba(0, 0, 0, 0.5);
        }

        input, button {
            font-size: 1.2rem;
            padding: 10px;
            border: none;
            border-radius: 10px;
            margin: 10px 0;
            width: 100%;
            outline: none;
            box-shadow: 0px 5px 10px rgba(0, 0, 0, 0.2);
        }

        input {
            background: #f5f5f5;
            color: #333;
        }

        button {
            background: #007BFF;
            color: white;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            background: #0056b3;
            transform: translateY(-2px);
        }

        #wheel {
            width: 200px;
            height: 200px;
            margin: 20px auto;
            border: 5px solid #fff;
            border-radius: 50%;
            background: conic-gradient(
                #ff7675 0 60deg,
                #55efc4 60deg 120deg,
                #74b9ff 120deg 180deg,
                #ffeaa7 180deg 240deg,
                #a29bfe 240deg 300deg,
                #fab1a0 300deg 360deg
            );
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 0px 10px 20px rgba(0, 0, 0, 0.5);
            animation: spin 0s linear forwards;
        }

        @keyframes spin {
            from {
                transform: rotate(0deg);
            }
            to {
                transform: rotate(360deg);
            }
        }

        .hidden {
            display: none;
        }

        ul {
            list-style: none;
            padding: 0;
        }

        ul li {
            background: rgba(255, 255, 255, 0.1);
            margin: 5px 0;
            padding: 10px;
            border-radius: 5px;
            text-align: left;
        }

        ul li span {
            font-weight: bold;
            color: #ffeaa7;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>سیستم جوایز سه‌بعدی</h1>
        <div id="login-section">
            <input type="text" id="game-id" placeholder="شناسه بازی خود را وارد کنید">
            <button id="login-btn">ورود</button>
        </div>
        <div id="main-section" class="hidden">
            <p>خوش آمدید! شناسه شما: <span id="user-id"></span></p>
            <div id="wheel"></div>
            <button id="spin-btn">چرخاندن گردونه</button>
            <p id="result">نتیجه: هنوز چیزی برنده نشده‌اید.</p>
            <h3>جوایز شما:</h3>
            <ul id="prizes"></ul>
        </div>
    </div>

    <script>
        const loginSection = document.getElementById("login-section");
        const mainSection = document.getElementById("main-section");
        const gameIdInput = document.getElementById("game-id");
        const userIdSpan = document.getElementById("user-id");
        const spinBtn = document.getElementById("spin-btn");
        const resultParagraph = document.getElementById("result");
        const prizesList = document.getElementById("prizes");
        const wheel = document.getElementById("wheel");

        // بررسی شناسه در localStorage
        const savedGameId = localStorage.getItem("gameId");
        if (savedGameId) {
            userIdSpan.textContent = savedGameId;
            loginSection.classList.add("hidden");
            mainSection.classList.remove("hidden");
        }

        // مدیریت ورود
        document.getElementById("login-btn").addEventListener("click", () => {
            const gameId = gameIdInput.value.trim();
            if (gameId === "") {
                alert("لطفاً شناسه بازی خود را وارد کنید!");
                return;
            }
            localStorage.setItem("gameId", gameId);
            userIdSpan.textContent = gameId;
            loginSection.classList.add("hidden");
            mainSection.classList.remove("hidden");
        });

        // مدیریت گردونه
        spinBtn.addEventListener("click", () => {
            const prizes = [50, 100, 150, 200, 250, 300];
            const randomPrize = prizes[Math.floor(Math.random() * prizes.length)];

            // شبیه‌سازی چرخش گردونه
            wheel.style.animation = "spin 2s ease-in-out";
            setTimeout(() => {
                wheel.style.animation = "none";
                resultParagraph.textContent = `شما ${randomPrize} سکه برنده شدید!`;
                
                // افزودن جایزه به لیست
                const listItem = document.createElement("li");
                listItem.innerHTML = `🎉 <span>${randomPrize}</span> سکه - تاریخ: ${new Date().toLocaleDateString()}`;
                prizesList.appendChild(listItem);
            }, 2000);
        });
    </script>
</body>
</html>
