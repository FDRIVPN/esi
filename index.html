<!DOCTYPE html>
<html lang="fa">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>سیستم جوایز سه‌بعدی</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #ff6f61, #d4a5a5); /* گرادیانت زیبا */
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: auto;
            overflow-x: hidden;
        }

        .container {
            text-align: center;
            width: 90%;
            max-width: 700px;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 20px;
            box-shadow: 0px 8px 20px rgba(0, 0, 0, 0.3);
        }

        h1 {
            font-size: 2.5rem;
            margin-bottom: 20px;
            text-shadow: 2px 2px 5px rgba(0, 0, 0, 0.5);
        }

        input, button {
            font-size: 1.2rem;
            padding: 10px;
            border: none;
            border-radius: 10px;
            margin: 10px 0;
            width: 100%;
            outline: none;
            box-shadow: 0px 5px 10px rgba(0, 0, 0, 0.2);
        }

        input {
            background: #f5f5f5;
            color: #333;
        }

        button {
            background: #3498db;
            color: white;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            background: #2980b9;
            transform: translateY(-2px);
        }

        .ellipse {
            background: #ffcc00;
            color: white;
            padding: 15px;
            border-radius: 50px;
            display: inline-block;
            font-size: 1.2rem;
            cursor: pointer;
            margin: 10px;
        }

        .ellipse-gray {
            background: #b0b0b0;
        }

        #wheel {
            width: 200px;
            height: 200px;
            margin: 20px auto;
            border: 5px solid #fff;
            border-radius: 50%;
            position: relative;
            background: conic-gradient(
                #ff7675 0 60deg,
                #55efc4 60deg 120deg,
                #74b9ff 120deg 180deg,
                #ffeaa7 180deg 240deg,
                #a29bfe 240deg 300deg,
                #fab1a0 300deg 360deg
            );
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 0px 10px 20px rgba(0, 0, 0, 0.5);
        }

        #wheel span {
            position: absolute;
            font-size: 16px;
            font-weight: bold;
            color: white;
        }

        #wheel span:nth-child(1) { top: 10%; left: 40%; }
        #wheel span:nth-child(2) { top: 30%; left: 10%; }
        #wheel span:nth-child(3) { top: 70%; left: 10%; }
        #wheel span:nth-child(4) { top: 90%; left: 40%; }
        #wheel span:nth-child(5) { top: 70%; right: 10%; }
        #wheel span:nth-child(6) { top: 30%; right: 10%; }

        #countdown {
            margin-top: 10px;
            font-size: 1.2rem;
            color: #ffd700;
        }

        ul {
            list-style: none;
            padding: 0;
        }

        ul li {
            background: rgba(255, 255, 255, 0.1);
            margin: 5px 0;
            padding: 10px;
            border-radius: 5px;
            text-align: left;
        }

        ul li span {
            font-weight: bold;
            color: #ffeaa7;
        }

        #prizes-page {
            display: none;
        }

        .back-button {
            position: absolute;
            top: 10px;
            left: 10px;
            background: #b0b0b0;
            border-radius: 50%;
            padding: 10px;
            font-size: 1.5rem;
            cursor: pointer;
        }

        .back-button:hover {
            background: #888;
        }

        #user-id-prizes {
            background: #ffcc00;
            padding: 15px;
            border-radius: 50px;
            color: white;
            font-size: 1.2rem;
        }

        #result {
            font-size: 1.5rem;
            color: #ffcc00;
            margin-top: 10px;
        }

        .wheel-result {
            font-size: 1.5rem;
            color: #ffeaa7;
            margin-top: 20px;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- صفحه ثبت‌نام -->
        <div id="login-section">
            <h1>ثبت‌نام</h1>
            <input type="text" id="game-id" placeholder="شناسه بازی خود را وارد کنید">
            <button id="login-btn">تایید</button>
        </div>

        <!-- صفحه گردونه -->
        <div id="main-section" class="hidden">
            <div id="user-info">
                <div class="ellipse ellipse-gray" id="user-id-display">شناسه</div>
                <div class="ellipse" id="show-prizes-btn">لیست جوایز</div>
            </div>
            <div id="wheel">
                <span>10 سکه</span>
                <span>20 سکه</span>
                <span>40 سکه</span>
                <span>80 سکه</span>
                <span>160 سکه</span>
                <span>200 سکه</span>
            </div>
            <button id="spin-btn">چرخاندن گردونه</button>
            <p id="result">نتیجه: هنوز چیزی برنده نشده‌اید.</p>
            <p id="countdown" class="hidden">زمان باقی‌مانده: </p>
        </div>

        <!-- صفحه جوایز -->
        <div id="prizes-page">
            <div class="back-button" id="back-to-main">×</div>
            <div class="ellipse" id="user-id-prizes">شناسه بازی</div>
            <h3>جوایز شما:</h3>
            <ul id="prizes-list"></ul>
        </div>
    </div>

    <script>
        const loginSection = document.getElementById("login-section");
        const mainSection = document.getElementById("main-section");
        const prizesPage = document.getElementById("prizes-page");
        const gameIdInput = document.getElementById("game-id");
        const userIdDisplay = document.getElementById("user-id-display");
        const spinBtn = document.getElementById("spin-btn");
        const resultParagraph = document.getElementById("result");
        const prizesList = document.getElementById("prizes-list");
        const countdown = document.getElementById("countdown");
        const showPrizesBtn = document.getElementById("show-prizes-btn");
        const backToMainBtn = document.getElementById("back-to-main");
        const gameId = "gameId";

        let userId = "";
        let spinTimeout;

        // بررسی شناسه در localStorage
        const savedGameId = localStorage.getItem(gameId);
        if (savedGameId) {
            gameIdInput.value = savedGameId;
            showMainSection(savedGameId);
        }

        // تایید ثبت‌نام
        document.getElementById("login-btn").onclick = function() {
            const gameId = gameIdInput.value.trim();
            if (gameId) {
                localStorage.setItem(gameId, gameId);
                showMainSection(gameId);
            }
        };

        // نمایش بخش گردونه
        function showMainSection(gameId) {
            loginSection.classList.add("hidden");
            mainSection.classList.remove("hidden");
            userId = gameId;
            userIdDisplay.textContent = gameId.slice(0, 10) + (gameId.length > 10 ? "..." : "");
            countdown.classList.remove("hidden");
        }

        // نمایش صفحه جوایز
        showPrizesBtn.onclick = function() {
            mainSection.classList.add("hidden");
            prizesPage.classList.remove("hidden");
            document.getElementById("user-id-prizes").textContent = userId.slice(0, 10) + (userId.length > 10 ? "..." : "");
            displayPrizes();
        };

        // بازگشت به صفحه اصلی
        backToMainBtn.onclick = function() {
            prizesPage.classList.add("hidden");
            mainSection.classList.remove("hidden");
        };

        // چرخاندن گردونه
        spinBtn.onclick = function() {
            const spins = [10, 20, 40, 80, 160, 200];
            const weightedSpins = [10, 20, 40, 80, 160, 200]; // وزن‌بندی شانسی
            const spinResult = weightedSpins[Math.floor(Math.random() * weightedSpins.length)];
            resultParagraph.textContent = `نتیجه: ${spinResult} سکه`;
            document.getElementById("wheel").style.pointerEvents = "none"; // جلوگیری از چرخش دوباره
            setTimeout(() => {
                document.getElementById("wheel").style.pointerEvents = "auto"; // فعال کردن گردونه برای دوباره چرخاندن
            }, 4000); // چرخش ۴ ثانیه
        };

        // نمایش جوایز
        function displayPrizes() {
            // برای نمایش جوایز نمونه
            const examplePrizes = [
                { amount: 50, date: '2024-11-19' },
                { amount: 100, date: '2024-11-18' },
                { amount: 200, date: '2024-11-17' }
            ];
            prizesList.innerHTML = '';
            examplePrizes.forEach(prize => {
                const listItem = document.createElement('li');
                listItem.innerHTML = `<span>${prize.amount} سکه</span> - ${prize.date}`;
                prizesList.appendChild(listItem);
            });
        }
    </script>
</body>
</html>
