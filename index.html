<!DOCTYPE html>
<html lang="fa">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Coin Game</title>
    <style>
        html, body {
            background-color: black;
            margin: 0;
            font-family: Arial, sans-serif;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }
        #score-container {
            position: absolute;
            top: 20%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: white;
            font-size: 36px; /* Smaller size for score */
        }
        #bottom-bar {
            position: fixed;
            bottom: 10%; /* Adjusted for aesthetic */
            width: 100%;
            height: 70px;
            background-color: #1a1a1a;
            display: flex;
            justify-content: space-around;
            align-items: center;
            border-top: 3px solid white; /* Full-width line at the top */
        }
        .icon-container {
            text-align: center;
            cursor: pointer;
            transition: color 0.3s, font-weight 0.3s;
        }
        .icon-container img {
            width: 100px; /* Adjusted size */
            height: 100px; /* Adjusted size */
            transition: transform 0.3s;
        }
        .icon-container p {
            margin: 10px 0 0 0; /* Adjusted spacing */
            font-size: 40px; /* Adjusted text size */
            font-weight: 300;
            display: none;
        }
        .active img {
            transform: scale(1.2);
        }
        .active p {
            color: white;
            font-weight: 700;
            display: block;
        }
        .icon-container:not(.active) img {
            transform: scale(1);
        }
        #content {
            flex: 1;
            display: none;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 24px;
            text-align: center;
        }
        #admin-panel {
            display: none; /* Hidden by default */
            position: fixed;
            top: 10%;
            left: 50%;
            transform: translate(-50%, -50%);
            background-color: rgba(0, 0, 0, 0.8);
            padding: 20px;
            border-radius: 8px;
        }
        #admin-panel input {
            width: 200px;
            padding: 10px;
            margin-bottom: 10px;
        }
    </style>
</head>
<body>
    <div id="content">
        <div id="homeContent" style="text-align: center;">
            <img src="tortles.png" alt="Tortles" style="width: 200px; margin-bottom: 20px;"> <!-- Enlarged image -->
            <div style="display: flex; align-items: center; justify-content: center;">
                <span id="userScore" style="margin-right: 10px;">0</span>
                <span style="margin-left: 10px;">Task</span> <!-- Adjusted text -->
            </div>
            <hr style="width: 100%; border-color: white;"> <!-- Full-width line -->
        </div>
        <div id="comingSoon" style="display: none;">Coming Soon...</div>
    </div>

    <div id="bottom-bar">
        <div class="icon-container active" id="icon1">
            <img src="image1.png" alt="Home" id="icon1Img">
            <p>Home</p>
        </div>
        <div class="icon-container" id="icon2">
            <img src="image3.png" alt="Leaderboard" id="icon2Img"> <!-- Changed text -->
            <p>Leaderboard</p> <!-- Changed text -->
        </div>
        <div class="icon-container" id="icon3">
            <img src="image2.png" alt="Friend" id="icon3Img">
            <p>Friend</p>
        </div>
    </div>

    <div id="admin-panel">
        <input type="password" id="adminCode" placeholder="Enter admin code" />
        <button id="submitAdminCode">Submit</button>
        <button id="uploadImage">Upload Image</button>
        <button id="addText">Add Text</button>
    </div>

    <script>
        const icon1 = document.getElementById('icon1');
        const icon2 = document.getElementById('icon2');
        const icon3 = document.getElementById('icon3');
        const scoreElement = document.getElementById('userScore');
        const adminPanel = document.getElementById('admin-panel');
        const adminCodeInput = document.getElementById('adminCode');
        const submitAdminCode = document.getElementById('submitAdminCode');
        let isAdmin = false;

        let score = parseInt(localStorage.getItem('score')) || 0;
        scoreElement.textContent = score;

        function showContent(contentId) {
            document.getElementById('homeContent').style.display = 'none';
            document.getElementById('comingSoon').style.display = 'none';

            if (contentId === 'home') {
                document.getElementById('homeContent').style.display = 'block';
            } else {
                document.getElementById('comingSoon').style.display = 'block';
            }
        }

        function activateIcon(icon, newImageSrc, contentId) {
            document.querySelectorAll('.icon-container').forEach(el => {
                el.classList.remove('active');
                el.querySelector('p').style.fontWeight = '400';
                const img = el.querySelector('img');
                img.src = img.getAttribute('data-default-src');
                el.querySelector('p').style.display = 'none';
            });

            icon.classList.add('active');
            icon.querySelector('p').style.fontWeight = '700';
            icon.querySelector('img').src = newImageSrc;
            icon.querySelector('p').style.display = 'block';

            showContent(contentId);
        }

        icon1.addEventListener('click', () => {
            activateIcon(icon1, 'image1.png', 'home');
            scoreElement.textContent = score;
        });

        icon2.addEventListener('click', () => {
            activateIcon(icon2, 'image22.png', 'comingSoon');
            scoreElement.textContent = score;
        });

        icon3.addEventListener('click', () => {
            activateIcon(icon3, 'image33.png', 'comingSoon');
            scoreElement.textContent = score;
        });

        submitAdminCode.addEventListener('click', () => {
            if (adminCodeInput.value === '123' && !isAdmin) {
                isAdmin = true;
                adminPanel.style.display = 'none';
                alert('You are now an admin!');
            } else {
                alert('Invalid code or you are already an admin!');
            }
        });

        // Initial display
        showContent('home');

        // Show admin panel on load for testing; remove in production
        if (!isAdmin) {
            adminPanel.style.display = 'block';
        }
    </script>
</body>
</html>
