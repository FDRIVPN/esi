<!DOCTYPE html>
<html lang="fa">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Coin Game</title>
    <style>
        html, body {
            background-color: black; /* پس‌زمینه مشکی */
            margin: 0;
            font-family: Arial, sans-serif;
            height: 100%;
            display: flex;
            flex-direction: column; /* چیدمان عمودی */
            align-items: center; /* مرکزچینی در محور افقی */
        }
        #header {
            margin-top: 20px; /* فاصله بالای عکس */
            text-align: center; /* مرکزچینی متن */
            color: white; /* رنگ متن */
        }
        #score-container {
            color: white; /* رنگ امتیاز سفید */
            font-size: 48px; /* اندازه امتیاز */
            margin-top: 10px; /* فاصله بین عکس و امتیاز */
        }
        #bottom-bar {
            position: fixed; /* نوار ثابت در پایین صفحه */
            bottom: 0;
            width: 100%;
            height: 70px; /* ارتفاع 70 پیکسل */
            background-color: #1a1a1a; /* رنگ تیره */
            display: flex;
            justify-content: space-around; /* تقسیم فضا به صورت مساوی بین عکس‌ها */
            align-items: center; /* تنظیم تصاویر در مرکز عمودی */
        }
        .icon-container {
            text-align: center; /* تراز مرکز برای هر عکس و متن */
            cursor: pointer; /* تغییر نشانگر ماوس هنگام هاور */
            transition: color 0.3s, font-weight 0.3s; /* انیمیشن برای تغییر رنگ و وزن */
        }
        .icon-container img {
            width: 20px; /* اندازه تصاویر */
            height: 20px; /* اندازه تصاویر */
            transition: transform 0.3s; /* انیمیشن برای تغییر مقیاس */
        }
        .icon-container p {
            margin: 2px 0 0 0; /* فاصله ۲ پیکسل زیر تصاویر */
            font-size: 14px; /* اندازه متن جدید */
            font-weight: 300; /* نازک‌تر کردن متن‌ها */
        }
        .active img {
            transform: scale(1.2); /* افزایش اندازه تصویر آیکون فعال */
        }
        .active p {
            color: white; /* رنگ سفید برای متن آیکون فعال */
            font-weight: 700; /* پهن‌تر کردن متن در حالت فعال */
        }
        .icon-container:not(.active) img {
            transform: scale(1); /* اندازه اصلی برای آیکون‌های غیر فعال */
        }
        #content {
            flex: 1; /* محتوا فضای باقیمانده را پر کند */
            display: none; /* پنهان کردن محتوای صفحه */
            align-items: center;
            justify-content: center;
            color: white; /* رنگ متن */
            font-size: 24px; /* اندازه متن */
            text-align: center; /* مرکز متن */
        }
    </style>
</head>
<body>
    <div id="header">
        <img src="tortles.png" alt="Tortles" style="width: 100px; height: auto;"> <!-- عکس tortles -->
        <div id="score-container">
            امتیاز شما: <span id="userScore">0</span> <!-- نمایش امتیاز -->
        </div>
    </div>

    <div id="content">
        <div id="comingSoon" style="display: none;">Coming Soon...</div>
    </div>

    <div id="bottom-bar">
        <div class="icon-container active" id="icon1">
            <img src="image1.png" alt="Home" id="icon1Img">
            <p>Home</p>
        </div>
        <div class="icon-container" id="icon2">
            <img src="image3.png" alt="Lig" id="icon2Img">
            <p>Lig</p>
        </div>
        <div class="icon-container" id="icon3">
            <img src="image2.png" alt="Friend" id="icon3Img">
            <p>Friend</p>
        </div>
    </div>

    <script>
        const icon1 = document.getElementById('icon1');
        const icon2 = document.getElementById('icon2');
        const icon3 = document.getElementById('icon3');
        const scoreElement = document.getElementById('userScore');
        
        // دریافت امتیاز از localStorage یا تنظیم آن به 0 اگر موجود نباشد
        let score = parseInt(localStorage.getItem('score')) || 0;
        scoreElement.textContent = score;

        // نمایش محتوای صفحه
        function showContent(contentId) {
            // پنهان کردن تمامی محتوا
            document.getElementById('comingSoon').style.display = 'none';

            // نمایش محتوا بر اساس آیکون کلیک شده
            if (contentId === 'home') {
                scoreElement.textContent = score; // نمایش امتیاز در صفحه اصلی
            } else {
                document.getElementById('comingSoon').style.display = 'block';
            }
        }

        // تابع برای تغییر وضعیت به حالت فعال و تغییر عکس‌ها
        function activateIcon(icon, newImageSrc, contentId) {
            // غیرفعال کردن تمامی عکس‌ها و تغییر به حالت عادی
            document.querySelectorAll('.icon-container').forEach(el => {
                el.classList.remove('active');
                el.querySelector('p').style.fontWeight = '400'; // برگرداندن متن به حالت عادی
                const img = el.querySelector('img');
                if (el.id === 'icon1') {
                    img.src = 'image1.png'; // تغییر تصویر Home به image1
                } else if (el.id === 'icon2') {
                    img.src = 'image3.png'; // بازگرداندن تصویر به حالت اولیه برای Lig
                } else if (el.id === 'icon3') {
                    img.src = 'image2.png'; // بازگرداندن تصویر به حالت اولیه برای Friend
                }
            });

            // فعال کردن آیکون انتخابی
            icon.classList.add('active');
            icon.querySelector('p').style.fontWeight = '700'; // پهن‌تر کردن متن در حالت فعال
            icon.querySelector('img').src = newImageSrc; // تغییر تصویر آیکون به عکس جدید

            // نمایش محتوای مناسب
            showContent(contentId);
        }

        // رویداد کلیک برای هر آیکون
        icon1.addEventListener('click', () => {
            activateIcon(icon1, 'image1.png', 'home'); // بازگرداندن تصویر Home به حالت اصلی
            showContent('home'); // نمایش محتوای اصلی
        });

        icon2.addEventListener('click', () => {
            activateIcon(icon2, 'image22.png', 'comingSoon'); // تغییر تصویر Lig به image22
            showContent('comingSoon'); // نمایش Coming Soon
        });

        icon3.addEventListener('click', () => {
            activateIcon(icon3, 'image33.png', 'comingSoon'); // تغییر تصویر Friend به image33
            showContent('comingSoon'); // نمایش Coming Soon
        });

        // نمایش محتوای اولیه (Home)
        showContent('home');
    </script>
</body>
</html>
