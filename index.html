<!DOCTYPE html>
<html lang="fa">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Coin Game</title>
    <style>
        html, body {
            background-color: black;
            margin: 0;
            font-family: Arial, sans-serif;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: flex-start;
            align-items: center;
        }

        #score-container {
            position: relative;
            top: 20px;
            color: white;
            font-size: 36px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
        }

        .decorative-oval {
            position: relative;
            width: 300px;
            height: 30px;
            background-color: white;
            border-radius: 15px;
            margin-top: 10px;
        }

        #ovals-container {
            margin-top: 100px;
        }

        #showMore {
            margin-top: 10px;
            color: white;
            cursor: pointer;
            font-size: 20px;
            display: none;
        }

        .arrow {
            display: inline-block;
            margin-left: 5px;
            transform: rotate(180deg);
        }

        #content {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 24px;
            text-align: center;
        }

        #comingSoon {
            display: none;
        }

        #bottom-bar {
            position: fixed;
            bottom: 0;
            width: 100%;
            height: 70px;
            background-color: #1a1a1a; /* رنگ تیره */
            display: flex;
            justify-content: space-between; /* فاصله بین آیکون‌ها */
            padding: 0 25px; /* فاصله از دیوار */
            box-sizing: border-box; /* شامل کردن padding در اندازه کلی */
        }

        .icon-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            flex: 1; /* توزیع مساوی فضا */
        }

        .icon-container img {
            width: 30px; /* اندازه آیکون */
            height: 30px; /* اندازه آیکون */
        }
    </style>
</head>
<body>
    <div id="score-container">
        <img src="tortles.png" alt="Tortles" style="width: 50px; height: 50px;">
        <div id="score-content">
            <span id="userScore">0</span>
            <span style="margin-left: 10px;">tortles</span>
        </div>
    </div>

    <div id="ovals-container"></div>

    <div id="showMore">
        Show More <span class="arrow">▼</span>
    </div>

    <div id="content">
        <div id="homeContent">Home Content Here</div>
        <div id="comingSoon">Coming Soon...</div>
    </div>

    <div id="bottom-bar">
        <div class="icon-container" style="margin-left: 25px;">
            <img src="image1.png" alt="Left Icon"> <!-- تصویر اول در سمت چپ -->
        </div>
        <div class="icon-container" style="margin-left: 25px;">
            <img src="image3.png" alt="Center Icon"> <!-- تصویر سوم در مرکز -->
        </div>
        <div class="icon-container" style="margin-left: 25px;">
            <img src="image2.png" alt="Right Icon"> <!-- تصویر دوم در سمت راست -->
        </div>
    </div>

    <script>
        const scoreElement = document.getElementById('userScore');
        const ovalsContainer = document.getElementById('ovals-container');
        const showMore = document.getElementById('showMore');

        let score = parseInt(localStorage.getItem('score')) || 0;
        scoreElement.textContent = score;

        let showAll = false;

        function createOvals() {
            for (let i = 0; i < 10; i++) {
                const oval = document.createElement('div');
                oval.classList.add('decorative-oval');
                oval.style.display = i < 5 ? 'block' : 'none';
                ovalsContainer.appendChild(oval);
            }
        }

        function updateShowMore() {
            showMore.style.display = 'block';
            showMore.textContent = showAll ? 'Show Less ▲' : 'Show More ▼';
        }

        function toggleOvals() {
            showAll = !showAll;
            const ovals = ovalsContainer.querySelectorAll('.decorative-oval');
            ovals.forEach((oval, index) => {
                oval.style.display = showAll || index < 5 ? 'block' : 'none';
            });
            updateShowMore();
        }

        showMore.addEventListener('click', toggleOvals);
        createOvals();
    </script>
</body>
</html>
