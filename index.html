<!DOCTYPE html>
<html lang="fa">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Coin Game</title>
    <style>
        body {
            background-color: black; /* پس‌زمینه مشکی */
            margin: 0;
            font-family: Arial, sans-serif;
            height: 100vh; /* ارتفاع کامل صفحه */
            display: flex;
            justify-content: center;
            align-items: center; /* تراز عمودی و افقی */
            position: relative;
        }
        #score-container {
            position: absolute; /* موقعیت‌گذاری مطلق */
            top: calc(50% - 30px); /* 30 پیکسل بالاتر از وسط */
            left: 50%; /* قرار گرفتن در مرکز افقی */
            transform: translateX(-50%); /* انتقال به مرکز افقی */
        }
        #userScore {
            font-size: 48px; /* اندازه متن امتیاز */
            color: white; /* رنگ امتیاز سفید */
        }
        #bottom-bar {
            position: absolute;
            bottom: 0;
            width: 100%;
            height: 60px; /* ارتفاع 60 پیکسل از پایین صفحه */
            background-color: gray; /* رنگ توسی */
        }
    </style>
</head>
<body>
    <div id="score-container">
        <span id="userScore">0</span>
    </div>

    <div id="bottom-bar"></div>

    <script>
        const scoreElement = document.getElementById('userScore');

        // دریافت امتیاز از localStorage یا تنظیم آن به 0 اگر موجود نباشد
        let score = parseInt(localStorage.getItem('score')) || 0;
        scoreElement.textContent = score;

    </script>
</body>
</html>
