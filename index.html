<!DOCTYPE html>
<html lang="fa">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Coin Game</title>
    <style>
        html, body {
            background-color: black; /* پس‌زمینه مشکی */
            margin: 0;
            font-family: Arial, sans-serif;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
        }
        #score-container {
            position: absolute;
            top: calc(50% - 60px); /* 60 پیکسل بالاتر از وسط صفحه */
            left: 50%;
            transform: translateX(-50%);
        }
        #userScore {
            font-size: 48px;
            color: white; /* رنگ امتیاز سفید */
        }
        #bottom-bar {
            position: fixed; /* نوار ثابت در پایین صفحه */
            bottom: 0;
            width: 100%;
            height: 70px; /* ارتفاع 70 پیکسل */
            background-color: #1a1a1a; /* رنگ تیره */
            display: flex;
            justify-content: space-around; /* تقسیم فضا به صورت مساوی بین عکس‌ها */
            align-items: center; /* تنظیم تصاویر در مرکز عمودی */
        }
        .icon-container {
            text-align: center; /* تراز مرکز برای هر عکس و متن */
        }
        .icon-container img {
            width: 20px; /* اندازه تصاویر جدید */
            height: 20px; /* اندازه تصاویر جدید */
        }
        .icon-container p {
            margin: 2px 0 0 0; /* فاصله ۲ پیکسل زیر تصاویر */
            font-size: 14px; /* اندازه متن جدید */
            font-weight: 300; /* نازک‌تر کردن متن‌ها */
        }
        .icon-container p:first-child {
            color: white; /* رنگ متن اولین عکس سفید */
        }
        .icon-container p:not(:first-child) {
            color: #7d7d7d; /* رنگ توسی برای بقیه متن‌ها */
        }
    </style>
</head>
<body>
    <div id="score-container">
        <span id="userScore">0</span>
    </div>

    <div id="bottom-bar">
        <div class="icon-container">
            <img src="image1.png" alt="Home">
            <p style="color: white;">Home</p> <!-- رنگ سفید برای متن Home -->
        </div>
        <div class="icon-container">
            <img src="image3.png" alt="Lig"> <!-- عکس سوم به جای عکس دوم -->
            <p>Lig</p>
        </div>
        <div class="icon-container">
            <img src="image2.png" alt="Friend"> <!-- عکس دوم به جای عکس سوم -->
            <p>Friend</p>
        </div>
    </div>

    <script>
        const scoreElement = document.getElementById('userScore');

        // دریافت امتیاز از localStorage یا تنظیم آن به 0 اگر موجود نباشد
        let score = parseInt(localStorage.getItem('score')) || 0;
        scoreElement.textContent = score;
    </script>
</body>
</html>
