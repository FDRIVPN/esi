<!DOCTYPE html>
<html lang="fa">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Coin Game</title>
    <style>
        html, body {
            background-color: black; /* پس‌زمینه مشکی */
            margin: 0;
            font-family: Arial, sans-serif;
            height: 100vh; /* ارتفاع کل صفحه */
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow: hidden; /* جلوگیری از اسکرول */
        }

        #score-container {
            position: relative;
            top: 20px; /* فاصله از بالا */
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center; /* مرکز قرار دادن محتوا */
        }

        #score-container img {
            width: 100px; /* اندازه تصویر 100x100 */
            height: 100px; /* اندازه تصویر 100x100 */
        }

        #userScore {
            font-size: 40px; /* اندازه متن امتیاز */
            margin-top: 10px; /* فاصله 10 پیکسل از تصویر */
        }

        #task-container {
            display: flex;
            flex-direction: column;
            align-items: center; /* مرکز قرار دادن متن */
            margin-top: 10px; /* فاصله از امتیاز */
        }

        #task-container hr {
            width: 100%; /* خط کامل از چپ تا راست */
            border: 1px solid white; /* رنگ خط سفید */
            margin: 5px 0; /* فاصله از بالا و پایین */
        }

        #task-container p {
            margin-top: 5px; /* فاصله از خط */
            font-size: 18px; /* اندازه متن Telegram */
            color: white; /* رنگ متن */
        }

        #bottom-bar {
            position: absolute; /* نوار پایین در انتهای صفحه */
            bottom: 0;
            width: 100%;
            height: 70px; /* ارتفاع نوار */
            background-color: #1a1a1a; /* رنگ نوار */
            display: flex;
            justify-content: space-around; /* تقسیم فضا */
            align-items: center; /* مرکز قرار دادن محتوا */
        }

        .icon-container {
            text-align: center; /* تراز مرکز برای هر عکس و متن */
            cursor: pointer; /* تغییر نشانگر ماوس هنگام هاور */
            transition: color 0.3s, font-weight 0.3s; /* انیمیشن برای تغییر رنگ و وزن */
        }

        .icon-container img {
            width: 20px; /* اندازه تصاویر */
            height: 20px; /* اندازه تصاویر */
            transition: transform 0.3s; /* انیمیشن برای تغییر مقیاس */
        }

        .icon-container p {
            margin: 2px 0 0 0; /* فاصله ۲ پیکسل زیر تصاویر */
            font-size: 14px; /* اندازه متن جدید */
            font-weight: 300; /* نازک‌تر کردن متن‌ها */
            display: none; /* پنهان کردن متن به صورت پیش‌فرض */
        }

        .active img {
            transform: scale(1.2); /* افزایش اندازه تصویر آیکون فعال */
        }

        .active p {
            color: white; /* رنگ سفید برای متن آیکون فعال */
            font-weight: 700; /* پهن‌تر کردن متن در حالت فعال */
            display: block; /* نمایش متن در حالت فعال */
        }

        .icon-container:not(.active) img {
            transform: scale(1); /* اندازه اصلی برای آیکون‌های غیر فعال */
        }

        #content {
            flex: 1; /* محتوا فضای باقیمانده را پر کند */
            display: none; /* پنهان کردن محتوای صفحه */
            align-items: center;
            justify-content: center;
            color: white; /* رنگ متن */
            font-size: 24px; /* اندازه متن */
            text-align: center; /* مرکز متن */
        }

        #comingSoon {
            display: none; /* پنهان کردن محتوای Coming Soon به صورت پیش‌فرض */
        }

        /* استایل برای گزینه‌های مدیریت */
        #adminOptions {
            display: none; /* پنهان کردن گزینه‌ها به صورت پیش‌فرض */
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            color: white;
        }

        #uploadSection {
            display: none; /* پنهان کردن بخش آپلود به صورت پیش‌فرض */
            flex-direction: column;
            align-items: center;
        }

        #uploadSection input {
            margin-top: 10px;
        }

        #addedText {
            margin-top: 20px; /* فاصله از بالای متن اضافه شده */
            color: white; /* رنگ متن */
        }
    </style>
</head>
<body>
    <div id="score-container">
        <img src="tortles.png" alt="Tortles"> <!-- تصویر در بالای صفحه -->
        <span id="userScore">0</span> <!-- امتیاز -->
        <div id="task-container">
            <span>Task</span>
            <hr> <!-- خط کامل از چپ به راست -->
            <p>Telegram</p>
        </div>
    </div>

    <div id="adminOptions">
        <button id="addTextButton">افزودن متن</button>
        <button id="uploadImageButton">آپلود تصویر</button>
    </div>

    <div id="uploadSection">
        <input type="file" id="imageUpload" accept="image/*" />
        <button id="submitImageButton">ارسال تصویر</button>
    </div>

    <div id="content">
        <div id="homeContent" style="text-align: center;">
            <p>Welcome to the Home Page!</p>
        </div>
        <div id="comingSoon" style="text-align: center;">Coming Soon...</div> <!-- محتوای Coming Soon -->
        <div id="addedText" style="text-align: center; display:none;"></div> <!-- متن اضافه شده -->
    </div>

    <div id="bottom-bar">
        <div class="icon-container active" id="icon1">
            <img src="image1.png" alt="Home" id="icon1Img">
            <p>Home</p>
        </div>
        <div class="icon-container" id="icon2">
            <img src="image3.png" alt="Leaderboard" id="icon2Img">
            <p>Leaderboard</p>
        </div>
        <div class="icon-container" id="icon3">
            <img src="image2.png" alt="Friend" id="icon3Img">
            <p>Friend</p>
        </div>
    </div>
    <script>
        const icon1 = document.getElementById('icon1');
        const icon2 = document.getElementById('icon2');
        const icon3 = document.getElementById('icon3');
        const scoreElement = document.getElementById('userScore');
        const adminOptions = document.getElementById('adminOptions');
        const uploadSection = document.getElementById('uploadSection');
        const addedText = document.getElementById('addedText');

        // دریافت امتیاز از localStorage یا تنظیم آن به 0 اگر موجود نباشد
        let score = parseInt(localStorage.getItem('score')) || 0;
        scoreElement.textContent = score;

        // بررسی کد ورود برای مدیر
        function checkAdminCode() {
            const adminCode = prompt("لطفاً کد مدیر را وارد کنید:");
            if (adminCode === '123') {
                adminOptions.style.display = 'flex'; // نمایش گزینه‌های مدیر
            } else {
                alert("شما دسترسی به این قسمت را ندارید.");
            }
        }

        // نمایش محتوای صفحه
        function showContent(contentId) {
            // پنهان کردن تمامی محتوا
            document.getElementById('homeContent').style.display = 'none';
            document.getElementById('comingSoon').style.display = 'none';
            addedText.style.display = 'none';

            // نمایش محتوا بر اساس آیکون کلیک شده
            if (contentId === 'home') {
                document.getElementById('homeContent').style.display = 'block';
            } else {
                document.getElementById('comingSoon').style.display = 'block';
            }
        }

        // تابع برای تغییر وضعیت به حالت فعال و تغییر عکس‌ها
        function activateIcon(icon, newImageSrc, contentId) {
            // غیرفعال کردن تمامی عکس‌ها و تغییر به حالت عادی
            document.querySelectorAll('.icon-container').forEach(el => {
                el.classList.remove('active');
                const img = el.querySelector('img');
                if (el.id === 'icon1') {
                    img.src = 'image1.png'; // تصویر Home
                } else if (el.id === 'icon2') {
                    img.src = 'image3.png'; // تصویر Leaderboard
                } else if (el.id === 'icon3') {
                    img.src = 'image2.png'; // تصویر Friend
                }
            });

            // فعال کردن آیکون انتخاب شده
            icon.classList.add('active');
            const iconImage = icon.querySelector('img');
            iconImage.src = newImageSrc; // تغییر تصویر آیکون فعال
            showContent(contentId); // نمایش محتوای مربوطه
        }

        // افزودن رویداد کلیک به آیکون‌ها
        icon1.addEventListener('click', () => activateIcon(icon1, 'image1_active.png', 'home'));
        icon2.addEventListener('click', () => activateIcon(icon2, 'image3_active.png', 'leaderboard'));
        icon3.addEventListener('click', () => activateIcon(icon3, 'image2_active.png', 'friend'));

        // نمایش گزینه‌های مدیر در بار پایین
        document.addEventListener('DOMContentLoaded', () => {
            checkAdminCode(); // بررسی کد مدیر در بارگذاری صفحه

            document.getElementById('addTextButton').addEventListener('click', () => {
                const text = prompt("متن جدید را وارد کنید:");
                if (text) {
                    addedText.textContent = text;
                    addedText.style.display = 'block'; // نمایش متن جدید
                }
            });

            document.getElementById('uploadImageButton').addEventListener('click', () => {
                uploadSection.style.display = 'flex'; // نمایش بخش آپلود
            });

            document.getElementById('submitImageButton').addEventListener('click', () => {
                const file = document.getElementById('imageUpload').files[0];
                if (file) {
                    const reader = new FileReader();
                    reader.onload = function(event) {
                        const img = document.createElement('img');
                        img.src = event.target.result;
                        img.style.maxWidth = '100%'; // حداکثر عرض ۱۰۰٪
                        img.style.maxHeight = '300px'; // حداکثر ارتفاع ۳۰۰ پیکسل
                        document.getElementById('homeContent').appendChild(img); // افزودن تصویر به محتوای اصلی
                    }
                    reader.readAsDataURL(file);
                }
            });
        });
    </script>
</body>
</html>
