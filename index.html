<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Coin Game</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-image: url('background.jpg'); /* نام عکس بک‌گراند */
            background-size: cover; /* اندازه‌گیری بک‌گراند */
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            height: 100vh;
        }
        #coin {
            width: 350px;
            height: 350px;
            cursor: pointer;
        }
        #score {
            position: absolute;
            top: 50px;
            font-size: 30px;
            color: white;
            font-family: sans-serif;
        }
        #message {
            font-size: 24px;
            color: black;
        }
        #userInfoButton {
            display: none; /* پنهان به صورت پیش‌فرض */
            margin-top: 20px;
            padding: 10px 20px;
            font-size: 20px;
            background-color: white;
            color: black;
            border: none;
            cursor: pointer;
        }
    </style>
</head>
<body>

<div id="score" style="display: none;">
    <img src="Coin_6.png" alt="Coin" style="width: 50px; vertical-align: middle;">
    <span id="userScore">0</span>
</div>
<img id="coin" src="ggg.png" alt="Coin" style="display: none;">
<div id="message">Mini app is under maintenance</div>
<button id="userInfoButton" onclick="showUserInfo()">Show User Info</button>

<script>
    const adminId = 765041693;  // شناسه عددی مدیر
    const botToken = '7308080366:AAEZlSs4KRjLcwXsRF2jyDwriDkx-2egbpg';  // توکن ربات تلگرام شما

    const scoreElement = document.getElementById('score');
    const userScoreElement = document.getElementById('userScore');
    const coinElement = document.getElementById('coin');
    const messageElement = document.getElementById('message');
    const userInfoButton = document.getElementById('userInfoButton');
    let score = parseInt(localStorage.getItem('score')) || 0;

    // دیکشنری برای ذخیره امتیاز کاربران (از localStorage خوانده می‌شود)
    let userScores = JSON.parse(localStorage.getItem('userScores')) || {};

    // به‌روزرسانی امتیاز کاربر فعلی
    function updateScore() {
        score++;
        localStorage.setItem('score', score);
        userScoreElement.textContent = score;

        const userId = 765041693;  // شناسه عددی کاربر فعلی (این را از تلگرام بگیرید)
        userScores[userId] = score;  // ذخیره امتیاز کاربر
        localStorage.setItem('userScores', JSON.stringify(userScores));  // ذخیره دیکشنری امتیازات
    }

    // رویداد کلیک روی سکه
    coinElement.addEventListener('click', updateScore);

    // بررسی اینکه آیا کاربر مدیر است یا خیر
    function checkIfAdmin(userId) {
        return userId === adminId;
    }

    // فرض کنید این اطلاعات کاربر فعلی است (این را از تلگرام دریافت کنید)
    const userId = 765041693;  // شناسه عددی کاربر فعلی (از تلگرام بگیرید)

    if (checkIfAdmin(userId)) {
        // مدیر است، صفحه بازی نمایش داده شود
        scoreElement.style.display = 'block';
        coinElement.style.display = 'block';
        messageElement.style.display = 'none';
        userScoreElement.textContent = score;
        userInfoButton.style.display = 'block';  // نمایش دکمه اطلاعات کاربر

        // نمایش امتیازات کاربران برای مدیر
        userInfoButton.addEventListener('click', () => {
            let userInfo = '';
            for (let [user, score] of Object.entries(userScores)) {
                userInfo += `User ID: ${user}, Score: ${score}\n`;
            }
            alert(userInfo);  // اطلاعات کاربران را نمایش می‌دهد
        });
    } else {
        // کاربر عادی است، صفحه سفید و پیام تعمیرات نمایش داده شود
        document.body.style.backgroundColor = 'white';
        messageElement.style.color = 'black';
        scoreElement.style.display = 'none';
        coinElement.style.display = 'none';
    }

    // تابع برای نمایش اطلاعات کاربران (تنها برای مدیر)
    function showUserInfo() {
        let userInfo = '';
        for (let [user, score] of Object.entries(userScores)) {
            userInfo += `User ID: ${user}, Score: ${score}\n`;
        }
        alert(userInfo);  // اطلاعات کاربران را نمایش می‌دهد
    }
</script>

</body>
</html>
