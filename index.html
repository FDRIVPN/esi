<!DOCTYPE html>
<html lang="fa">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>گردونه شانس</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #ff6f61, #d4a5a5);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            color: white;
        }

        .hidden {
            display: none;
        }

        .section {
            width: 100%;
            max-width: 400px;
            padding: 20px;
            text-align: center;
            box-shadow: 0px 10px 20px rgba(0, 0, 0, 0.5);
            border-radius: 10px;
            background: rgba(255, 255, 255, 0.1);
        }

        .wheel-container {
            position: relative;
            width: 300px;
            height: 300px;
            margin: 0 auto;
        }

        .wheel {
            position: relative;
            width: 100%;
            height: 100%;
            border-radius: 50%;
            border: 5px solid #fff;
            background: conic-gradient(
                #ff7675 0 60deg,
                #55efc4 60deg 120deg,
                #74b9ff 120deg 180deg,
                #ffeaa7 180deg 240deg,
                #a29bfe 240deg 300deg,
                #fab1a0 300deg 360deg
            );
            transform-origin: center;
            animation: none;
        }

        .wheel .number {
            position: absolute;
            font-size: 1.2rem;
            font-weight: bold;
            color: white;
            text-shadow: 1px 1px 3px rgba(0, 0, 0, 0.5);
        }

        .wheel .n1 { transform: rotate(30deg) translate(110px); }
        .wheel .n2 { transform: rotate(90deg) translate(110px); }
        .wheel .n3 { transform: rotate(150deg) translate(110px); }
        .wheel .n4 { transform: rotate(210deg) translate(110px); }
        .wheel .n5 { transform: rotate(270deg) translate(110px); }
        .wheel .n6 { transform: rotate(330deg) translate(110px); }

        .arrow {
            position: absolute;
            top: -20px;
            left: 50%;
            transform: translateX(-50%);
            width: 40px;
            height: 40px;
            background: #ffcc00;
            clip-path: polygon(50% 0%, 0% 100%, 100% 100%);
            z-index: 2;
        }

        button {
            margin-top: 20px;
            padding: 10px 20px;
            font-size: 1rem;
            color: white;
            background: #3498db;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            box-shadow: 0px 5px 10px rgba(0, 0, 0, 0.3);
        }

        button:hover {
            background: #2980b9;
        }

        .prize-bar {
            margin: 10px 0;
            padding: 10px;
            background: rgba(0, 0, 0, 0.2);
            border-radius: 10px;
            text-align: left;
        }

        .prize-bar .title {
            font-weight: bold;
        }

        .input-container {
            display: flex;
            align-items: center;
            justify-content: center;
            margin-top: 10px;
        }

        #game-id-input {
            padding: 10px;
            width: 200px;
            border-radius: 50px;
            border: 2px solid #dcdcdc;
            background-color: #f1f1f1;
        }

        .user-id {
            background-color: #bdc3c7;
            padding: 10px;
            border-radius: 50px;
            font-size: 1rem;
            margin-right: 10px;
        }

        .section-header {
            margin-bottom: 10px;
        }

        .button-container {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 20px;
        }

        .btn-rounded {
            border-radius: 50px;
            background-color: #7f8c8d;
            padding: 10px 20px;
            border: none;
        }

        .btn-rounded:hover {
            background-color: #95a5a6;
        }
    </style>
</head>
<body>
    <!-- صفحه ثبت نام -->
    <div class="section" id="sign-section">
        <h2 class="section-header">ثبت شناسه</h2>
        <div class="input-container">
            <input type="text" id="game-id-input" placeholder="شناسه بازی">
        </div>
        <button id="login-btn">تایید</button>
    </div>

    <!-- صفحه گردونه -->
    <div class="section hidden" id="spin-section">
        <div class="user-id" id="user-id-display">شناسه: </div>
        <div class="wheel-container">
            <div class="arrow" style="top: -50px;"></div>
            <div class="wheel" id="wheel">
                <div class="number n1">10</div>
                <div class="number n2">20</div>
                <div class="number n3">40</div>
                <div class="number n4">80</div>
                <div class="number n5">160</div>
                <div class="number n6">200</div>
            </div>
        </div>
        <div id="countdown" style="margin-top: 20px; font-size: 1.2rem; color: #ffeaa7;">زمان باقی‌مانده: </div>
        <div class="button-container">
            <button id="spin-btn" class="btn-rounded">چرخاندن گردونه</button>
            <button id="show-prizes-btn" class="btn-rounded">نمایش جوایز</button>
        </div>
    </div>

    <!-- صفحه جوایز -->
    <div class="section hidden" id="prizes-page">
        <h2 class="section-header">جوایز شما</h2>
        <div id="prizes-list"></div>
        <button id="back-to-main" class="btn-rounded">بازگشت</button>
    </div>

        const userIdDisplay = document.getElementById("user-id-display");
