<!DOCTYPE html>
<html lang="fa">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>سکه مجانی</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
            direction: rtl;
            text-align: center;
            overflow: hidden;
            position: relative;
            height: 100vh;
        }

        .wheel-container {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 300px;
            height: 300px;
            display: none;
        }

        .wheel {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            background-image: url('wheel.png'); /* عکس گردونه */
            background-size: cover;
            background-position: center;
            transform: rotate(0deg);
            transition: transform 3s ease-out;
        }

        .pointer {
            width: 0;
            height: 0;
            border-left: 15px solid transparent;
            border-right: 15px solid transparent;
            border-bottom: 30px solid red;
            position: absolute;
            top: -40px;
            left: 50%;
            transform: translateX(-50%);
        }

        .oval {
            position: absolute;
            width: 120px;
            height: 50px;
            background-color: lightgray;
            border-radius: 25px;
            line-height: 50px;
            font-weight: bold;
            text-align: center;
        }

        .oval.right {
            top: 10px;
            right: 20px;
        }

        /* آیکون منو */
        .menu-icon {
            position: fixed;
            top: 10px;
            right: 10px;
            width: 50px;
            height: 50px;
            cursor: pointer;
            background-image: url('menu.png'); /* عکس منو */
            background-size: cover;
            background-position: center;
        }

        .menu {
            display: none;
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 80%;
            max-width: 400px;
            background-color: white;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
            border-radius: 20px;
            padding: 20px;
        }

        .menu .menu-option {
            margin: 10px 0;
            padding: 15px;
            background-color: #f0f0f0;
            border-radius: 25px;
            font-size: 18px;
            cursor: pointer;
            text-align: center;
        }

        .menu .menu-option:hover {
            background-color: #ddd;
        }

        /* نمایش شناسه و سکه */
        .hidden {
            display: none;
        }

        .input-container {
            position: absolute;
            top: 40%;
            left: 50%;
            transform: translateX(-50%);
            width: 80%;
            max-width: 400px;
            background-color: #d3d3d3;
            padding: 20px;
            border-radius: 50px;
            text-align: center;
        }

        .input-box {
            width: 100%;
            padding: 10px;
            margin: 10px 0;
            border-radius: 50px;
            border: 1px solid #ccc;
            background-color: white;
        }

        .confirm-button {
            background-color: green;
            color: white;
            padding: 10px 20px;
            font-size: 18px;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            width: 100%;
        }

        .bet-container {
            position: absolute;
            top: 60%;
            left: 50%;
            transform: translateX(-50%);
            width: 80%;
            max-width: 400px;
            background-color: #f9f9f9;
            padding: 20px;
            border-radius: 15px;
            text-align: center;
        }

        .bet-button {
            padding: 10px 20px;
            border-radius: 30px;
            cursor: pointer;
            font-size: 18px;
            width: 100%;
        }

        .bet-button.green {
            background-color: green;
            color: white;
        }

        .bet-button.red {
            background-color: red;
            color: white;
        }

        .back-button {
            position: absolute;
            bottom: 10px;
            left: 50%;
            transform: translateX(-50%);
            padding: 10px 20px;
            background-color: gray;
            color: white;
            font-size: 18px;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <!-- صفحه ورود شناسه -->
    <div class="input-container" id="input-container" style="display: none;">
        <input type="text" id="user-id" class="input-box" placeholder="شناسه خود را وارد کنید" />
        <button class="confirm-button" onclick="confirmUserId()">تایید</button>
    </div>

    <!-- صفحه گردونه -->
    <div class="wheel-container" id="wheel-container" style="display: none;">
        <div class="pointer"></div>
        <div class="wheel" id="wheel"></div>
    </div>

    <!-- بخش شرط بندی -->
    <div class="bet-container" id="bet-container" style="display: none;">
        <h2>مبلغ شرط بندی</h2>
        <div class="bet-button green" onclick="placeBet('up')">بالا می‌رود</div>
        <div class="bet-button red" onclick="placeBet('down')">پایین می‌رود</div>
        <button class="back-button" onclick="goBack()">برگشت</button>
    </div>

    <!-- منو -->
    <div class="menu" id="menu">
        <div class="menu-option" onclick="goToGamesPage()">بازی‌ها</div>
        <div class="menu-option" onclick="viewCoins()">سکه‌هایم</div>
        <div class="menu-option" onclick="addUserName()">اضافه اسم</div>
        <div class="menu-option" onclick="changeUserId()">تغییر شناسه (یک بار)</div>
        <div class="menu-option">کمک‌گیری</div>
        <div class="menu-option">گزارشات</div>
        <div class="menu-option">گزارشات متداول</div>
    </div>

    <script>
        let coins = parseInt(localStorage.getItem('coins')) || 0;
        let userId = localStorage.getItem('userId');
        let canChangeId = localStorage.getItem('canChangeId') === 'true'; 

        if (userId) {
            loadWheelPage();
        } else {
            document.getElementById('input-container').style.display = 'block';
        }

        function confirmUserId() {
            const inputUserId = document.getElementById('user-id').value.trim();
            if (inputUserId) {
                localStorage.setItem('userId', inputUserId);
                localStorage.setItem('coins', 0);
                localStorage.setItem('canChangeId', 'false');
                loadWheelPage();
            } else {
                alert("لطفاً شناسه خود را وارد کنید.");
            }
        }

        function loadWheelPage() {
            document.getElementById('input-container').style.display = 'none';
            document.getElementById('wheel-container').style.display = 'block';
        }

        function toggleMenu() {
            const menu = document.getElementById('menu');
            menu.style.display = menu.style.display === 'block' ? 'none' : 'block';
        }

        function placeBet(direction) {
            if (coins < 10) {
                alert("موجودی ناکافی!");
                return;
            }

            localStorage.setItem('coins', coins - 10); // کسر سکه
            alert(`شرط بندی شما ثبت شد: ${direction}`);
            document.getElementById('bet-container').style.display = 'none';
        }

        function goToGamesPage() {
            document.getElementById('wheel-container').style.display = 'none';
            document.getElementById('bet-container').style.display = 'block';
        }

        function goBack() {
            document.getElementById('bet-container').style.display = 'none';
            document.getElementById('wheel-container').style.display = 'block';
        }

        function viewCoins() {
            alert("موجودی سکه شما: " + coins + " سکه");
        }

        function addUserName() {
            const newUserName = prompt("نام جدید خود را وارد کنید:");
            if (newUserName) {
                localStorage.setItem('userName', newUserName);
                alert("نام شما با موفقیت تغییر کرد.");
            }
        }

        function changeUserId() {
            if (canChangeId) {
                const newUserId = prompt("شناسه جدید خود را وارد کنید:");
                if (newUserId) {
                    localStorage.setItem('userId', newUserId);
                    alert("شناسه شما تغییر کرد.");
                }
            } else {
                alert("شما فقط یک بار قادر به تغییر شناسه خود هستید.");
            }
        }
    </script>
</body>
</html>
