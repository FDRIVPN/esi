<!DOCTYPE html>
<html lang="fa">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Coin Game</title>
    <style>
        html, body {
            background-color: black; /* پس‌زمینه مشکی */
            margin: 0;
            font-family: Arial, sans-serif;
            height: 100%;
            display: flex;
            flex-direction: column; /* چیدمان عمودی */
            justify-content: center; /* مرکز قرار دادن محتوا */
            align-items: center; /* مرکز قرار دادن محتوا */
        }
        #score-container {
            position: absolute;
            top: 20%; /* موقعیت نسبت به بالای صفحه */
            left: 50%;
            transform: translate(-50%, -50%);
            color: white; /* رنگ امتیاز سفید */
            font-size: 24px; /* اندازه متن امتیاز */
        }
        #bottom-bar {
            position: fixed; /* نوار ثابت در پایین صفحه */
            bottom: 0;
            width: 100%;
            height: 70px; /* ارتفاع 70 پیکسل */
            background-color: #1a1a1a; /* رنگ تیره */
            display: flex;
            justify-content: space-around; /* تقسیم فضا به صورت مساوی بین عکس‌ها */
            align-items: center; /* تنظیم تصاویر در مرکز عمودی */
            border-top: 2px solid white; /* خط از چپ به راست */
        }
        .icon-container {
            text-align: center; /* تراز مرکز برای هر عکس و متن */
            cursor: pointer; /* تغییر نشانگر ماوس هنگام هاور */
            transition: color 0.3s, font-weight 0.3s; /* انیمیشن برای تغییر رنگ و وزن */
        }
        .icon-container img {
            width: 40px; /* اندازه تصاویر */
            height: 40px; /* اندازه تصاویر */
            transition: transform 0.3s; /* انیمیشن برای تغییر مقیاس */
        }
        .icon-container p {
            margin: 2px 0 0 0; /* فاصله ۲ پیکسل زیر تصاویر */
            font-size: 14px; /* اندازه متن جدید */
            font-weight: 300; /* نازک‌تر کردن متن‌ها */
            display: none; /* پنهان کردن متن به صورت پیش‌فرض */
        }
        .active img {
            transform: scale(1.2); /* افزایش اندازه تصویر آیکون فعال */
        }
        .active p {
            color: white; /* رنگ سفید برای متن آیکون فعال */
            font-weight: 700; /* پهن‌تر کردن متن در حالت فعال */
            display: block; /* نمایش متن در حالت فعال */
        }
        .icon-container:not(.active) img {
            transform: scale(1); /* اندازه اصلی برای آیکون‌های غیر فعال */
        }
        #content {
            flex: 1; /* محتوا فضای باقیمانده را پر کند */
            display: none; /* پنهان کردن محتوای صفحه */
            align-items: center;
            justify-content: center;
            color: white; /* رنگ متن */
            font-size: 24px; /* اندازه متن */
            text-align: center; /* مرکز متن */
        }
        #admin-panel {
            display: none; /* پنل مدیر به صورت پیش‌فرض پنهان است */
            flex-direction: column;
            align-items: center;
            position: absolute;
            top: 10%;
            left: 50%;
            transform: translate(-50%, -50%);
            background-color: #2e2e2e; /* رنگ پس‌زمینه پنل مدیر */
            padding: 20px;
            border-radius: 8px;
            color: white;
        }
        #addedText {
            margin-top: 20px;
            display: none; /* متن اضافه شده به صورت پیش‌فرض پنهان است */
        }
    </style>
</head>
<body>
    <div id="content">
        <div id="homeContent" style="text-align: center;">
            <img src="tortles.png" alt="Tortles" style="max-width: 100px; margin-bottom: 10px;"> <!-- تصویر در بالای صفحه -->
            <div style="display: flex; align-items: center; justify-content: center;">
                <span id="userScore" style="margin-right: 10px;">0</span> <!-- امتیاز -->
                <span style="margin-left: 10px;">task</span> <!-- متن task -->
            </div>
            <div id="addedText"></div> <!-- متن اضافه شده -->
        </div>
        <div id="comingSoon" style="display: none;">Coming Soon...</div>
    </div>

    <div id="bottom-bar">
        <div class="icon-container active" id="icon1">
            <img src="image1.png" alt="Home" id="icon1Img">
            <p>Home</p>
        </div>
        <div class="icon-container" id="icon2">
            <img src="image3.png" alt="Leaderboard" id="icon2Img">
            <p>Leaderboard</p>
        </div>
        <div class="icon-container" id="icon3">
            <img src="image2.png" alt="Friend" id="icon3Img">
            <p>Friend</p>
        </div>
    </div>

    <div id="admin-panel">
        <h2>پنل مدیریت</h2>
        <button id="addTextButton">اضافه کردن متن</button>
        <button id="uploadImageButton">آپلود تصویر</button>
        <input type="file" id="imageUpload" />
        <button id="submitImageButton">تایید تصویر</button>
    </div>

    <script>
        const icon1 = document.getElementById('icon1');
        const icon2 = document.getElementById('icon2');
        const icon3 = document.getElementById('icon3');
        const scoreElement = document.getElementById('userScore');
        const adminPanel = document.getElementById('admin-panel');
        const addedText = document.getElementById('addedText');
        const adminCode = "123"; // کد مدیر

        // دریافت امتیاز از localStorage یا تنظیم آن به 0 اگر موجود نباشد
        let score = parseInt(localStorage.getItem('score')) || 0;
        scoreElement.textContent = score;

        // بررسی ورود به عنوان مدیر
        function checkAdminCode() {
            const existingAdmin = localStorage.getItem('admin');
            if (existingAdmin) {
                adminPanel.style.display = 'block'; // نمایش پنل مدیر اگر کاربر مدیر باشد
            } else {
                const enteredCode = prompt("لطفاً کد مدیر را وارد کنید:");
                if (enteredCode === adminCode) {
                    localStorage.setItem('admin', 'true'); // ذخیره وضعیت مدیر
                    adminPanel.style.display = 'block'; // نمایش پنل مدیر
                } else {
                    alert("کد اشتباه است!"); // نمایش هشدار در صورت کد اشتباه
                }
            }
        }

        // نمایش محتوای صفحه
        function showContent(contentId) {
            // پنهان کردن تمامی محتوا
            document.getElementById('homeContent').style.display = 'none';
            document.getElementById('comingSoon').style.display = 'none';

            // نمایش محتوا بر اساس آیکون کلیک شده
            if (contentId === 'home') {
                document.getElementById('homeContent').style.display = 'block';
            } else {
                document.getElementById('comingSoon').style.display = 'block';
            }
        }

        // تابع برای تغییر وضعیت به حالت فعال و تغییر عکس‌ها
        function activateIcon(icon, newImageSrc, contentId) {
            // غیرفعال کردن تمامی عکس‌ها و تغییر به حالت عادی
            document.querySelectorAll('.icon-container').forEach(el => {
                el.classList.remove('active');
                const img = el.querySelector('img');
                if (el.id === 'icon1') {
                    img.src = 'image1.png'; // بازگرداندن تصویر Home به حالت اولیه
                } else if (el.id === 'icon2') {
                    img.src = 'image3.png'; // بازگرداندن تصویر به حالت اولیه برای Leaderboard
                } else if (el.id === 'icon3') {
                    img.src = 'image2.png'; // بازگرداندن تصویر به حالت اولیه برای Friend
                }
                el.querySelector('p').style.display = 'none'; // پنهان کردن متن
            });

            // فعال کردن آیکون انتخابی
            icon.classList.add('active');
            icon.querySelector('img').src = newImageSrc; // تغییر تصویر آیکون به عکس جدید
            icon.querySelector('p').style.display = 'block'; // نمایش متن در حالت فعال

            // نمایش محتوای مناسب
            showContent(contentId);
        }

        // رویداد کلیک برای هر آیکون
        icon1.addEventListener('click', () => {
            activateIcon(icon1, 'image1_active.png', 'home');
            scoreElement.textContent = score; // نمایش امتیاز
        });

                icon2.addEventListener('click', () => {
            activateIcon(icon2, 'image2_active.png', 'leaderboard');
            scoreElement.textContent = score; // نمایش امتیاز
        });

        icon3.addEventListener('click', () => {
            activateIcon(icon3, 'image3_active.png', 'friend');
            scoreElement.textContent = score; // نمایش امتیاز
        });

        // رویداد بارگذاری تصویر
        document.getElementById('uploadImageButton').addEventListener('click', () => {
            const fileInput = document.getElementById('imageUpload');
            if (fileInput.files.length > 0) {
                const file = fileInput.files[0];
                const reader = new FileReader();
                reader.onload = function (e) {
                    const img = document.createElement('img');
                    img.src = e.target.result; // نمایش تصویر بارگذاری شده
                    img.style.maxWidth = '200px'; // تنظیم حداکثر عرض تصویر
                    img.style.marginTop = '20px';
                    adminPanel.appendChild(img); // اضافه کردن تصویر به پنل مدیر
                }
                reader.readAsDataURL(file); // خواندن تصویر به صورت Data URL
            } else {
                alert("لطفاً یک تصویر انتخاب کنید."); // هشدار در صورت عدم انتخاب تصویر
            }
        });

        // رویداد اضافه کردن متن
        document.getElementById('addTextButton').addEventListener('click', () => {
            const text = prompt("متن را وارد کنید:");
            if (text) {
                addedText.textContent = text; // اضافه کردن متن به نمایش
                addedText.style.display = 'block'; // نمایش متن اضافه شده
            }
        });

        // فراخوانی تابع بررسی کد مدیر
        checkAdminCode();
    </script>
</body>
</html>
