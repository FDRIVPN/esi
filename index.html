<!DOCTYPE html>
<html lang="fa">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>بازی گردونه</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;
            text-align: center;
            direction: rtl;
        }

        .header {
            background-color: black;
            color: white;
            padding: 10px 0;
        }

        .input-section {
            background-color: lightgray;
            margin: 20px auto;
            padding: 20px;
            width: 300px;
            border-radius: 30px;
        }

        .input-section input {
            width: 80%;
            padding: 10px;
            border: none;
            border-radius: 30px;
            text-align: center;
            outline: none;
        }

        .input-section button {
            margin-top: 10px;
            padding: 10px 20px;
            border: none;
            border-radius: 30px;
            background-color: green;
            color: white;
            cursor: pointer;
        }

        #game-page {
            display: none;
            position: relative;
        }

        .oval {
            position: absolute;
            width: 100px;
            height: 50px;
            background-color: lightgray;
            border-radius: 50%;
            line-height: 50px;
            text-align: center;
            font-weight: bold;
        }

        .oval.left {
            top: 20px;
            left: 30px;
        }

        .oval.right {
            top: 20px;
            right: 30px;
            cursor: pointer;
        }

        .wheel-container {
            margin: 50px auto;
            position: relative;
            width: 300px;
            height: 300px;
        }

        .wheel {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            border: 10px solid lightgray;
            position: relative;
            transform: rotate(0deg);
            transition: transform 3s ease-out;
        }

        .segment {
            position: absolute;
            width: 50%;
            height: 50%;
            background: lightblue;
            transform-origin: bottom right;
            clip-path: polygon(100% 0, 0 0, 0 100%);
            border: 1px solid white;
        }

        .spin-button {
            margin-top: 20px;
            padding: 10px 20px;
            border: none;
            border-radius: 30px;
            background-color: blue;
            color: white;
            cursor: pointer;
        }

        .result {
            margin-top: 20px;
            font-size: 18px;
            font-weight: bold;
        }

        .prizes-list {
            display: none;
            background-color: white;
            padding: 20px;
            border: 1px solid lightgray;
            border-radius: 10px;
            margin-top: 20px;
        }
    </style>
</head>
<body>
    <div class="header">بازی گردونه</div>

    <div class="input-section" id="login-page">
        <input type="text" id="username" placeholder="شناسه خود را وارد کنید">
        <button onclick="startGame()">تایید</button>
    </div>

    <div id="game-page">
        <div class="oval left" id="user-info"></div>
        <div class="oval right" onclick="showPrizes()">جوایز</div>

        <div class="wheel-container">
            <div class="wheel" id="wheel">
                <!-- قطعات گردونه -->
                <div class="segment" style="transform: rotate(0deg); background-color: lightblue;">30</div>
                <div class="segment" style="transform: rotate(45deg); background-color: lightgreen;">60</div>
                <div class="segment" style="transform: rotate(90deg); background-color: lightcoral;">90</div>
                <div class="segment" style="transform: rotate(135deg); background-color: lightgoldenrodyellow;">120</div>
                <div class="segment" style="transform: rotate(180deg); background-color: lightpink;">150</div>
                <div class="segment" style="transform: rotate(225deg); background-color: lightgray;">180</div>
                <div class="segment" style="transform: rotate(270deg); background-color: lightsteelblue;">210</div>
                <div class="segment" style="transform: rotate(315deg); background-color: lightsalmon;">240</div>
            </div>
        </div>

        <button class="spin-button" id="spin-btn" onclick="spinWheel()">چرخاندن</button>
        <div class="result" id="result"></div>

        <div class="prizes-list" id="prizes-list">
            <h3>جوایز:</h3>
            <div id="prizes"></div>
        </div>
    </div>

    <script>
        let prizes = [];
        let spinning = false;

        function startGame() {
            const username = document.getElementById("username").value;
            if (username) {
                document.getElementById("login-page").style.display = "none";
                document.getElementById("game-page").style.display = "block";
                document.getElementById("user-info").textContent = username;
            } else {
                alert("لطفاً شناسه خود را وارد کنید!");
            }
        }

        function spinWheel() {
            if (spinning) return;
            spinning = true;

            const wheel = document.getElementById("wheel");
            const spinBtn = document.getElementById("spin-btn");
            spinBtn.disabled = true;

            const randomDegree = Math.floor(Math.random() * 8) * 45 + 3600; // چرخش تصادفی
            wheel.style.transform = `rotate(${randomDegree}deg)`;

            setTimeout(() => {
                const finalAngle = randomDegree % 360;
                const prizeValues = [30, 60, 90, 120, 150, 180, 210, 240];
                const prizeIndex = Math.floor(finalAngle / 45);
                const prize = prizeValues[prizeIndex];

                document.getElementById("result").textContent = `${prize} سکه بردی!`;
                prizes.push({ value: prize, date: new Date().toLocaleDateString("fa-IR") });

                spinBtn.disabled = true; // جلوگیری از چرخش مجدد
            }, 3000);
        }

        function showPrizes() {
            const prizesDiv = document.getElementById("prizes");
            prizesDiv.innerHTML = prizes.map(p => `<p>سکه: ${p.value} - تاریخ: ${p.date}</p>`).join("");
            document.getElementById("prizes-list").style.display = "block";
        }
    </script>
</body>
</html>
