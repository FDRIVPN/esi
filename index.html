<!DOCTYPE html>
<html lang="fa">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Coin Game</title>
    <style>
        html, body {
            background-color: black;
            margin: 0;
            font-family: Arial, sans-serif;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: flex-start;
            align-items: center;
        }

        #score-container {
            position: relative;
            top: 20px;
            color: white;
            font-size: 36px; /* کاهش اندازه متن */
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
        }

        .decorative-oval {
            position: relative;
            width: 300px; /* طول بیضی */
            height: 30px; /* ارتفاع بیضی */
            background-color: white; /* رنگ سفید */
            border-radius: 15px; /* گرد کردن گوشه‌ها */
            margin-top: 10px; /* فاصله بین بیضی‌ها */
        }

        #ovals-container {
            margin-top: 100px; /* فاصله از متن امتیاز */
            display: flex;
            flex-direction: column; /* قرار دادن بیضی‌ها به صورت ستونی */
            align-items: center; /* وسط چین کردن بیضی‌ها */
        }

        #showMore {
            margin-top: 10px;
            color: white;
            cursor: pointer;
            font-size: 20px; /* اندازه متن "Show More" */
            display: none; /* مخفی بودن اولیه */
        }

        .arrow {
            display: inline-block;
            margin-left: 5px;
            transform: rotate(180deg); /* چرخاندن فلش به سمت پایین */
        }

        #content {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 24px;
            text-align: center;
        }

        #comingSoon {
            display: none;
        }

        #bottom-bar {
            position: fixed;
            bottom: 0;
            width: 100%;
            height: 70px;
            background-color: #1a1a1a;
            display: flex;
            justify-content: space-around;
            align-items: center;
        }

        .icon-container {
            text-align: center;
            cursor: pointer;
            transition: color 0.3s, font-weight 0.3s;
            outline: none; /* حذف نوار آبی */
            -webkit-tap-highlight-color: transparent; /* حذف نوار آبی در موبایل */
        }

        .icon-container img {
            width: 20px;
            height: 20px;
        }

        .icon-container p {
            margin: 2px 0 0 0;
            font-size: 14px;
            font-weight: 300;
            display: none;
        }

        .active img {
            transform: scale(1.2);
        }

        .active p {
            color: white;
            font-weight: 700;
            display: block;
        }

        .icon-container:not(.active) img {
            transform: scale(1);
        }
    </style>
</head>
<body>
    <div id="score-container">
        <img src="tortles.png" alt="Tortles" style="width: 50px; height: 50px;">
        <div id="score-content">
            <span id="userScore">0</span>
            <span style="margin-left: 10px;">tortles</span>
        </div>
    </div>

    <div id="ovals-container">
        <!-- بیضی‌ها در اینجا اضافه می‌شوند -->
    </div>

    <div id="showMore" onclick="toggleOvals()">
        Show More
        <span class="arrow">▼</span>
    </div>

    <div id="content">
        <div id="homeContent"></div>
        <div id="comingSoon">Coming Soon...</div>
    </div>

    <div id="bottom-bar">
        <div class="icon-container active" id="icon1" tabindex="0">
            <img src="image11.png" alt="Home" id="icon1Img"> <!-- تغییر به تصویر جدید -->
            <p>Home</p>
        </div>
        <div class="icon-container" id="icon2" tabindex="0">
            <img src="image3.png" alt="Leaderboard" id="icon2Img"> <!-- تغییر به تصویر جدید -->
            <p>Leaderboard</p>
        </div>
        <div class="icon-container" id="icon3" tabindex="0">
            <img src="image2.png" alt="Friend" id="icon3Img"> <!-- تغییر به تصویر جدید -->
            <p>Friend</p>
        </div>
    </div>

    <script>
        const scoreElement = document.getElementById('userScore');
        const scoreContainer = document.getElementById('score-container');
        let score = parseInt(localStorage.getItem('score')) || 0;
        scoreElement.textContent = score;

        function createOvals(count) {
            const ovalsContainer = document.getElementById('ovals-container');
            ovalsContainer.innerHTML = ''; // پاکسازی بیضی‌ها
            for (let i = 0; i < count; i++) {
                const oval = document.createElement('div');
                oval.className = 'decorative-oval';
                ovalsContainer.appendChild(oval);
            }
        }

        let showAll = false; // کنترل نمایش بیضی‌ها

        function toggleOvals() {
            if (showAll) {
                createOvals(5); // نشان دادن ۵ بیضی
                document.getElementById('showMore').innerHTML = 'Show More <span class="arrow">▼</span>';
            } else {
                createOvals(10); // نشان دادن ۱۰ بیضی
                document.getElementById('showMore').innerHTML = 'Show Less <span class="arrow">▲</span>';
            }
            showAll = !showAll; // تغییر وضعیت
        }

        createOvals(5); // ایجاد بیضی‌های اولیه
        document.getElementById('showMore').style.display = 'block'; // نمایش متن "Show More"

        function activateIcon(icon, newImageSrc, contentId) {
            document.querySelectorAll('.icon-container').forEach(el => {
                el.classList.remove('active');
                const img = el.querySelector('img');
                if (el.id === 'icon1') {
                    img.src = 'image11.png'; // برگرداندن به تصویر اصلی
                } else if (el.id === 'icon2') {
                    img.src = 'image22.png'; // برگرداندن به تصویر اصلی
                } else if (el.id === 'icon3') {
                    img.src = 'image33.png'; // برگرداندن به تصویر اصلی
                }
                el.querySelector('p').style.display = 'none';
            });

            icon.classList.add('active');
            icon.querySelector('img').src = newImageSrc;
            icon.querySelector('p').style.display = 'block';
            showContent(contentId);
        }

        const icon1 = document.getElementById('icon1');
        const icon2 = document.getElementById('icon2');
        const icon3 = document.getElementById('icon3');

        icon1.addEventListener('click', () => {
            activateIcon(icon1, 'image1.png', 'homeContent');
            scoreElement.textContent = score;
        });

        icon2.addEventListener('click', () => {
            activateIcon(icon2, 'image3.png', 'comingSoon');
            scoreElement.textContent = score;
        });

        icon3.addEventListener('click', () => {
            activateIcon(icon3, 'image2.png', 'comingSoon');
            scoreElement.textContent = score;
        });

        showContent('homeContent');
    </script>
</body>
</html>
