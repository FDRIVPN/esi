<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Coin Game</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: black;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            height: 100vh;
            background-size: cover;
        }
        #coin {
            width: 350px;
            height: 350px;
            cursor: pointer;
            position: relative;
        }
        #scoreContainer {
            display: flex;
            align-items: center;
            justify-content: center;
            position: absolute;
            top: -60px; /* امتیاز به بالای سکه چسبیده باشد */
        }
        #scoreImg {
            width: 50px;
            height: 50px;
            margin-right: 10px;
        }
        #score {
            font-size: 40px;
            color: white;
            font-family: sans-serif;
        }
        .plusOne {
            position: absolute;
            font-size: 30px;
            color: white;
            animation: fadeOut 1s forwards;
        }
        @keyframes fadeOut {
            0% {
                opacity: 1;
                transform: translateY(0);
            }
            100% {
                opacity: 0;
                transform: translateY(-30px); /* حرکت به بالا */
            }
        }
        #inactiveMessage {
            font-size: 30px;
            color: white;
        }
    </style>
</head>
<body>

<!-- اینجا محتوای صفحه اصلی قرار دارد -->
<div id="mainContent" style="display: none;">
    <div id="scoreContainer">
        <img id="scoreImg" src="Coin_6.png" alt="Coin Image for Score"> <!-- تصویر سکه امتیاز -->
        <div id="score">0</div> <!-- نمایش امتیاز کاربر -->
    </div>
    <img id="coin" src="ggg.png" alt="Coin"> <!-- تصویر اصلی سکه -->
</div>

<!-- اینجا پیامی برای کاربران غیر مدیر نمایش داده می‌شود -->
<div id="inactiveMessage" style="display: none;">
    This page is not active right now. Manager ID: 765041693
</div>

<script>
    const managerId = '765041693'; // آی‌دی مدیر
    const userId = prompt("Please enter your user ID:"); // دریافت آی‌دی کاربر از طریق ورودی (در دنیای واقعی باید از طریق سرور گرفته شود)

    // بررسی اینکه آیا کاربر مدیر است یا خیر
    if (userId === managerId) {
        document.getElementById('mainContent').style.display = 'block'; // نمایش محتوای اصلی برای مدیر
    } else {
        document.getElementById('inactiveMessage').style.display = 'block'; // نمایش پیام برای کاربران دیگر
    }

    const coinElement = document.getElementById('coin');
    const scoreElement = document.getElementById('score');
    let score = parseInt(localStorage.getItem('score')) || 0;

    // به‌روزرسانی امتیاز
    function updateScore() {
        score++;
        localStorage.setItem('score', score);
        scoreElement.textContent = score; // نمایش امتیاز به‌روز شده
    }

    // نمایش امتیاز اولیه
    scoreElement.textContent = score; // اینجا مقدار اولیه امتیاز را نمایش می‌دهیم

    // نمایش +1 در محل کلیک
    function showPlusOne(x, y) {
        const plusOne = document.createElement('div');
        plusOne.textContent = '+1';
        plusOne.classList.add('plusOne');
        plusOne.style.left = `${x}px`;
        plusOne.style.top = `${y}px`;
        document.body.appendChild(plusOne);

        setTimeout(() => {
            plusOne.remove(); // حذف +1 بعد از 1 ثانیه
        }, 1000);
    }

    // رویداد کلیک روی سکه
    coinElement.addEventListener('click', function(event) {
        updateScore();

        // نمایش +1 در محل کلیک
        const rect = coinElement.getBoundingClientRect();
        const clickX = event.clientX;
        const clickY = event.clientY;
        showPlusOne(clickX, clickY);
    });
</script>

</body>
</html>
