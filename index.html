<!DOCTYPE html>
<html lang="fa">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>سکه مجانی</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
            direction: rtl;
            text-align: center;
            overflow: hidden;
            position: relative;
            height: 100vh;
        }

        /* صفحه بارگذاری */
        #loading-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: white;
            z-index: 9999;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .spinner {
            width: 100px;
            height: 100px;
            border: 10px solid transparent;
            border-top: 10px solid #4caf50;
            border-right: 10px solid #4caf50;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            from {
                transform: rotate(0deg);
            }
            to {
                transform: rotate(360deg);
            }
        }

        .input-container {
            position: absolute;
            top: 40%;
            left: 50%;
            transform: translateX(-50%);
            width: 80%;
            max-width: 400px;
            background-color: #d3d3d3;
            padding: 20px;
            border-radius: 50px;
            text-align: center;
        }

        .input-box {
            width: 100%;
            padding: 10px;
            margin: 10px 0;
            border-radius: 50px;
            border: 1px solid #ccc;
            background-color: white;
        }

        .confirm-button {
            background-color: green;
            color: white;
            padding: 10px 20px;
            font-size: 18px;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            width: 100%;
        }

        .spin-button {
            position: absolute;
            bottom: -70px;
            left: 50%;
            transform: translateX(-50%);
            width: 150px;
            height: 50px;
            border-radius: 50px;
            font-size: 18px;
            font-weight: bold;
            text-align: center;
            line-height: 50px;
            background-color: gray;
            color: white;
            cursor: pointer;
            border: none;
            display: none;
        }

        .spin-button:hover {
            background-color: darkgray;
        }

        .timer {
            display: none;
            font-size: 18px;
            color: black;
        }

        .wheel-container {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 300px;
            height: 300px;
        }

        .wheel {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            position: relative;
            background-image: url('Picsart_24-11-20_02-55-22-285.png');
            background-size: cover;
            background-position: center;
            transform: rotate(0deg);
            transition: transform 3s ease-out;
        }

        .pointer {
            width: 0;
            height: 0;
            border-left: 15px solid transparent;
            border-right: 15px solid transparent;
            border-bottom: 30px solid red;
            position: absolute;
            top: -40px;
            left: 50%;
            transform: translateX(-50%);
        }

        .oval {
            position: absolute;
            width: 120px;
            height: 50px;
            background-color: lightgray;
            border-radius: 25px;
            line-height: 50px;
            font-weight: bold;
            text-align: center;
        }

        .oval.left {
            top: 10px;
            left: 20px;
        }

        .oval.right {
            top: 10px;
            right: 20px;
        }

        .result {
            margin-top: 20px;
            font-size: 18px;
            font-weight: bold;
        }

        .hidden {
            display: none;
        }
    </style>
</head>
<body>
    <!-- صفحه بارگذاری -->
    <div id="loading-screen">
        <div class="spinner"></div>
    </div>

    <!-- بیضی‌ها و گردونه -->
    <div class="oval left hidden" id="user-info"></div>
    <div class="oval right hidden" id="coins-info">
        <span id="coins-text">0 سکه بردی</span>
    </div>

    <!-- صفحه ورود شناسه -->
    <div class="input-container" id="input-container">
        <input type="text" id="user-id" class="input-box" placeholder="شناسه خود را وارد کنید" />
        <button class="confirm-button" onclick="confirmUserId()">تایید</button>
    </div>

    <!-- صفحه گردونه -->
    <div class="wheel-container" id="wheel-container" style="display: none;">
        <div class="pointer"></div>
        <div class="wheel" id="wheel"></div>
        <button class="spin-button" id="spin-btn" onclick="spinWheel()">چرخاندن</button>
        <div class="timer" id="timer"></div>
        <div class="result" id="result" style="display: none;"></div>
    </div>

    <script>
        let spinning = false;
        const prizeChances = [
            { angle: 360, prize: 30, chance: 55 },
            { angle: 60, prize: 60, chance: 35 },
            { angle: 120, prize: 90, chance: 2.5 },
            { angle: 180, prize: 120, chance: 2.5 },
            { angle: 240, prize: 150, chance: 2.5 },
            { angle: 300, prize: 180, chance: 2.5 },
        ];

        let lastSpinTime = localStorage.getItem('lastSpinTime');
        let coins1 = parseInt(localStorage.getItem('coins')) || 0;
        const userId = localStorage.getItem('userId');

        function confirmUserId() {
            const inputUserId = document.getElementById('user-id').value.trim();
            if (inputUserId && !userId) {
                localStorage.setItem('userId', inputUserId);
                localStorage.setItem('coins1', 0);
                localStorage.setItem('lastSpinTime', null);
                showLoadingScreen();
                setTimeout(loadWheelPage, 2000); // تأخیر 2 ثانیه‌ای
            } else if (!inputUserId) {
                alert("لطفا شناسه خود را وارد کنید.");
            } else {
                alert("شما قبلاً شناسه وارد کرده‌اید.");
            }
        }

        function showLoadingScreen() {
            document.getElementById('loading-screen').style.display = 'flex';
        }

        function hideLoadingScreen() {
            document.getElementById('loading-screen').style.display = 'none';
        }

        // بارگذاری صفحه گردونه
        function loadWheelPage() {
            hideLoadingScreen();
            const userId = localStorage.getItem('userId');
            if (userId) {
                document.getElementById('user-info').textContent = userId;
                document.getElementById('coins-text').textContent = `${coins1} سکه بردی`;
                document.getElementById('user-info').classList.remove('hidden');
                document.getElementById('coins-info').classList.remove('hidden');
                document.getElementById('input-container').style.display = 'none';
                document.getElementById('wheel-container').style.display = 'block';
                updateTimer();
            }
        }

        function updateTimer() {
            const now = Date.now();
            const remainingTime = lastSpinTime ? 86400000 - (now - lastSpinTime) : 0;
            const timerElement = document.getElementById('timer');
            const spinBtn = document.getElementById('spin-btn');

            if (remainingTime <= 0) {
                timerElement.style.display = 'none';
                spinBtn.style.display = 'block';
                localStorage.setItem('coins', 0); // صفر کردن سکه‌ها
                document.getElementById('coins-text').textContent = '0 سکه بردی';
            } else {
                timerElement.style.display = 'block';
                spinBtn.style.display = 'none';
                const hours = Math.floor(remainingTime / 3600000);
                const minutes = Math.floor((remainingTime % 3600000) / 60000);
                const seconds = Math.floor((remainingTime % 60000) / 1000);
                timerElement.textContent = ` ${hours}:${minutes}:${seconds}`;
            }
        }

        if (userId) {
            showLoadingScreen();
            setTimeout(loadWheelPage, 2000); // نمایش صفحه بارگذاری قبل از گردونه
        }

        function spinWheel() {
            if (spinning) return;
            spinning = true;
            const spinValue = Math.random() * 360;
            const winningPrize = getPrizeForSpin(spinValue);
            const wheel = document.getElementById('wheel');
            wheel.style.transform = `rotate(${3600 + spinValue}deg)`;

            setTimeout(() => {
                alert(`شما برنده ${winningPrize.prize} سکه شده‌اید!`);
                coins1 += winningPrize.prize;
                localStorage.setItem('coins', coins1);
                document.getElementById('coins-text').textContent = `${coins1} سکه بردی`;
                spinning = false;
                lastSpinTime = Date.now();
                localStorage.setItem('lastSpinTime', lastSpinTime);
                updateTimer();
            }, 3000); // مدت زمان چرخش
        }

        function getPrizeForSpin(angle) {
            for (const prize of prizeChances) {
                if (angle >= prize.angle && angle < prize.angle + prize.chance) {
                    return prize;
                }
            }
            return prizeChances[0];
        }
    </script>
</body>
</html>
