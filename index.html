<!DOCTYPE html>
<html lang="fa">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Coin Game</title>
    <style>
        html, body {
            background-color: black;
            margin: 0;
            font-family: Arial, sans-serif;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: flex-start;
            align-items: center;
        }

        #score-container {
            position: relative;
            top: 20px;
            color: white;
            font-size: 36px; /* کوچکتر کردن اندازه امتیاز */
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
        }

        #score-content {
            display: flex;
            align-items: center;
            justify-content: center;
            margin-top: 10px;
            font-size: 24px; /* کوچکتر کردن متن */
        }

        #score-content img {
            width: 50px; /* ثابت نگه‌داشتن اندازه عکس */
            height: 50px;
            margin-right: 10px;
        }

        #bottom-bar {
            position: fixed;
            bottom: 0;
            width: 100%;
            height: 70px;
            background-color: #1a1a1a;
            display: flex;
            justify-content: space-around;
            align-items: center;
        }

        .icon-container {
            text-align: center;
            cursor: pointer;
            transition: transform 0.3s ease; /* تغییر برای بزرگ‌نمایی */
        }

        .icon-container img {
            width: 20px;
            height: 20px;
        }

        .icon-container p {
            margin: 2px 0 0 0;
            font-size: 14px;
            font-weight: 300;
            display: none;
        }

        /* بزرگ‌تر کردن آیکون فعال بدون تغییر بقیه */
        .icon-container.active {
            transform: scale(1.3); /* بزرگ‌تر کردن آیکون فعال */
        }

        .active p {
            color: white;
            font-weight: 700;
            display: block;
        }

        #content {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 24px;
            text-align: center;
        }

        #comingSoon {
            display: none;
        }

    </style>
</head>
<body>
    <div id="score-container">
        <img src="tortles.png" alt="Tortles">
        <div id="score-content">
            <span id="userScore">0</span>
            <span style="margin-left: 10px;">tortles</span>
        </div>
    </div>

    <div id="content">
        <div id="homeContent"></div>
        <div id="comingSoon">Coming Soon...</div>
    </div>

    <div id="bottom-bar">
        <div class="icon-container active" id="icon1" tabindex="0">
            <img src="image1.png" alt="Home" id="icon1Img">
            <p>Home</p>
        </div>
        <div class="icon-container" id="icon2" tabindex="0">
            <img src="image3.png" alt="Leaderboard" id="icon2Img">
            <p>Leaderboard</p>
        </div>
        <div class="icon-container" id="icon3" tabindex="0">
            <img src="image2.png" alt="Friend" id="icon3Img">
            <p>Friend</p>
        </div>
    </div>

    <script>
        const icon1 = document.getElementById('icon1');
        const icon2 = document.getElementById('icon2');
        const icon3 = document.getElementById('icon3');
        const scoreElement = document.getElementById('userScore');
        const scoreContainer = document.getElementById('score-container');

        let score = parseInt(localStorage.getItem('score')) || 0;
        scoreElement.textContent = score;

        function showContent(contentId) {
            document.getElementById('homeContent').style.display = 'none';
            document.getElementById('comingSoon').style.display = 'none';

            const selectedContent = document.getElementById(contentId);
            selectedContent.style.display = 'block';
            selectedContent.style.opacity = 0;
            setTimeout(() => {
                selectedContent.style.transition = 'opacity 0.5s';
                selectedContent.style.opacity = 1;
            }, 10);

            if (contentId === 'homeContent') {
                scoreContainer.style.display = 'flex';
            } else {
                scoreContainer.style.display = 'none';
            }
        }

        function activateIcon(icon, newImageSrc, contentId) {
            document.querySelectorAll('.icon-container').forEach(el => {
                el.classList.remove('active');
                const img = el.querySelector('img');
                if (el.id === 'icon1') {
                    img.src = 'image1.png';
                } else if (el.id === 'icon2') {
                    img.src = 'image3.png';
                } else if (el.id === 'icon3') {
                    img.src = 'image2.png';
                }
                el.querySelector('p').style.display = 'none';
            });

            icon.classList.add('active');
            icon.querySelector('img').src = newImageSrc;
            icon.querySelector('p').style.display = 'block';
            showContent(contentId);
        }

        icon1.addEventListener('click', () => {
            activateIcon(icon1, 'image1.png', 'homeContent');
            scoreElement.textContent = score;
        });

        icon2.addEventListener('click', () => {
            activateIcon(icon2, 'image22.png', 'comingSoon');
            scoreElement.textContent = score;
        });

        icon3.addEventListener('click', () => {
            activateIcon(icon3, 'image33.png', 'comingSoon');
            scoreElement.textContent = score;
        });

        showContent('homeContent');
    </script>
</body>
</html>
