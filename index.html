<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Coin Game</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: black;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            color: white;
            font-family: sans-serif;
        }
        #score-section {
            position: absolute;
            top: 20px;
            left: 20px;
            display: flex;
            align-items: center;
        }
        #score-section img {
            width: 50px;
            height: 50px;
        }
        #score-display {
            font-size: 30px;
            margin-left: 10px;
        }
        #adminSection {
            display: none; /* این بخش فقط برای مدیر نمایش داده می‌شود */
        }
        #userInfo {
            margin-top: 20px;
        }
    </style>
</head>
<body>

<!-- بخش امتیاز -->
<div id="score-section">
    <img src="Coin_6.png" alt="Coin">
    <span id="score-display">0</span>
</div>

<!-- بخش مربوط به مدیر -->
<div id="adminSection">
    <h1>Admin Panel</h1>
    <div id="userInfo"></div>
</div>

<script>
    const managerId = 765041693; // شناسه عددی مدیر
    const currentUserId = 765041693; // فرض کنید این اطلاعات از سرور یا تلگرام دریافت می‌شود

    // بررسی اینکه آیا کاربر مدیر است یا نه
    if (currentUserId == managerId) {
        document.getElementById('adminSection').style.display = 'block'; // بخش مدیر را نمایش می‌دهد
        // اطلاعات کاربران (مثال)
        const users = [
            {username: 'user1', coins: 100},
            {username: 'user2', coins: 250}
        ];

        const userInfoDisplay = document.getElementById('userInfo');
        users.forEach(user => {
            const userElement = document.createElement('div');
            userElement.textContent = `Username: ${user.username}, Coins: ${user.coins}`;
            userInfoDisplay.appendChild(userElement);
        });
    } else {
        // کاربر عادی است: نمایش پیغام تعمیر
        document.body.innerHTML = '<div style="color: black; background-color: white; height: 100vh; display: flex; justify-content: center; align-items: center;"><h1>Mini app is currently under maintenance</h1></div>';
    }

    // امتیاز را در بالای سکه به‌روزرسانی می‌کند
    let score = parseInt(localStorage.getItem('score')) || 0;
    document.getElementById('score-display').textContent = score;

    document.body.addEventListener('click', function(event) {
        const coinElement = document.querySelector('#score-section img');
        const rect = coinElement.getBoundingClientRect();
        const x = event.clientX;
        const y = event.clientY;

        // بررسی اینکه آیا روی تصویر سکه کلیک شده است
        if (x >= rect.left && x <= rect.right && y >= rect.top && y <= rect.bottom) {
            score++;
            localStorage.setItem('score', score); // ذخیره‌سازی امتیاز جدید
            document.getElementById('score-display').textContent = score;

            // نمایش +1 در محل کلیک
            const plusOne = document.createElement('div');
            plusOne.textContent = '+1';
            plusOne.style.position = 'absolute';
            plusOne.style.left = `${x}px`;
            plusOne.style.top = `${y}px`;
            plusOne.style.color = 'white';
            plusOne.style.fontSize = '20px';
            plusOne.style.transition = 'top 0.5s, opacity 0.5s';
            document.body.appendChild(plusOne);

            setTimeout(() => {
                plusOne.style.top = `${y - 50}px`;
                plusOne.style.opacity = '0';
                setTimeout(() => plusOne.remove(), 500);
            }, 0);
        }
    });
</script>

</body>
</html>
