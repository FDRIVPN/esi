<!DOCTYPE html>
<html lang="fa">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Coin Game</title>
    <style>
        html, body {
            background-color: black; /* پس‌زمینه مشکی */
            margin: 0;
            font-family: Arial, sans-serif;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
        }
        #score-container {
            position: absolute;
            top: calc(50% - 60px); /* 60 پیکسل بالاتر از وسط صفحه */
            left: 50%;
            transform: translateX(-50%);
        }
        #userScore {
            font-size: 48px;
            color: white; /* رنگ امتیاز سفید */
        }
        #bottom-bar {
            position: fixed; /* نوار ثابت در پایین صفحه */
            bottom: 0;
            width: 100%;
            height: 70px; /* ارتفاع 70 پیکسل */
            background-color: #1a1a1a; /* رنگ تیره */
            display: flex;
            justify-content: space-around; /* تقسیم فضا به صورت مساوی بین عکس‌ها */
            align-items: center; /* تنظیم تصاویر در مرکز عمودی */
        }
        .icon-container {
            text-align: center; /* تراز مرکز برای هر عکس و متن */
            cursor: pointer; /* تغییر نشانگر ماوس هنگام هاور */
        }
        .icon-container img {
            width: 20px; /* اندازه تصاویر */
            height: 20px; /* اندازه تصاویر */
        }
        .icon-container p {
            margin: 2px 0 0 0; /* فاصله ۲ پیکسل زیر تصاویر */
            font-size: 14px; /* اندازه متن جدید */
            font-weight: 300; /* نازک‌تر کردن متن‌ها */
        }
        .active img, .active p {
            color: white;
            font-weight: 700; /* پهن‌تر کردن متن در حالت فعال */
        }
        .icon-container:not(.active) img, .icon-container:not(.active) p {
            color: #7d7d7d; /* رنگ توسی برای بقیه متن‌ها */
            font-weight: 400; /* نازک‌تر کردن متن‌ها در حالت غیرفعال */
        }
    </style>
</head>
<body>
    <div id="score-container">
        <span id="userScore">0</span> <!-- نمایش امتیاز -->
    </div>

    <div id="bottom-bar">
        <div class="icon-container active" id="icon1">
            <img src="image1.png" alt="Home">
            <p>Home</p> <!-- رنگ سفید برای متن Home -->
        </div>
        <div class="icon-container" id="icon2">
            <img src="image3.png" alt="Lig"> <!-- عکس سوم به جای عکس دوم -->
            <p>Lig</p>
        </div>
        <div class="icon-container" id="icon3">
            <img src="image2.png" alt="Friend"> <!-- عکس دوم به جای عکس سوم -->
            <p>Friend</p>
        </div>
    </div>

    <script>
        const icon1 = document.getElementById('icon1');
        const icon2 = document.getElementById('icon2');
        const icon3 = document.getElementById('icon3');
        const scoreElement = document.getElementById('userScore');

        // دریافت امتیاز از localStorage یا تنظیم آن به 0 اگر موجود نباشد
        let score = parseInt(localStorage.getItem('score')) || 0;
        scoreElement.textContent = score;

        // تابع برای تغییر وضعیت به حالت فعال
        function activateIcon(icon) {
            // غیرفعال کردن تمامی عکس‌ها
            document.querySelectorAll('.icon-container').forEach(el => {
                el.classList.remove('active');
                el.querySelector('p').style.fontWeight = '400'; // برگرداندن متن به حالت عادی
            });

            // فعال کردن عکس مورد نظر
            icon.classList.add('active');
            icon.querySelector('p').style.fontWeight = '700'; // پهن‌تر کردن متن در حالت فعال
        }

        // رویداد کلیک برای عکس‌ها
        icon1.addEventListener('click', () => {
            activateIcon(icon1);
            scoreElement.textContent = score; // اینجا می‌توانید ویژگی‌های مربوط به Home را اعمال کنید
        });

        icon2.addEventListener('click', () => {
            activateIcon(icon2);
            scoreElement.textContent = score; // ویژگی‌های مربوط به Home برای این آیکون هم اعمال می‌شود
        });

        icon3.addEventListener('click', () => {
            activateIcon(icon3);
            scoreElement.textContent = score; // ویژگی‌های مربوط به Home برای این آیکون هم اعمال می‌شود
        });
    </script>
</body>
</html>
