<!DOCTYPE html>
<html lang="fa">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Coin Game</title>
    <style>
        html, body {
            background-color: black; /* پس‌زمینه مشکی که همیشه وجود دارد */
            margin: 0;
            font-family: Arial, sans-serif;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
        }
        #score-container {
            position: absolute;
            top: calc(50% - 60px); /* 60 پیکسل بالاتر از وسط صفحه */
            left: 50%;
            transform: translateX(-50%);
        }
        #userScore {
            font-size: 48px;
            color: white; /* رنگ امتیاز سفید */
        }
        #bottom-bar {
            position: fixed; /* نوار همیشه در پایین صفحه */
            bottom: 0;
            width: 100%;
            height: 60px; /* ارتفاع 60 پیکسل */
            background-color: #1a1a1a; /* رنگ تیره‌تر از سیاه */
        }
    </style>
</head>
<body>
    <div id="score-container">
        <span id="userScore">0</span>
    </div>

    <div id="bottom-bar"></div>

    <script>
        const scoreElement = document.getElementById('userScore');

        // دریافت امتیاز از localStorage یا تنظیم آن به 0 اگر موجود نباشد
        let score = parseInt(localStorage.getItem('score')) || 0;
        scoreElement.textContent = score;
    </script>
</body>
</html>
