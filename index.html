<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Coin Game</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: black;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            height: 100vh;
        }
        #coin {
            width: 350px;
            height: 350px;
            cursor: pointer;
        }
        #scoreContainer {
            display: flex;
            align-items: center;
            justify-content: center;
            position: absolute;
            top: 50px;
        }
        #score {
            font-size: 30px;
            color: white;
            font-family: sans-serif;
            margin-left: 10px;
        }
        #message {
            color: black;
            font-size: 20px;
            font-family: sans-serif;
            display: none; /* برای کاربران عادی */
        }
        #gameContainer {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        #adminButton {
            margin-top: 20px;
            padding: 10px 20px;
            font-size: 16px;
            cursor: pointer;
            display: none; /* فقط برای مدیر */
        }
        #userInfo {
            display: none; /* برای نمایش اطلاعات کاربران */
            color: white;
            font-size: 18px;
        }
    </style>
</head>
<body>

<div id="gameContainer">
    <div id="scoreContainer">
        <img src="Coin_6.png" alt="Coin Icon" style="width: 40px;">
        <div id="score">0</div>
    </div>
    <img id="coin" src="ggg.png" alt="Coin">
</div>
<div id="message">Mini-app is under maintenance</div>
<button id="adminButton">Show User Info</button>
<div id="userInfo"></div>

<script>
    const userId = 765041693; // آی‌دی عددی مدیر
    const currentUserId = 765041693; // فرض بر اینکه اینجا آی‌دی کاربر واقعی را داشته باشید

    const scoreElement = document.getElementById('score');
    const coinElement = document.getElementById('coin');
    const messageElement = document.getElementById('message');
    const gameContainer = document.getElementById('gameContainer');
    const adminButton = document.getElementById('adminButton');
    const userInfoElement = document.getElementById('userInfo');
    let score = parseInt(localStorage.getItem('score')) || 0;

    const users = [
        { username: 'user1', coins: 100 },
        { username: 'user2', coins: 200 },
        { username: 'user3', coins: 300 }
    ]; // اطلاعات نمونه کاربران

    // نمایش اطلاعات کاربران برای مدیر
    function showUserInfo() {
        let userInfoHtml = '';
        users.forEach(user => {
            userInfoHtml += `Username: ${user.username}, Coins: ${user.coins}<br>`;
        });
        userInfoElement.innerHTML = userInfoHtml;
        userInfoElement.style.display = 'block';
    }

    // به‌روزرسانی امتیاز
    function updateScore() {
        score++;
        localStorage.setItem('score', score);
        scoreElement.textContent = score;
    }

    coinElement.addEventListener('click', updateScore);

    // بررسی آی‌دی کاربر برای نمایش صفحه مناسب
    if (currentUserId !== userId) {
        gameContainer.style.display = 'none';
        document.body.style.backgroundColor = 'white';
        messageElement.style.display = 'block';
    } else {
        adminButton.style.display = 'block';
    }

    // رویداد کلیک دکمه برای نمایش اطلاعات کاربران
    adminButton.addEventListener('click', showUserInfo);

    scoreElement.textContent = score;
</script>

</body>
</html>
