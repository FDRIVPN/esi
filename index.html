<!DOCTYPE html>
<html lang="fa">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>بازی گردونه سفارشی</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
            direction: rtl;
            text-align: center;
            overflow: hidden;
            position: relative;
            height: 100vh;
        }

        .oval {
            position: absolute;
            width: 120px;
            height: 50px;
            background-color: lightgray;
            border-radius: 25px;
            line-height: 50px;
            font-weight: bold;
            text-align: center;
        }

        .oval.left {
            top: 10px;
            left: 20px;
        }

        .oval.right {
            top: 10px;
            right: 20px;
        }

        .input-container {
            position: absolute;
            top: 40%;
            left: 50%;
            transform: translateX(-50%);
            text-align: center;
        }

        .input-box {
            width: 200px;
            padding: 10px;
            margin: 10px;
            border-radius: 10px;
            border: 1px solid #ccc;
        }

        .confirm-button {
            background-color: green;
            color: white;
            padding: 10px 20px;
            font-size: 18px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
        }

        .wheel-container {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 300px;
            height: 300px;
        }

        .wheel {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            position: relative;
            background-image: url('Picsart_24-11-20_02-55-22-285.png');
            background-size: cover;
            background-position: center;
            transform: rotate(0deg);
            transition: transform 3s ease-out;
        }

        .pointer {
            width: 0;
            height: 0;
            border-left: 15px solid transparent;
            border-right: 15px solid transparent;
            border-bottom: 30px solid red;
            position: absolute;
            top: -40px;
            left: 50%;
            transform: translateX(-50%);
        }

        .spin-button {
            position: absolute;
            top: 75%;
            left: 50%;
            transform: translateX(-50%);
            width: 150px;
            height: 50px;
            border-radius: 25px;
            background-color: blue;
            color: white;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            border: none;
        }

        .result {
            margin-top: 20px;
            font-size: 18px;
            font-weight: bold;
        }

        .timer {
            font-size: 18px;
            margin-top: 20px;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <!-- Ovals for User Info and Coins -->
    <div class="oval left" id="user-info">کاربر</div>
    <div class="oval right" id="coins-info">
        <span id="coins-text">0 سکه بردی</span>
    </div>

    <!-- Input container to enter User ID -->
    <div class="input-container" id="input-container">
        <input type="text" id="user-id" class="input-box" placeholder="شناسه خود را وارد کنید" />
        <button class="confirm-button" onclick="confirmUserId()">تایید</button>
    </div>

    <!-- Wheel and Spin Button -->
    <div class="wheel-container" id="wheel-container" style="display: none;">
        <div class="pointer"></div>
        <div class="wheel" id="wheel"></div>
    </div>

    <button class="spin-button" id="spin-btn" onclick="spinWheel()" style="display: none;">چرخاندن</button>

    <div class="result" id="result" style="display: none;"></div>
    <div class="timer" id="timer" style="display: none;"></div>

    <script>
        let spinning = false;
        let totalCoins = 0;
        const prizeChances = [
            { angle: 360, prize: 30, chance: 35 },
            { angle: 60, prize: 60, chance: 35 },
            { angle: 120, prize: 90, chance: 20 },
            { angle: 180, prize: 120, chance: 10 },
            { angle: 240, prize: 150, chance: 10 },
            { angle: 300, prize: 180, chance: 10 },
        ];

        let lastSpinTime = localStorage.getItem('lastSpinTime');
        let coins = parseInt(localStorage.getItem('coins')) || 0;
        const userId = localStorage.getItem('userId');

        function confirmUserId() {
            const inputUserId = document.getElementById('user-id').value.trim();
            if (inputUserId && !userId) {
                localStorage.setItem('userId', inputUserId);
                localStorage.setItem('coins', 0);
                document.getElementById('user-info').textContent = inputUserId;
                document.getElementById('input-container').style.display = 'none';
                document.getElementById('wheel-container').style.display = 'block';
                document.getElementById('spin-btn').style.display = 'inline-block';
                document.querySelector('.oval.left').style.display = 'none';
                document.querySelector('.oval.right').style.display = 'none';
            } else if (!inputUserId) {
                alert("لطفا شناسه خود را وارد کنید.");
            } else {
                alert("شما قبلاً شناسه وارد کرده‌اید.");
            }
        }

        function updateTimer() {
            const now = Date.now();
            const remainingTime = lastSpinTime ? 86400000 - (now - lastSpinTime) : 0;
            const timerElement = document.getElementById('timer');

            if (remainingTime <= 0) {
                timerElement.style.display = 'none';
                document.getElementById('spin-btn').disabled = false;
            } else {
                timerElement.style.display = 'block';
                const hours = Math.floor(remainingTime / 3600000);
                const minutes = Math.floor((remainingTime % 3600000) / 60000);
                const seconds = Math.floor((remainingTime % 60000) / 1000);
                timerElement.textContent = `${hours}:${minutes}:${seconds}`;
                document.getElementById('spin-btn').disabled = true;

                setTimeout(updateTimer, 1000);
            }
        }

        function spinWheel() {
            if (spinning) return;
            spinning = true;

            const spinBtn = document.getElementById("spin-btn");
            const wheel = document.getElementById("wheel");
            const result = document.getElementById("result");
            result.textContent = "";

            spinBtn.disabled = true;

            const selectedPrize = selectPrize();
            const randomSpin = selectedPrize.angle + 3600;
            wheel.style.transform = `rotate(${randomSpin}deg)`;

            setTimeout(() => {
                result.textContent = `شما ${selectedPrize.prize} سکه بردید!`;
                totalCoins += selectedPrize.prize;
                localStorage.setItem('coins', totalCoins);
                document.getElementById("coins-text").textContent = `${totalCoins} سکه بردی`;
                localStorage.setItem('lastSpinTime', Date.now());
                spinning = false;

                updateTimer();
            }, 3000);
        }

        function selectPrize() {
            const random = Math.random() * 100;
            let cumulativeChance = 0;

            for (const prize of prizeChances) {
                cumulativeChance += prize.chance;
                if (random <= cumulativeChance) {
                    return prize;
                }
            }

            return prizeChances[0];
        }

        if (userId) {
            document.getElementById('user-info').textContent = userId;
            document.getElementById('coins-text').textContent = `${coins} سکه بردی`;
            document.getElementById('input-container').style.display = 'none';
            document.getElementById('wheel-container').style.display = 'block';
            document.getElementById('spin-btn').style.display = 'inline-block';
            updateTimer();
        }
    </script>
</body>
</html>
