<!DOCTYPE html>
<html lang="fa">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>گردونه شانس</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }

        .section {
            width: 90%;
            max-width: 400px;
            padding: 20px;
            text-align: center;
            background: #ffffff;
            border: 2px solid #000;
            border-radius: 10px;
            box-shadow: 0px 10px 20px rgba(0, 0, 0, 0.2);
        }

        h2 {
            margin-bottom: 20px;
        }

        input, button {
            padding: 15px;
            width: 100%;
            max-width: 280px;
            border-radius: 50px;
            background: #d3d3d3;
            color: black;
            font-size: 1rem;
            text-align: center;
            margin: 0 auto;
            cursor: pointer;
            border: none;
        }

        input:focus, button:hover {
            background: #3498db;
        }

        .wheel-container {
            position: relative;
            width: 300px;
            height: 300px;
            margin: 20px auto;
        }

        .wheel {
            position: relative;
            width: 100%;
            height: 100%;
            border-radius: 50%;
            border: 5px solid #000;
            background: conic-gradient(
                #ff7675 0 60deg,
                #55efc4 60deg 120deg,
                #74b9ff 120deg 180deg,
                #ffeaa7 180deg 240deg,
                #a29bfe 240deg 300deg,
                #fab1a0 300deg 360deg
            );
            transition: transform 4s ease-out;
        }

        .wheel .number {
            position: absolute;
            font-size: 1.2rem;
            font-weight: bold;
            color: black;
            background: #fff;
            padding: 5px 10px;
            border-radius: 50px;
        }

        .arrow {
            position: absolute;
            bottom: -20px;
            left: 50%;
            transform: translateX(-50%) rotate(180deg);
            width: 40px;
            height: 40px;
            background: #ffcc00;
            clip-path: polygon(50% 0%, 0% 100%, 100% 100%);
            z-index: 2;
        }

        #countdown {
            margin-top: 20px;
            font-size: 1.2rem;
        }

        #spin-btn {
            background: #3498db;
            color: white;
            margin-top: 20px;
        }

        #result {
            margin-top: 20px;
            font-size: 1.5rem;
            font-weight: bold;
            color: #3498db;
        }

        #prizes-list {
            margin-top: 20px;
        }

        #prizes-list .prize-bar {
            background: #ffeaa7;
            border-radius: 10px;
            margin: 5px 0;
            padding: 10px;
        }
    </style>
</head>
<body>
    <div class="section" id="sign-section">
        <h2>ثبت شناسه</h2>
        <input type="text" id="game-id-input" placeholder="شناسه بازی">
        <button id="login-btn">تایید</button>
    </div>

    <div class="section hidden" id="spin-section">
        <h2>گردونه شانس</h2>
        <div class="wheel-container">
            <div class="arrow"></div>
            <div class="wheel" id="wheel">
                <div class="number n1">10</div>
                <div class="number n2">20</div>
                <div class="number n3">40</div>
                <div class="number n4">80</div>
                <div class="number n5">160</div>
                <div class="number n6">200</div>
            </div>
        </div>
        <div id="countdown"></div>
        <button id="spin-btn">چرخاندن گردونه</button>
        <div id="result"></div>
    </div>

    <div class="section hidden" id="prizes-page">
        <h2>جوایز شما</h2>
        <div id="prizes-list"></div>
        <button id="back-to-main">بازگشت</button>
    </div>

    <script>
        const signSection = document.getElementById("sign-section");
        const spinSection = document.getElementById("spin-section");
        const gameIdInput = document.getElementById("game-id-input");
        const spinBtn = document.getElementById("spin-btn");
        const countdown = document.getElementById("countdown");
        const resultDiv = document.getElementById("result");
        const prizesPage = document.getElementById("prizes-page");
        const prizesList = document.getElementById("prizes-list");
        const backToMainBtn = document.getElementById("back-to-main");

        let lastSpinTime = localStorage.getItem("lastSpinTime") || 0;
        const prizes = JSON.parse(localStorage.getItem("prizes") || "[]");

        function updateCountdown() {
            const now = Date.now();
            const timeRemaining = 24 * 60 * 60 * 1000 - (now - lastSpinTime);
            if (timeRemaining > 0) {
                const hours = Math.floor(timeRemaining / 1000 / 60 / 60);
                const minutes = Math.floor((timeRemaining % (1000 * 60 * 60)) / (1000 * 60));
                const seconds = Math.floor((timeRemaining % (1000 * 60)) / 1000);
                countdown.textContent = `زمان باقی‌مانده: ${hours} ساعت و ${minutes} دقیقه و ${seconds} ثانیه`;
                spinBtn.disabled = true;
            } else {
                countdown.textContent = "گردونه آماده چرخش است.";
                spinBtn.disabled = false;
            }
        }

        document.getElementById("login-btn").onclick = function () {
            const gameId = gameIdInput.value.trim();
            if (gameId) {
                localStorage.setItem("gameId", gameId);
                signSection.classList.add("hidden");
                spinSection.classList.remove("hidden");
                updateCountdown();
            }
        };

        spinBtn.onclick = function () {
            if (spinBtn.disabled) return;

            const spins = [10, 20, 40, 80, 160, 200];
            const randomIndex = Math.floor(Math.random() * spins.length);
            const chosenPrize = spins[randomIndex];
            const wheel = document.getElementById("wheel");

            const rotationDegree = 360 * 3 + randomIndex * 60;
            wheel.style.transition = "transform 4s ease-out"; 
            wheel.style.transform = `rotate(${rotationDegree}deg)`;

            setTimeout(() => {
                resultDiv.textContent = `تبریک! شما ${chosenPrize} سکه برنده شدید!`;
                prizes.push(chosenPrize);
                localStorage.setItem("prizes", JSON.stringify(prizes));
                localStorage.setItem("lastSpinTime", Date.now());
                updateCountdown();
            }, 4000);
        };

        showPrizesBtn.onclick = function () {
            prizesList.innerHTML = prizes.length > 0
                ? prizes.map(p => `<div class="prize-bar">امتیاز: ${p}</div>`).join("")
                : `<div class="prize-bar">هنوز جایزه‌ای ثبت نشده است.</div>`;
            prizesPage.classList.remove("hidden");
            spinSection.classList.add("hidden");
        };

        backToMainBtn.onclick = function () {
            prizesPage.classList.add("hidden");
            spinSection.classList.remove("hidden");
        };

        updateCountdown();
    </script>
</body>
</html>
