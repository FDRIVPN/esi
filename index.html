<!DOCTYPE html>
<html lang="fa">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>سیستم جوایز سه‌بعدی</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #ff6f61, #d4a5a5); /* گرادیانت زیبا */
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: auto; /* اسکرول صفحه */
            overflow-x: hidden;
        }

        .container {
            text-align: center;
            width: 90%;
            max-width: 700px;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 20px;
            box-shadow: 0px 8px 20px rgba(0, 0, 0, 0.3);
        }

        h1 {
            font-size: 2.5rem;
            margin-bottom: 20px;
            text-shadow: 2px 2px 5px rgba(0, 0, 0, 0.5);
        }

        input, button {
            font-size: 1.2rem;
            padding: 10px;
            border: none;
            border-radius: 10px;
            margin: 10px 0;
            width: 100%;
            outline: none;
            box-shadow: 0px 5px 10px rgba(0, 0, 0, 0.2);
        }

        input {
            background: #f5f5f5;
            color: #333;
        }

        button {
            background: #3498db;
            color: white;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            background: #2980b9;
            transform: translateY(-2px);
        }

        #wheel {
            width: 200px;
            height: 200px;
            margin: 20px auto;
            border: 5px solid #fff;
            border-radius: 50%;
            position: relative;
            background: conic-gradient(
                #ff7675 0 60deg,
                #55efc4 60deg 120deg,
                #74b9ff 120deg 180deg,
                #ffeaa7 180deg 240deg,
                #a29bfe 240deg 300deg,
                #fab1a0 300deg 360deg
            );
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 0px 10px 20px rgba(0, 0, 0, 0.5);
        }

        #wheel span {
            position: absolute;
            font-size: 16px;
            font-weight: bold;
            color: white;
        }

        #wheel span:nth-child(1) { top: 10%; left: 40%; }
        #wheel span:nth-child(2) { top: 30%; left: 10%; }
        #wheel span:nth-child(3) { top: 70%; left: 10%; }
        #wheel span:nth-child(4) { top: 90%; left: 40%; }
        #wheel span:nth-child(5) { top: 70%; right: 10%; }
        #wheel span:nth-child(6) { top: 30%; right: 10%; }

        #countdown {
            margin-top: 10px;
            font-size: 1.2rem;
            color: #ffd700;
        }

        ul {
            list-style: none;
            padding: 0;
        }

        ul li {
            background: rgba(255, 255, 255, 0.1);
            margin: 5px 0;
            padding: 10px;
            border-radius: 5px;
            text-align: left;
        }

        ul li span {
            font-weight: bold;
            color: #ffeaa7;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>سیستم جوایز سه‌بعدی</h1>
        <div id="login-section">
            <input type="text" id="game-id" placeholder="شناسه بازی خود را وارد کنید">
            <button id="login-btn">ورود</button>
        </div>
        <div id="main-section" class="hidden">
            <p>خوش آمدید! شناسه شما: <span id="user-id"></span></p>
            <div id="wheel">
                <span>10 سکه</span>
                <span>20 سکه</span>
                <span>40 سکه</span>
                <span>80 سکه</span>
                <span>160 سکه</span>
                <span>200 سکه</span>
            </div>
            <button id="spin-btn">چرخاندن گردونه</button>
            <p id="result">نتیجه: هنوز چیزی برنده نشده‌اید.</p>
            <p id="countdown" class="hidden">زمان باقی‌مانده: </p>
            <h3>جوایز شما:</h3>
            <ul id="prizes"></ul>
        </div>
    </div>

    <script>
        const loginSection = document.getElementById("login-section");
        const mainSection = document.getElementById("main-section");
        const gameIdInput = document.getElementById("game-id");
        const userIdSpan = document.getElementById("user-id");
        const spinBtn = document.getElementById("spin-btn");
        const resultParagraph = document.getElementById("result");
        const prizesList = document.getElementById("prizes");
        const wheel = document.getElementById("wheel");
        const countdown = document.getElementById("countdown");

        // بررسی شناسه در localStorage
        const savedGameId = localStorage.getItem("gameId");
        if (savedGameId) {
            userIdSpan.textContent = savedGameId;
            loginSection.classList.add("hidden");
            mainSection.classList.remove("hidden");
        }

        // مدیریت ورود
        document.getElementById("login-btn").addEventListener("click", () => {
            const gameId = gameIdInput.value.trim();
            if (gameId === "") {
                alert("لطفاً شناسه بازی خود را وارد کنید!");
                return;
            }
            localStorage.setItem("gameId", gameId);
            userIdSpan.textContent = gameId;
            loginSection.classList.add("hidden");
            mainSection.classList.remove("hidden");
        });

        // مدیریت گردونه
        spinBtn.addEventListener("click", () => {
            const now = new Date().getTime();
            const lastSpin = localStorage.getItem("lastSpin");

            if (lastSpin && now - lastSpin < 24 * 60 * 60 * 1000) {
                const timeLeft = 24 * 60 * 60 * 1000 - (now - lastSpin);
                alert(`باید صبر کنید ${Math.floor(timeLeft / (60 * 60 * 1000))} ساعت.`);
                return;
            }

            // ذخیره زمان چرخش
            localStorage.setItem("lastSpin", now);

            // شانس‌ها
            const weightedPrizes = [
                10, 10, 10, 20, 20, 20, 40, 40, 80, 160, 200
            ];
            const randomPrize = weightedPrizes[Math.floor(Math.random() * weightedPrizes.length)];

            // شبیه‌سازی چرخش گردونه
            wheel.style.animation = "spin 4s ease-in-out";
            setTimeout(() => {
                wheel.style.animation = "none";
                resultParagraph.textContent = `شما ${randomPrize} سکه برنده شدید!`;
                
                // افزودن جایزه به لیست
                const listItem = document.createElement("li");
                listItem.innerHTML = `🎉 <span>${randomPrize}</span> سکه - تاریخ: ${new Date().toLocaleDateString()}`;
                prizesList.appendChild(listItem);
            }, 4000);
        });

        // نمایش تایمر
        setInterval(() => {
            const now = new Date().getTime();
            const lastSpin = localStorage.getItem("lastSpin");

            if (lastSpin && now - lastSpin < 24 * 60 * 60 * 1000) {
                const timeLeft = 24 * 60 * 60 * 1000 - (now - lastSpin);
                const hours = Math.floor(timeLeft / (60 * 60 * 1000));
                const minutes = Math.floor((timeLeft % (60 * 60 * 1000)) / (60 * 1000));
                const seconds = Math.floor((timeLeft % (60 * 1000)) / 1000);
                countdown.textContent = `زمان باقی‌مانده: ${hours}:${minutes}:${seconds}`;
                countdown.classList.remove("hidden");
                spinBtn.disabled = true;
            } else {
                countdown.classList.add("hidden");
                spinBtn.disabled = false;
            }
        }, 1000);
    </script>
</body>
</html>
