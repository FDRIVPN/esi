<!DOCTYPE html>
<html lang="fa">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>سکه مجانی</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
            direction: rtl;
            text-align: center;
            overflow: hidden;
            position: relative;
            height: 100vh;
        }

        .wheel-container {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 300px;
            height: 300px;
        }

        .wheel {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            background-image: url('wheel.png'); /* عکس گردونه */
            background-size: cover;
            background-position: center;
            transform: rotate(0deg);
            transition: transform 3s ease-out;
        }

        .pointer {
            width: 0;
            height: 0;
            border-left: 15px solid transparent;
            border-right: 15px solid transparent;
            border-bottom: 30px solid red;
            position: absolute;
            top: -40px;
            left: 50%;
            transform: translateX(-50%);
        }

        .oval {
            position: absolute;
            width: 120px;
            height: 50px;
            background-color: lightgray;
            border-radius: 25px;
            line-height: 50px;
            font-weight: bold;
            text-align: center;
        }

        .oval.right {
            top: 10px;
            right: 20px;
        }

        /* آیکون منو */
        .menu-icon {
            position: fixed;
            top: 10px;
            right: 10px;
            width: 50px;
            height: 50px;
            cursor: pointer;
            background-image: url('menu.png'); /* عکس منو */
            background-size: cover;
            background-position: center;
        }

        .menu {
            display: none;
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 80%;
            max-width: 400px;
            background-color: white;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
            border-radius: 20px;
            padding: 20px;
        }

        .menu .menu-option {
            margin: 10px 0;
            padding: 15px;
            background-color: #f0f0f0;
            border-radius: 25px;
            font-size: 18px;
            cursor: pointer;
            text-align: center;
        }

        .menu .menu-option:hover {
            background-color: #ddd;
        }

        /* نمایش شناسه و سکه */
        .hidden {
            display: none;
        }

        .input-container {
            position: absolute;
            top: 40%;
            left: 50%;
            transform: translateX(-50%);
            width: 80%;
            max-width: 400px;
            background-color: #d3d3d3;
            padding: 20px;
            border-radius: 50px;
            text-align: center;
        }

        .input-box {
            width: 100%;
            padding: 10px;
            margin: 10px 0;
            border-radius: 50px;
            border: 1px solid #ccc;
            background-color: white;
        }

        .confirm-button {
            background-color: green;
            color: white;
            padding: 10px 20px;
            font-size: 18px;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            width: 100%;
        }
    </style>
</head>
<body>
    <!-- صفحه ورود شناسه -->
    <div class="input-container" id="input-container" style="display: none;">
        <input type="text" id="user-id" class="input-box" placeholder="شناسه خود را وارد کنید" />
        <button class="confirm-button" onclick="confirmUserId()">تایید</button>
    </div>

    <!-- گردونه -->
    <div class="wheel-container" id="wheel-container" style="display: none;">
        <div class="pointer"></div>
        <div class="wheel" id="wheel"></div>
    </div>

    <!-- بیضی‌ها -->
    <div class="oval right hidden" id="coins-info">
        <span id="coins-text">0 سکه بردی</span>
    </div>

    <!-- آیکون منو -->
    <div class="menu-icon" id="menu-icon" onclick="toggleMenu()"></div>

    <!-- منو -->
    <div class="menu" id="menu">
        <div class="menu-option">بازی‌ها</div>
        <div class="menu-option">سکه‌هایم</div>
        <div class="menu-option">اضافه اسم</div>
        <div class="menu-option">تغییر شناسه (یک بار)</div>
        <div class="menu-option">کمک‌گیری</div>
        <div class="menu-option">گزارشات</div>
        <div class="menu-option">گزارشات متداول</div>
    </div>

    <script>
        let coins = parseInt(localStorage.getItem('coins')) || 0;
        let userId = localStorage.getItem('userId');
        let canChangeId = localStorage.getItem('canChangeId') === 'true'; // بررسی اینکه آیا شناسه قابل تغییر است

        // چک کردن شناسه کاربر
        if (userId) {
            loadWheelPage();
        } else {
            document.getElementById('input-container').style.display = 'block';
        }

        // تایید شناسه
        function confirmUserId() {
            const inputUserId = document.getElementById('user-id').value.trim();

            if (inputUserId) {
                localStorage.setItem('userId', inputUserId);
                localStorage.setItem('coins', 0);
                localStorage.setItem('canChangeId', 'false'); // دیگر نمی‌توان شناسه را تغییر داد
                loadWheelPage();
            } else {
                alert("لطفاً شناسه خود را وارد کنید.");
            }
        }

        // بارگذاری صفحه گردونه
        function loadWheelPage() {
            document.getElementById('input-container').style.display = 'none';
            document.getElementById('wheel-container').style.display = 'block';
            document.getElementById('coins-info').textContent = coins + " سکه";
            document.getElementById('coins-info').classList.remove('hidden');
        }

        // چرخاندن گردونه
        function spinWheel() {
            if (spinning) return;
            spinning = true;
            const prize = getRandomPrize();
            const spinAngle = prize.angle + Math.random() * 360;
            wheel.style.transform = `rotate(${spinAngle}deg)`;

            setTimeout(() => {
                alert(`شما ${prize.prize} بردید!`);
                coins += prize.prize;
                localStorage.setItem('coins', coins);
                document.getElementById('coins-info').textContent = coins + " سکه";
                spinning = false;
            }, 3000);
        }

        // دریافت یک جایزه تصادفی
        function getRandomPrize() {
            const prizeChances = [
                { angle: 0, prize: 30 },
                { angle: 45, prize: 60 },
                { angle: 90, prize: 90 },
                { angle: 135, prize: 120 },
                { angle: 180, prize: 150 },
                { angle: 225, prize: 180 },
                { angle: 270, prize: 200 },
                { angle: 315, prize: 250 }
            ];
            const randomNum = Math.random() * 100;
            let cumulativeChance = 0;
            for (const prize of prizeChances) {
                cumulativeChance += 10;
                if (randomNum < cumulativeChance) {
                    return prize;
                }
            }
            return prizeChances[0];
        }

        // باز و بسته کردن منو
        function toggleMenu() {
            const menu = document.getElementById('menu');
            menu.style.display = menu.style.display === 'block' ? 'none' : 'block';
        }
    </script>
</body>
</html>
