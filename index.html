<!DOCTYPE html>
<html lang="fa">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>بازی گردونه</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            direction: rtl;
            text-align: center;
        }
        .header {
            background-color: black;
            color: white;
            padding: 10px 0;
        }
        .input-container {
            background-color: lightgray;
            padding: 20px;
            border-radius: 30px;
            margin: 20px auto;
            width: 300px;
        }
        .input-container input {
            width: 80%;
            padding: 10px;
            border: none;
            border-radius: 30px;
            outline: none;
            text-align: center;
        }
        .input-container button {
            margin-top: 10px;
            padding: 10px 20px;
            border: none;
            border-radius: 30px;
            background-color: green;
            color: white;
            cursor: pointer;
        }
        .wheel-container {
            margin: 20px auto;
            position: relative;
        }
        .wheel {
            width: 300px;
            height: 300px;
            border-radius: 50%;
            border: 10px solid lightgray;
            position: relative;
        }
        .segment {
            width: 50%;
            height: 50%;
            background-color: #f4f4f4;
            border: 1px solid black;
            position: absolute;
            transform-origin: bottom right;
        }
        .spin-button {
            margin-top: 20px;
            padding: 10px 20px;
            border: none;
            border-radius: 30px;
            background-color: blue;
            color: white;
            cursor: pointer;
        }
        .result {
            margin-top: 20px;
            font-size: 18px;
            font-weight: bold;
        }
        .oval {
            position: absolute;
            border-radius: 50%;
            width: 100px;
            height: 50px;
            background-color: lightgray;
            text-align: center;
            line-height: 50px;
            font-size: 14px;
            font-weight: bold;
        }
        .oval.left {
            top: 10px;
            left: 10px;
        }
        .oval.right {
            top: 10px;
            right: 10px;
        }
        .prize-list {
            display: none;
            background-color: #fff;
            padding: 20px;
            border: 1px solid lightgray;
            border-radius: 10px;
        }
    </style>
</head>
<body>
    <div class="header">بازی گردونه</div>

    <div class="input-container" id="login-section">
        <input type="text" id="username" placeholder="شناسه خود را وارد کنید">
        <button onclick="startGame()">تایید</button>
    </div>

    <div id="game-section" style="display: none;">
        <div class="oval left" id="user-display"></div>
        <div class="oval right" onclick="showPrizes()">جوایز</div>
        <div class="wheel-container">
            <div class="wheel" id="wheel">
                <div class="segment" style="transform: rotate(0deg); background-color: lightblue;">30</div>
                <div class="segment" style="transform: rotate(45deg); background-color: lightgreen;">60</div>
                <div class="segment" style="transform: rotate(90deg); background-color: lightcoral;">90</div>
                <div class="segment" style="transform: rotate(135deg); background-color: lightgoldenrodyellow;">120</div>
                <div class="segment" style="transform: rotate(180deg); background-color: lightpink;">150</div>
                <div class="segment" style="transform: rotate(225deg); background-color: lightgray;">180</div>
                <div class="segment" style="transform: rotate(270deg); background-color: lightsteelblue;">210</div>
                <div class="segment" style="transform: rotate(315deg); background-color: lightsalmon;">240</div>
            </div>
        </div>
        <button class="spin-button" id="spin-btn" onclick="spinWheel()">چرخاندن</button>
        <div class="result" id="result"></div>
    </div>

    <div class="prize-list" id="prize-list">
        <h3>جوایز</h3>
        <div id="prizes"></div>
    </div>

    <script>
        let prizes = [];
        let spinning = false;

        function startGame() {
            const username = document.getElementById("username").value;
            if (username) {
                document.getElementById("login-section").style.display = "none";
                document.getElementById("game-section").style.display = "block";
                document.getElementById("user-display").textContent = username;
            } else {
                alert("لطفا شناسه خود را وارد کنید");
            }
        }

        function spinWheel() {
            if (spinning) return;
            spinning = true;

            const wheel = document.getElementById("wheel");
            const spinBtn = document.getElementById("spin-btn");
            const result = document.getElementById("result");

            spinBtn.disabled = true;
            result.textContent = "";

            const randomSpin = Math.floor(Math.random() * 8) * 45 + 3600; // چرخش تصادفی
            wheel.style.transition = "transform 3s ease-out";
            wheel.style.transform = `rotate(${randomSpin}deg)`;

            setTimeout(() => {
                spinning = false;
                const finalAngle = randomSpin % 360;
                const prizeIndex = Math.floor(finalAngle / 45);
                const prizeValues = [30, 60, 90, 120, 150, 180, 210, 240];
                const prize = prizeValues[prizeIndex];
                prizes.push({ value: prize, date: new Date().toLocaleDateString("fa-IR") });
                result.textContent = `${prize} سکه بردی!`;
                spinBtn.disabled = true;
            }, 3000);
        }

        function showPrizes() {
            const prizeList = document.getElementById("prize-list");
            const prizesDiv = document.getElementById("prizes");
            prizesDiv.innerHTML = prizes.map(p => `<p>سکه: ${p.value} - تاریخ: ${p.date}</p>`).join("");
            prizeList.style.display = "block";
        }
    </script>
</body>
</html>
