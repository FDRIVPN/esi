<!DOCTYPE html>
<html lang="fa">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Coin Game</title>
    <style>
        html, body {
            background-color: black;
            margin: 0;
            font-family: Arial, sans-serif;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
        }
        #score-container {
            position: absolute;
            top: calc(50% - 60px);
            left: 50%;
            transform: translateX(-50%);
        }
        #userScore {
            font-size: 48px;
            color: white;
        }
        #bottom-bar {
            position: fixed;
            bottom: 0;
            width: 100%;
            height: 150px; /* ارتفاع نوار پایین */
            background-color: #1a1a1a;
            display: flex;
            justify-content: space-around;
            align-items: center;
        }
        .icon-container {
            text-align: center;
            cursor: pointer;
        }
        .icon-container img {
            width: 40px; /* اندازه عکس‌ها */
            height: 40px; /* اندازه عکس‌ها */
        }
        .icon-container p {
            margin: 2px 0 0 0;
            font-size: 20px; /* اندازه متن */
            font-weight: 300; /* نازکی متن */
            color: #7d7d7d; /* رنگ متن معمولی */
        }
        .active p {
            color: white; /* رنگ متن فعال */
            font-weight: 400; /* ضخامت متن فعال */
        }
    </style>
</head>
<body>
    <div id="score-container">
        <span id="userScore">0</span> <!-- امتیاز کاربر -->
    </div>

    <div id="bottom-bar">
        <div class="icon-container" id="icon1">
            <img src="image1.png" alt="Home">
            <p id="text1" style="color: white; font-weight: 400;">Home</p> <!-- متن Home سفید -->
        </div>
        <div class="icon-container" id="icon2">
            <img src="image2.png" alt="Lig">
            <p id="text2">Lig</p>
        </div>
        <div class="icon-container" id="icon3">
            <img src="image3.png" alt="Friend">
            <p id="text3">Friend</p>
        </div>
    </div>

    <script>
        const scoreElement = document.getElementById('userScore');
        let score = parseInt(localStorage.getItem('score')) || 0; // دریافت امتیاز از localStorage
        scoreElement.textContent = score;

        // افزایش امتیاز و ذخیره در localStorage
        function increaseScore() {
            score++;
            localStorage.setItem('score', score); // ذخیره امتیاز
            scoreElement.textContent = score;
        }

        const icons = document.querySelectorAll('.icon-container');
        const texts = document.querySelectorAll('.icon-container p');

        // تغییر وضعیت به حالت فعال
        function activateIcon(index) {
            texts.forEach(text => {
                text.style.color = '#7d7d7d'; // رنگ متن‌های معمولی
                text.style.fontWeight = '300'; // نازکی متن معمولی
            });
            texts[index].style.color = 'white'; // رنگ متن فعال
            texts[index].style.fontWeight = '400'; // ضخامت متن فعال
        }

        // رویداد کلیک برای هر آیکون
        icons.forEach((icon, index) => {
            icon.addEventListener('click', () => {
                activateIcon(index);
                increaseScore(); // هر کلیک باعث افزایش امتیاز می‌شود
            });
        });
    </script>
</body>
</html>
