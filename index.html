<!DOCTYPE html>
<html lang="fa">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Coin Game</title>
    <style>
        html, body {
            background-color: black;
            margin: 0;
            font-family: Arial, sans-serif;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }
        #score-container {
            position: absolute;
            top: 20%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: white;
            font-size: 40px; /* تغییر اندازه امتیاز */
        }
        #bottom-bar {
            position: fixed;
            bottom: 0;
            width: 100%;
            height: 70px;
            background-color: #1a1a1a;
            display: flex;
            justify-content: space-around;
            align-items: center;
        }
        .icon-container {
            text-align: center;
            cursor: pointer;
            transition: color 0.3s, font-weight 0.3s;
        }
        .icon-container img {
            width: 40px; /* اندازه تصاویر */
            height: 40px; /* اندازه تصاویر */
            transition: transform 0.3s;
        }
        .icon-container p {
            margin: 2px 0 0 0;
            font-size: 14px;
            font-weight: 300;
            display: none;
        }
        .active img {
            transform: scale(1.2);
        }
        .active p {
            color: white;
            font-weight: 700;
            display: block;
        }
        .icon-container:not(.active) img {
            transform: scale(1);
        }
        #content {
            flex: 1;
            display: none;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 24px;
            text-align: center;
        }
        /* استایل برای پنل مدیریت */
        #adminPanel {
            display: none;
            flex-direction: column;
            align-items: center;
            margin-top: 20px;
        }
        #uploadedImage {
            max-width: 300px;
            margin-top: 20px;
        }
        #addedText {
            display: none;
            margin-top: 10px;
            color: white;
        }
        hr {
            width: 100%;
            border: 1px solid white;
            margin: 10px 0;
        }
    </style>
</head>
<body>
    <div id="score-container">
        <span id="userScore">0</span> <span>task</span>
    </div>

    <div id="content">
        <div id="homeContent" style="text-align: center;">
            <img src="tortles.png" alt="Tortles" style="width: 100px; margin-bottom: 10px;">
            <div style="display: flex; align-items: center; justify-content: center;">
                <span id="userScore" style="font-size: 24px;">0</span>
                <span style="margin-left: 10px;">tortles</span>
            </div>
        </div>
        <div id="comingSoon" style="display: none;">Coming Soon...</div>
    </div>

    <div id="bottom-bar">
        <div class="icon-container active" id="icon1">
            <img src="image1.png" alt="Home" id="icon1Img">
            <p>Home</p>
        </div>
        <div class="icon-container" id="icon2">
            <img src="image3.png" alt="Leaderboard" id="icon2Img">
            <p>Leaderboard</p>
        </div>
        <div class="icon-container" id="icon3">
            <img src="image2.png" alt="Friend" id="icon3Img">
            <p>Friend</p>
        </div>
    </div>

    <!-- پنل مدیریت -->
    <div id="adminPanel">
        <h2 style="color: white;">پنل مدیریت</h2>
        <input type="file" id="imageUpload" accept="image/*">
        <button id="uploadImageButton">بارگذاری تصویر</button>
        <button id="addTextButton">اضافه کردن متن</button>
        <div id="uploadedImage"></div>
        <div id="addedText"></div>
    </div>

    <script>
        const icon1 = document.getElementById('icon1');
        const icon2 = document.getElementById('icon2');
        const icon3 = document.getElementById('icon3');
        const scoreElement = document.getElementById('userScore');
        const adminPanel = document.getElementById('adminPanel');
        const addedText = document.getElementById('addedText');

        // دریافت امتیاز از localStorage یا تنظیم آن به 0 اگر موجود نباشد
        let score = parseInt(localStorage.getItem('score')) || 0;
        scoreElement.textContent = score;

        // بررسی کد مدیر
        function checkAdminCode() {
            const adminCode = prompt("لطفاً کد مدیر را وارد کنید:");
            if (adminCode === '123') {
                localStorage.setItem('isAdmin', 'true');
                adminPanel.style.display = 'flex'; // نمایش پنل مدیریت
            }
        }

        // نمایش محتوای صفحه
        function showContent(contentId) {
            document.getElementById('homeContent').style.display = 'none';
            document.getElementById('comingSoon').style.display = 'none';

            if (contentId === 'home') {
                document.getElementById('homeContent').style.display = 'block';
            } else {
                document.getElementById('comingSoon').style.display = 'block';
            }
        }

        // تابع برای تغییر وضعیت به حالت فعال و تغییر عکس‌ها
        function activateIcon(icon, newImageSrc, contentId) {
            document.querySelectorAll('.icon-container').forEach(el => {
                el.classList.remove('active');
                el.querySelector('p').style.fontWeight = '400';
                const img = el.querySelector('img');
                if (el.id === 'icon1') {
                    img.src = 'image1.png'; // تصویر Home
                } else if (el.id === 'icon2') {
                    img.src = 'image3.png'; // تصویر Leaderboard
                } else if (el.id === 'icon3') {
                    img.src = 'image2.png'; // تصویر Friend
                }
                el.querySelector('p').style.display = 'none';
            });

            icon.classList.add('active');
            icon.querySelector('p').style.fontWeight = '700';
            icon.querySelector('img').src = newImageSrc;
            icon.querySelector('p').style.display = 'block';

            showContent(contentId);
        }

        // رویداد کلیک برای هر آیکون
        icon1.addEventListener('click', () => {
            activateIcon(icon1, 'image1_active.png', 'home');
            scoreElement.textContent = score; // نمایش امتیاز
        });

        icon2.addEventListener('click', () => {
            activateIcon(icon2, 'image2_active.png', 'comingSoon');
            scoreElement.textContent = score; // نمایش امتیاز
        });

        icon3.addEventListener('click', () => {
            activateIcon(icon3, 'image3_active.png', 'comingSoon');
            scoreElement.textContent = score; // نمایش امتیاز
        });

        // رویداد بارگذاری تصویر
        document.getElementById('uploadImageButton').addEventListener('click', () => {
            const fileInput = document.getElementById('imageUpload');
            if (fileInput.files.length > 0) {
                const file = fileInput.files[0];
                const reader = new FileReader();
                reader.onload = function (e) {
                    const img = document.createElement('img');
                    img.src = e.target.result;
                    img.id = 'uploadedImage';
                    img.style.maxWidth = '300px';
                    document.getElementById('uploadedImage').innerHTML = '';
                    document.getElementById('uploadedImage').appendChild(img);
                };
                reader.readAsDataURL(file);
            }
        });

        // رویداد اضافه کردن متن
        document.getElementById('addTextButton').addEventListener('click', () => {
            const text = prompt("متن مورد نظر را وارد کنید:");
            if (text) {
                addedText.textContent = text;
                addedText.style.display = 'block';
            }
        });

        // بررسی ورود به سیستم مدیر
        if (localStorage.getItem('isAdmin') === 'true') {
            adminPanel.style.display = 'flex';
        } else {
            checkAdminCode();
        }

        // ذخیره امتیاز در localStorage
        window.addEventListener('beforeunload', () => {
            localStorage.setItem('score', score);
        });
    </script>
</body>
</html>
