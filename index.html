<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Coin Game</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-image: url('background.jpg'); /* نام عکس بک‌گراند */
            background-size: cover; /* اندازه‌گیری بک‌گراند */
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            height: 100vh;
        }
        #coin {
            width: 350px;
            height: 350px;
            cursor: pointer;
        }
        #score {
            position: absolute;
            top: 50px;
            font-size: 30px;
            color: white;
            font-family: sans-serif;
        }
        #message {
            font-size: 24px;
            color: black;
        }
        #userInfoButton {
            display: none; /* پنهان به صورت پیش‌فرض */
            margin-top: 20px;
            padding: 10px 20px;
            font-size: 20px;
            background-color: white;
            color: black;
            border: none;
            cursor: pointer;
        }
    </style>
</head>
<body>

<div id="score" style="display: none;">
    <img src="Coin_6.png" alt="Coin" style="width: 50px; vertical-align: middle;">
    <span id="userScore">0</span>
</div>
<img id="coin" src="ggg.png" alt="Coin" style="display: none;">
<div id="message">Mini app is under maintenance</div>
<button id="userInfoButton" onclick="showUserInfo()">Show User Info</button>

<script>
    const adminId = 765041693;
    const adminUsername = "@r_rasol_l";
    const botToken = '7308080366:AAEZlSs4KRjLcwXsRF2jyDwriDkx-2egbpg'; // توکن بات تلگرام خود را اینجا قرار دهید

    const scoreElement = document.getElementById('score');
    const userScoreElement = document.getElementById('userScore');
    const coinElement = document.getElementById('coin');
    const messageElement = document.getElementById('message');
    const userInfoButton = document.getElementById('userInfoButton');
    let score = parseInt(localStorage.getItem('score')) || 0;

    // به‌روزرسانی امتیاز
    function updateScore() {
        score++;
        localStorage.setItem('score', score);
        userScoreElement.textContent = score;

        // نمایش +1 در جای کلیک
        const plusOne = document.createElement('div');
        plusOne.textContent = '+1';
        plusOne.style.position = 'absolute';
        plusOne.style.color = 'white';
        plusOne.style.fontSize = '30px'; // اندازه بزرگتر برای +1
        plusOne.style.top = `${event.clientY}px`;
        plusOne.style.left = `${event.clientX}px`;
        document.body.appendChild(plusOne);
        setTimeout(() => plusOne.remove(), 1000);
    }

    // رویداد کلیک روی سکه
    coinElement.addEventListener('click', updateScore);

    // دریافت اطلاعات کاربر از طریق API تلگرام
    async function getUserInfo(userId) {
        try {
            const response = await fetch(`https://api.telegram.org/bot${botToken}/getChatMember?chat_id=@your_channel_username&user_id=${userId}`); // اینجا نام کاربر خود را بگذارید
            const data = await response.json();

            if (data.ok && (data.result.user.id === adminId || data.result.user.username === adminUsername)) {
                return {
                    id: data.result.user.id,
                    username: data.result.user.username
                };
            } else {
                return null; // کاربر عادی است
            }
        } catch (error) {
            console.error('Error fetching user info:', error);
            return null;
        }
    }

    // بررسی مدیر بودن یا نبودن کاربر
    const userId = 765041693; // ID کاربر فعلی را اینجا بگذارید
    getUserInfo(userId).then(userInfo => {
        if (userInfo) {
            // مدیر است، صفحه بازی نمایش داده شود
            scoreElement.style.display = 'block';
            coinElement.style.display = 'block';
            messageElement.style.display = 'none';
            userScoreElement.textContent = score;
            userInfoButton.style.display = 'block'; // نمایش دکمه اطلاعات کاربر
        } else {
            // کاربر عادی است، صفحه سفید و پیام نمایش داده شود
            document.body.style.backgroundColor = 'white';
            messageElement.style.color = 'black';
            scoreElement.style.display = 'none';
            coinElement.style.display = 'none';
        }
    });

    function showUserInfo() {
        // اینجا می‌توانید کد برای نمایش اطلاعات کاربران را قرار دهید
        alert('Showing user information'); // فقط برای آزمایش
    }
</script>

</body>
</html>
