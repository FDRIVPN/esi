<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Coin Game</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-image: url('./background.png'); /* تصویر پس‌زمینه اصلی */
            background-size: cover;
            background-position: center;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            position: relative;
            user-select: none; /* جلوگیری از انتخاب متن */
        }
        #coin {
            width: 350px; /* اندازه سکه */
            height: 350px;
            position: absolute; /* برای تعیین موقعیت دقیق */
            top: 50%; /* قرار دادن در مرکز عمودی */
            left: 50%; /* قرار دادن در مرکز افقی */
            transform: translate(-50%, -50%); /* جابجایی برای مرکز */
        }
        #score {
            position: absolute;
            top: 20px;
            left: 20px;
            font-size: 30px;
            color: white;
            font-family: sans-serif;
        }
        .plus-one {
            position: absolute;
            font-size: 30px;
            color: white;
            animation: fadeOut 1s forwards;
        }
        @keyframes fadeOut {
            0% {
                opacity: 1;
                transform: translateY(0);
            }
            100% {
                opacity: 0;
                transform: translateY(-50px);
            }
        }
    </style>
</head>
<body>

<div id="score">0</div>
<img id="coin" src="ggg.png" alt="Coin">

<script>
    const scoreElement = document.getElementById('score');
    const coinElement = document.getElementById('coin');
    let score = parseInt(localStorage.getItem('score')) || 0;

    // به‌روزرسانی امتیاز
    function updateScore(event) {
        event.preventDefault(); // جلوگیری از نمایش لینک تصویر
        const coinRect = coinElement.getBoundingClientRect();

        // بررسی اینکه آیا کلیک در داخل محدوده سکه است یا نه
        if (event.clientX >= coinRect.left && event.clientX <= coinRect.right &&
            event.clientY >= coinRect.top && event.clientY <= coinRect.bottom) {
            score++;
            localStorage.setItem('score', score);
            scoreElement.textContent = `Score: ${score}`;

            // اضافه کردن +1 در جایی که کلیک شده
            const plusOne = document.createElement('div');
            plusOne.textContent = '+1';
            plusOne.classList.add('plus-one');
            plusOne.style.left = `${event.clientX}px`;
            plusOne.style.top = `${event.clientY}px`;
            document.body.appendChild(plusOne);

            // حذف +1 پس از اتمام انیمیشن
            setTimeout(() => {
                plusOne.remove();
            }, 1000);
        }
    }

    // رویداد کلیک روی بدنه برای امتیاز
    document.body.addEventListener('click', updateScore);

    // نمایش امتیاز اولیه
    scoreElement.textContent = `Score: ${score}`;
</script>

</body>
</html>
