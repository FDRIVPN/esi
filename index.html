<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Coin Game</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-image: url('./background.png'); /* تصویر پس‌زمینه */
            background-size: cover;
            background-position: center;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            position: relative;
            user-select: none; /* جلوگیری از انتخاب متن */
            touch-action: manipulation; /* جلوگیری از رفتار پیش‌فرض لمس */
        }
        #coin {
            width: 350px; /* اندازه سکه */
            height: 350px;
            position: absolute; /* برای تعیین موقعیت دقیق */
            top: 50%; /* قرار دادن در مرکز عمودی */
            left: 50%; /* قرار دادن در مرکز افقی */
            transform: translate(-50%, -50%); /* جابجایی برای مرکز */
        }
        #score {
            position: absolute;
            top: 20px;
            left: 20px;
            font-size: 30px;
            color: white; /* رنگ سفید برای امتیاز */
            font-family: sans-serif;
        }
        .plus-one {
            position: absolute;
            font-size: 30px;
            color: white;
            animation: fadeOut 1s forwards;
        }
        @keyframes fadeOut {
            0% {
                opacity: 1;
                transform: translateY(0);
            }
            100% {
                opacity: 0;
                transform: translateY(-50px);
            }
        }
    </style>
</head>
<body>

<div id="score">0</div>
<img id="coin" src="ggg.png" alt="Coin">

<script>
    const scoreElement = document.getElementById('score');
    const coinElement = document.getElementById('coin');
    let score = parseInt(localStorage.getItem('score')) || 0;

    // به‌روزرسانی امتیاز
    function updateScore(x, y) {
        score++; // افزایش امتیاز
        localStorage.setItem('score', score); // ذخیره امتیاز در localStorage
        scoreElement.textContent = `Score: ${score}`; // به‌روز رسانی نمایش امتیاز

        // نمایش +1 در محل کلیک
        const plusOneElement = document.createElement('div');
        plusOneElement.className = 'plus-one';
        plusOneElement.textContent = '+1';
        document.body.appendChild(plusOneElement);
        plusOneElement.style.left = `${x}px`;
        plusOneElement.style.top = `${y}px`;
        setTimeout(() => {
            plusOneElement.remove(); // حذف عنصر پس از یک ثانیه
        }, 1000);
    }

    // رویداد کلیک روی سکه
    coinElement.addEventListener('click', function(event) {
        // دریافت مختصات کلیک
        const clickX = event.clientX;
        const clickY = event.clientY;

        // بررسی کلیک در داخل منطقه سکه
        const coinRect = coinElement.getBoundingClientRect();
        if (
            clickX >= coinRect.left &&
            clickX <= coinRect.right &&
            clickY >= coinRect.top &&
            clickY <= coinRect.bottom
        ) {
            updateScore(clickX, clickY); // به‌روزرسانی امتیاز و نمایش +1
        }
    });

    // جلوگیری از نمایش لینک تصویر و منوی راست‌کلیک
    const preventDefaultAction = (event) => {
        event.preventDefault(); // جلوگیری از منوی راست‌کلیک
    };

    coinElement.addEventListener('contextmenu', preventDefaultAction); // برای کلیک راست
    coinElement.addEventListener('mousedown', preventDefaultAction); // برای کلیک ماوس
    coinElement.addEventListener('touchstart', preventDefaultAction); // برای لمس

    // نمایش امتیاز اولیه
    scoreElement.textContent = `Score: ${score}`;
</script>

</body>
</html>
