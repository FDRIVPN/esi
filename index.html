<!DOCTYPE html>
<html lang="fa">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>گردونه شانس</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #ff6f61, #d4a5a5);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            color: white;
        }

        .hidden {
            display: none;
        }

        .section {
            width: 100%;
            max-width: 400px;
            padding: 20px;
            text-align: center;
            box-shadow: 0px 10px 20px rgba(0, 0, 0, 0.5);
            border-radius: 10px;
            background: rgba(255, 255, 255, 0.1);
        }

        .wheel-container {
            position: relative;
            width: 300px;
            height: 300px;
            margin: 0 auto;
        }

        .wheel {
            position: relative;
            width: 100%;
            height: 100%;
            border-radius: 50%;
            border: 5px solid #fff;
            background: conic-gradient(
                #ff7675 0 60deg,
                #55efc4 60deg 120deg,
                #74b9ff 120deg 180deg,
                #ffeaa7 180deg 240deg,
                #a29bfe 240deg 300deg,
                #fab1a0 300deg 360deg
            );
            transform-origin: center;
            animation: none;
        }

        .wheel .number {
            position: absolute;
            font-size: 1.2rem;
            font-weight: bold;
            color: white;
            text-shadow: 1px 1px 3px rgba(0, 0, 0, 0.5);
        }

        .wheel .n1 { transform: rotate(30deg) translate(110px); }
        .wheel .n2 { transform: rotate(90deg) translate(110px); }
        .wheel .n3 { transform: rotate(150deg) translate(110px); }
        .wheel .n4 { transform: rotate(210deg) translate(110px); }
        .wheel .n5 { transform: rotate(270deg) translate(110px); }
        .wheel .n6 { transform: rotate(330deg) translate(110px); }

        .arrow {
            position: absolute;
            top: -20px;
            left: 50%;
            transform: translateX(-50%);
            width: 40px;
            height: 40px;
            background: #ffcc00;
            clip-path: polygon(50% 0%, 0% 100%, 100% 100%);
            z-index: 2;
        }

        button {
            margin-top: 20px;
            padding: 10px 20px;
            font-size: 1rem;
            color: white;
            background: #3498db;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            box-shadow: 0px 5px 10px rgba(0, 0, 0, 0.3);
        }

        button:hover {
            background: #2980b9;
        }

        .prize-bar {
            margin: 10px 0;
            padding: 10px;
            background: rgba(0, 0, 0, 0.2);
            border-radius: 10px;
            text-align: left;
        }

        .prize-bar .title {
            font-weight: bold;
        }
    </style>
</head>
<body>
    <!-- صفحه ثبت نام -->
    <div class="section" id="sign-section">
        <h2>ثبت شناسه</h2>
        <input type="text" id="game-id-input" placeholder="شناسه بازی" style="padding: 10px; width: 100%; margin-bottom: 20px;">
        <button id="login-btn">تایید</button>
    </div>

    <!-- صفحه گردونه -->
    <div class="section hidden" id="spin-section">
        <div class="wheel-container">
            <div class="arrow"></div>
            <div class="wheel" id="wheel">
                <div class="number n1">10</div>
                <div class="number n2">20</div>
                <div class="number n3">40</div>
                <div class="number n4">80</div>
                <div class="number n5">160</div>
                <div class="number n6">200</div>
            </div>
        </div>
        <div id="countdown" style="margin-top: 20px; font-size: 1.2rem; color: #ffeaa7;">زمان باقی‌مانده: </div>
        <button id="spin-btn">چرخاندن گردونه</button>
        <button id="show-prizes-btn">نمایش جوایز</button>
    </div>

    <!-- صفحه جوایز -->
    <div class="section hidden" id="prizes-page">
        <h2>جوایز شما</h2>
        <div id="prizes-list"></div>
        <button id="back-to-main">بازگشت</button>
    </div>

    <script>
        const signSection = document.getElementById("sign-section");
        const spinSection = document.getElementById("spin-section");
        const prizesPage = document.getElementById("prizes-page");

        const gameIdInput = document.getElementById("game-id-input");
        const spinBtn = document.getElementById("spin-btn");
        const countdown = document.getElementById("countdown");
        const showPrizesBtn = document.getElementById("show-prizes-btn");
        const backToMainBtn = document.getElementById("back-to-main");
        const prizesList = document.getElementById("prizes-list");

        let userId = '';
        let lastSpinTime = localStorage.getItem("lastSpinTime") || 0;
        const prizes = JSON.parse(localStorage.getItem("prizes") || "[]");

        function updateCountdown() {
            const now = Date.now();
            const timeRemaining = 24 * 60 * 60 * 1000 - (now - lastSpinTime);
            if (timeRemaining > 0) {
                const hours = Math.floor(timeRemaining / 1000 / 60 / 60);
                const minutes = Math.floor((timeRemaining % (1000 * 60 * 60)) / (1000 * 60));
                countdown.textContent = `زمان باقی‌مانده: ${hours} ساعت و ${minutes} دقیقه`;
                spinBtn.disabled = true;
            } else {
                countdown.textContent = "گردونه آماده چرخش است.";
                spinBtn.disabled = false;
            }
        }

        document.getElementById("login-btn").onclick = function () {
            const gameId = gameIdInput.value.trim();
            if (gameId) {
                userId = gameId;
                localStorage.setItem("gameId", userId);
                signSection.classList.add("hidden");
                spinSection.classList.remove("hidden");
                updateCountdown();
            }
        };

        spinBtn.onclick = function () {
            if (spinBtn.disabled) return;

            const spins = [10, 20, 40, 80, 160, 200];
            const weights = [3, 3, 2, 2, 1, 1];
            const totalWeight = weights.reduce((a, b) => a + b, 0);
            const random = Math.random() * totalWeight;
            let cumulativeWeight = 0;
            let chosenIndex = 0;

            for (let i = 0; i < weights.length; i++) {
                cumulativeWeight += weights[i];
                if (random < cumulativeWeight) {
                    chosenIndex = i;
                    break;
                }
            }

            const chosenPrize = spins[chosenIndex];
            const rotation = 360 * 4 + (360 - chosenIndex * (360 / spins.length));
            const finalRotation = rotation % 360;

            const wheel = document.getElementById("wheel");
            wheel.style.transition = "transform 4s ease-out";
            wheel.style.transform = `rotate(${rotation}deg)`;

            setTimeout(() => {
                wheel.style.transition = "none";
                wheel.style.transform = `rotate(${finalRotation}deg)`;
                prizes.push({ amount: chosenPrize, date: new Date().toLocaleString() });
                localStorage.setItem("prizes", JSON.stringify(prizes));
                localStorage.setItem("lastSpinTime", Date.now());
                updateCountdown();
            }, 4000);
        };

        showPrizesBtn.onclick = function () {
            spinSection.classList.add("hidden");
            prizesPage.classList.remove("hidden");
            displayPrizes();
        };

        backToMainBtn.onclick = function () {
            prizesPage.classList.add("hidden");
            spinSection.classList.remove("hidden");
        };

        function displayPrizes() {
            prizesList.innerHTML = "";
            prizes.reverse().forEach((prize, index) => {
                const prizeBar = document.createElement("div");
                prizeBar.className = "prize-bar";
                prizeBar.innerHTML = `
                    <div class="title">جایزه ${index + 1}</div>
                    <div>سکه: ${prize.amount}</div>
                    <div>تاریخ: ${prize.date}</div>
                `;
                prizesList.appendChild(prizeBar);
            });
        }

        updateCountdown();
    </script>
</body>
</html>
