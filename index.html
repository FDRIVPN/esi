<!DOCTYPE html>
<html lang="fa">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Coin Game</title>
    <style>
        html, body {
            background-color: black;
            margin: 0;
            font-family: Arial, sans-serif;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: flex-start; /* تغییر مرکزیت محتوا به بالا */
            align-items: center;
        }

        #score-container {
            position: relative; /* تغییر موقعیت به نسبی */
            top: 20px;
            color: white;
            font-size: 48px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
        }

        #score-content {
            display: flex;
            align-items: center;
            justify-content: center;
            margin-top: 10px;
        }

        #score-content img {
            margin-right: 10px;
        }

        #bottom-bar {
            position: fixed;
            bottom: 0;
            width: 100%;
            height: 70px;
            background-color: #1a1a1a;
            display: flex;
            justify-content: space-around;
            align-items: center;
        }

        .icon-container {
            text-align: center;
            cursor: pointer;
            transition: color 0.3s, font-weight 0.3s;
        }

        .icon-container img {
            width: 20px;
            height: 20px;
        }

        .icon-container p {
            margin: 2px 0 0 0;
            font-size: 14px;
            font-weight: 300;
            display: none;
        }

        .active img {
            transform: scale(1.2);
        }

        .active p {
            color: white;
            font-weight: 700;
            display: block;
        }

        .icon-container:not(.active) img {
            transform: scale(1);
        }

        #content {
            flex: 1;
            display: none;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 24px;
            text-align: center;
        }
    </style>
</head>
<body>
    <div id="score-container">
        <img src="tortles.png" alt="Tortles" style="width: 50px; height: 50px;">
        <div id="score-content">
            <span id="userScore">0</span>
            <span style="margin-left: 10px;">tortles</span>
        </div>
    </div>

    <div id="bottom-bar">
        <div class="icon-container active" id="icon1">
            <img src="image1.png" alt="Home" id="icon1Img">
            <p>Home</p>
        </div>
        <div class="icon-container" id="icon2">
            <img src="image3.png" alt="Leaderboard" id="icon2Img">
            <p>Lig</p>
        </div>
        <div class="icon-container" id="icon3">
            <img src="image2.png" alt="Friend" id="icon3Img">
            <p>Friend</p>
        </div>
    </div>

    <script>
        const icon1 = document.getElementById('icon1');
        const icon2 = document.getElementById('icon2');
        const icon3 = document.getElementById('icon3');
        const scoreElement = document.getElementById('userScore');

        // دریافت امتیاز از localStorage یا تنظیم آن به 0 اگر موجود نباشد
        let score = parseInt(localStorage.getItem('score')) || 0;
        scoreElement.textContent = score;

        function showContent(contentId) {
            document.getElementById('homeContent').style.display = 'none';
            document.getElementById('comingSoon').style.display = 'none';

            if (contentId === 'home') {
                document.getElementById('homeContent').style.display = 'block';
            } else {
                document.getElementById('comingSoon').style.display = 'block';
            }
        }

        function activateIcon(icon, newImageSrc, contentId) {
            document.querySelectorAll('.icon-container').forEach(el => {
                el.classList.remove('active');
                const img = el.querySelector('img');
                if (el.id === 'icon1') {
                    img.src = 'image11.png';
                } else if (el.id === 'icon2') {
                    img.src = 'image3.png';
                } else if (el.id === 'icon3') {
                    img.src = 'image2.png';
                }
                el.querySelector('p').style.display = 'none';
            });

            icon.classList.add('active');
            icon.querySelector('img').src = newImageSrc;
            icon.querySelector('p').style.display = 'block';
            showContent(contentId);
        }

        icon1.addEventListener('click', () => {
            activateIcon(icon1, 'image1.png', 'home');
            scoreElement.textContent = score;
        });

        icon2.addEventListener('click', () => {
            activateIcon(icon2, 'image22.png', 'comingSoon');
            scoreElement.textContent = score;
        });

        icon3.addEventListener('click', () => {
            activateIcon(icon3, 'image33.png', 'comingSoon');
            scoreElement.textContent = score;
        });

        showContent('home');
    </script>
</body>
</html>
