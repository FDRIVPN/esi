<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Coin Game</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: black;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            height: 100vh;
        }
        #coin {
            width: 350px;
            height: 350px;
            cursor: pointer;
        }
        #scoreContainer {
            position: absolute;
            top: 20px;
            left: 20px;
            display: flex;
            align-items: center;
        }
        #scoreImg {
            width: 50px;
            height: 50px;
            margin-right: 10px;
        }
        #score {
            font-size: 30px;
            color: white;
            font-family: sans-serif;
        }
    </style>
</head>
<body>

<div id="scoreContainer">
    <img id="scoreImg" src="Coin_6.png" alt="Coin Image for Score"> <!-- تصویر سکه -->
    <div id="score">0</div> <!-- نمایش امتیاز کاربر -->
</div>

<img id="coin" src="ggg.png" alt="Coin">

<script>
    const coinElement = document.getElementById('coin');
    const scoreElement = document.getElementById('score');
    let score = parseInt(localStorage.getItem('score')) || 0;

    // به‌روزرسانی امتیاز
    function updateScore() {
        score++;
        localStorage.setItem('score', score);
        scoreElement.textContent = score; // به‌روزرسانی نمایش امتیاز
    }

    // نمایش امتیاز اولیه
    scoreElement.textContent = score;

    // رویداد کلیک روی سکه
    coinElement.addEventListener('click', updateScore);
</script>

</body>
</html>
