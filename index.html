<!DOCTYPE html>
<html lang="fa">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Coin Game</title>
    <style>
        html, body {
            background-color: black;
            margin: 0;
            font-family: Arial, sans-serif;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: flex-start;
            align-items: center;
            overflow-y: auto; /* امکان اسکرول کردن به پایین */
        }

        #score-container {
            position: relative;
            top: 20px;
            color: white;
            font-size: 32px; /* کوچک‌تر کردن متن امتیاز */
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
        }

        #score-content {
            display: flex;
            align-items: center;
            justify-content: center;
            margin-top: 10px;
        }

        #score-content img {
            width: 150px; /* بزرگ‌تر کردن تصویر تورتلس */
            height: 150px;
            margin-right: 10px;
        }

        #task-container {
            display: flex;
            flex-direction: column;
            align-items: flex-start; /* متن Task و امتیاز به سمت چپ */
        }

        #task-container span {
            font-size: 32px; /* اندازه متن امتیاز و Task برابر */
        }

        #task-container hr {
            width: 100%; /* خط زیر Task */
            margin-top: 5px;
            border: 1px solid white;
        }

        #task-container p {
            margin-top: 5px;
            font-size: 18px; /* اندازه متن Telegram */
        }

        #bottom-bar {
            position: fixed;
            bottom: 0;
            width: 100%;
            height: 70px;
            background-color: #1a1a1a;
            display: flex;
            justify-content: space-around;
            align-items: center;
        }

        .icon-container {
            text-align: center;
            cursor: pointer;
            transition: color 0.3s, font-weight 0.3s;
        }

        .icon-container img {
            width: 20px;
            height: 20px;
        }

        .icon-container p {
            margin: 2px 0 0 0;
            font-size: 14px;
            font-weight: 300;
            display: none;
        }

        .active img {
            transform: scale(1.2);
        }

        .active p {
            color: white;
            font-weight: 700;
            display: block;
        }

        .icon-container:not(.active) img {
            transform: scale(1);
        }

        #content {
            flex: 1;
            display: none;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 24px;
            text-align: center;
        }
    </style>
</head>
<body>
    <div id="score-container">
        <img src="tortles.png" alt="Tortles">
        <div id="score-content">
            <div id="task-container">
                <span>Task</span>
                <hr>
                <p>Telegram</p>
            </div>
            <span id="userScore">0</span>
        </div>
    </div>

    <div id="bottom-bar">
        <div class="icon-container active" id="icon1">
            <img src="image1.png" alt="Home" id="icon1Img">
            <p>Home</p>
        </div>
        <div class="icon-container" id="icon2">
            <img src="image3.png" alt="Leaderboard" id="icon2Img">
            <p>Leaderboard</p>
        </div>
        <div class="icon-container" id="icon3">
            <img src="image2.png" alt="Friend" id="icon3Img">
            <p>Friend</p>
        </div>
    </div>

    <script>
        const icon1 = document.getElementById('icon1');
        const icon2 = document.getElementById('icon2');
        const icon3 = document.getElementById('icon3');
        const scoreElement = document.getElementById('userScore');

        let score = parseInt(localStorage.getItem('score')) || 0;
        scoreElement.textContent = score;

        function showContent(contentId) {
            document.getElementById('homeContent').style.display = 'none';
            document.getElementById('comingSoon').style.display = 'none';

            if (contentId === 'home') {
                document.getElementById('homeContent').style.display = 'block';
            } else {
                document.getElementById('comingSoon').style.display = 'block';
            }
        }

        function activateIcon(icon, newImageSrc, contentId) {
            document.querySelectorAll('.icon-container').forEach(el => {
                el.classList.remove('active');
                const img = el.querySelector('img');
                if (el.id === 'icon1') {
                    img.src = 'image11.png';
                } else if (el.id === 'icon2') {
                    img.src = 'image3.png';
                } else if (el.id === 'icon3') {
                    img.src = 'image2.png';
                }
                el.querySelector('p').style.display = 'none';
            });

            icon.classList.add('active');
            icon.querySelector('img').src = newImageSrc;
            icon.querySelector('p').style.display = 'block';
            showContent(contentId);
        }

        icon1.addEventListener('click', () => {
            activateIcon(icon1, 'image1.png', 'home');
            scoreElement.textContent = score;
        });

        icon2.addEventListener('click', () => {
            activateIcon(icon2, 'image22.png', 'comingSoon');
            scoreElement.textContent = score;
        });

        icon3.addEventListener('click', () => {
            activateIcon(icon3, 'image33.png', 'comingSoon');
            scoreElement.textContent = score;
        });

        showContent('home');
    </script>
</body>
</html>
