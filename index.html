<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Coin Game</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: black;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            height: 100vh;
            background-image: url('background.png'); /* پس‌زمینه */
            background-size: cover;
        }
        #coin {
            width: 350px;
            height: 350px;
            cursor: pointer;
            position: relative;
        }
        #scoreContainer {
            display: flex;
            align-items: center;
            justify-content: center;
            position: absolute;
            top: -60px; /* امتیاز به بالای سکه چسبیده باشد */
        }
        #scoreImg {
            width: 50px;
            height: 50px;
            margin-right: 10px;
        }
        #score {
            font-size: 40px;
            color: white;
            font-family: sans-serif;
        }
        .plusOne {
            position: absolute;
            font-size: 30px;
            color: white;
            animation: fadeOut 1s forwards;
        }
        @keyframes fadeOut {
            0% {
                opacity: 1;
                transform: translateY(0);
            }
            100% {
                opacity: 0;
                transform: translateY(-30px); /* حرکت به بالا */
            }
        }
    </style>
</head>
<body>

<div id="scoreContainer">
    <img id="scoreImg" src="Coin_6.png" alt="Coin Image for Score"> <!-- تصویر سکه امتیاز -->
    <div id="score">0</div> <!-- نمایش امتیاز کاربر -->
</div>

<img id="coin" src="ggg.png" alt="Coin"> <!-- تصویر اصلی سکه -->

<script>
    const coinElement = document.getElementById('coin');
    const scoreElement = document.getElementById('score');
    let score = parseInt(localStorage.getItem('score')) || 0;

    // به‌روزرسانی امتیاز
    function updateScore() {
        score++;
        localStorage.setItem('score', score);
        scoreElement.textContent = score;
    }

    // نمایش امتیاز اولیه
    scoreElement.textContent = score;

    // نمایش +1 در محل کلیک
    function showPlusOne(x, y) {
        const plusOne = document.createElement('div');
        plusOne.textContent = '+1';
        plusOne.classList.add('plusOne');
        plusOne.style.left = `${x}px`;
        plusOne.style.top = `${y}px`;
        document.body.appendChild(plusOne);

        setTimeout(() => {
            plusOne.remove(); // حذف +1 بعد از 1 ثانیه
        }, 1000);
    }

    // رویداد کلیک روی سکه
    coinElement.addEventListener('click', function(event) {
        updateScore();

        // نمایش +1 در محل کلیک
        const rect = coinElement.getBoundingClientRect();
        const clickX = event.clientX;
        const clickY = event.clientY;
        showPlusOne(clickX, clickY);
    });
</script>

</body>
</html>
