<!DOCTYPE html>
<html lang="fa">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>بازی گردونه</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;
            direction: rtl;
            text-align: center;
            background-color: #f4f4f4;
        }

        .header {
            background-color: black;
            color: white;
            padding: 15px 0;
            font-size: 20px;
            font-weight: bold;
        }

        .input-section {
            margin: 30px auto;
            padding: 20px;
            width: 300px;
            background-color: lightgray;
            border-radius: 20px;
        }

        .input-section input {
            width: 80%;
            padding: 10px;
            margin-bottom: 10px;
            border: none;
            border-radius: 20px;
            text-align: center;
            outline: none;
        }

        .input-section button {
            width: 50%;
            padding: 10px;
            border: none;
            border-radius: 20px;
            background-color: green;
            color: white;
            font-weight: bold;
            cursor: pointer;
        }

        #game-page {
            display: none;
            position: relative;
        }

        .oval {
            position: absolute;
            width: 120px;
            height: 60px;
            background-color: lightgray;
            border-radius: 50%;
            line-height: 60px;
            font-weight: bold;
            text-align: center;
        }

        .oval.left {
            top: 20px;
            left: 20px;
        }

        .oval.right {
            top: 20px;
            right: 20px;
            cursor: pointer;
        }

        .wheel-container {
            position: relative;
            margin: 50px auto;
            width: 300px;
            height: 300px;
        }

        .wheel {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            border: 5px solid #ccc;
            position: relative;
            background: conic-gradient(
                #ffcccb 0deg 45deg,
                #d4f7d4 45deg 90deg,
                #ffffcc 90deg 135deg,
                #cce5ff 135deg 180deg,
                #ffcccc 180deg 225deg,
                #e6ccff 225deg 270deg,
                #ffebcc 270deg 315deg,
                #cce5cc 315deg 360deg
            );
            transform: rotate(0deg);
            transition: transform 3s ease-out;
        }

        .pointer {
            width: 0;
            height: 0;
            border-left: 15px solid transparent;
            border-right: 15px solid transparent;
            border-bottom: 30px solid red;
            position: absolute;
            top: -20px;
            left: 50%;
            transform: translateX(-50%);
        }

        .spin-button {
            margin-top: 20px;
            padding: 10px 20px;
            border: none;
            border-radius: 20px;
            background-color: blue;
            color: white;
            font-weight: bold;
            cursor: pointer;
        }

        .result {
            margin-top: 20px;
            font-size: 18px;
            font-weight: bold;
        }

        .prizes-list {
            display: none;
            background-color: white;
            margin-top: 20px;
            padding: 20px;
            border-radius: 10px;
            border: 1px solid lightgray;
            text-align: center;
        }
    </style>
</head>
<body>
    <div class="header">بازی گردونه</div>

    <div class="input-section" id="login-page">
        <input type="text" id="username" placeholder="شناسه خود را وارد کنید">
        <button onclick="startGame()">تایید</button>
    </div>

    <div id="game-page">
        <div class="oval left" id="user-info"></div>
        <div class="oval right" onclick="showPrizes()">جوایز</div>

        <div class="wheel-container">
            <div class="pointer"></div>
            <div class="wheel" id="wheel"></div>
        </div>

        <button class="spin-button" id="spin-btn" onclick="spinWheel()">چرخاندن</button>
        <div class="result" id="result"></div>

        <div class="prizes-list" id="prizes-list">
            <h3>جوایز شما</h3>
            <div id="prizes"></div>
        </div>
    </div>

    <script>
        let prizes = [];
        let spinning = false;

        function startGame() {
            const username = document.getElementById("username").value;
            if (username.trim() !== "") {
                document.getElementById("login-page").style.display = "none";
                document.getElementById("game-page").style.display = "block";
                document.getElementById("user-info").textContent = username;
            } else {
                alert("لطفاً شناسه خود را وارد کنید!");
            }
        }

        function spinWheel() {
            if (spinning) return;
            spinning = true;

            const spinBtn = document.getElementById("spin-btn");
            const wheel = document.getElementById("wheel");
            const result = document.getElementById("result");
            result.textContent = "";

            spinBtn.disabled = true;

            const randomSpin = Math.floor(Math.random() * 8) * 45 + 3600; // چرخش تصادفی
            wheel.style.transform = `rotate(${randomSpin}deg)`;

            setTimeout(() => {
                const finalAngle = randomSpin % 360;
                const prizeValues = [30, 60, 90, 120, 150, 180, 210, 240];
                const prizeIndex = Math.floor(finalAngle / 45);
                const prize = prizeValues[prizeIndex];

                result.textContent = `شما ${prize} سکه بردید!`;
                prizes.push({ value: prize, date: new Date().toLocaleDateString("fa-IR") });

                spinBtn.disabled = false;
                spinning = false;
            }, 3000);
        }

        function showPrizes() {
            const prizeList = document.getElementById("prizes");
            prizeList.innerHTML = prizes
                .map((p) => `<p>سکه: ${p.value} - تاریخ: ${p.date}</p>`)
                .join("");
            document.getElementById("prizes-list").style.display = "block";
        }
    </script>
</body>
</html>
