<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Coin Game</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-image: url('./background.png'); /* تصویر پس‌زمینه اصلی */
            background-size: cover;
            background-position: center;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            position: relative;
            user-select: none; /* جلوگیری از انتخاب متن */
            touch-action: manipulation; /* جلوگیری از رفتار پیش‌فرض لمس */
        }
        #coin {
            width: 350px; /* اندازه سکه */
            height: 350px;
            position: absolute; /* برای تعیین موقعیت دقیق */
            top: 50%; /* قرار دادن در مرکز عمودی */
            left: 50%; /* قرار دادن در مرکز افقی */
            transform: translate(-50%, -50%); /* جابجایی برای مرکز */
            touch-action: none; /* جلوگیری از رفتار پیش‌فرض لمس */
        }
        #score {
            position: absolute;
            top: 20px;
            left: 20px;
            font-size: 30px;
            color: white;
            font-family: sans-serif;
        }
        .plus-one {
            position: absolute;
            font-size: 30px;
            color: white;
            animation: fadeOut 1s forwards;
        }
        @keyframes fadeOut {
            0% {
                opacity: 1;
                transform: translateY(0);
            }
            100% {
                opacity: 0;
                transform: translateY(-50px);
            }
        }
    </style>
</head>
<body>

<div id="score">0</div>
<img id="coin" src="ggg.png" alt="Coin">

<script>
    const scoreElement = document.getElementById('score');
    const coinElement = document.getElementById('coin');
    let score = parseInt(localStorage.getItem('score')) || 0;

    // به‌روزرسانی امتیاز
    function updateScore() {
        score++;
        localStorage.setItem('score', score); // ذخیره امتیاز در localStorage
        scoreElement.textContent = `Score: ${score}`; // به‌روز رسانی نمایش امتیاز

        // نمایش +1 در محل کلیک
        const plusOneElement = document.createElement('div');
        plusOneElement.className = 'plus-one';
        plusOneElement.textContent = '+1';
        document.body.appendChild(plusOneElement);
        const rect = coinElement.getBoundingClientRect();
        plusOneElement.style.left = `${rect.left + rect.width / 2}px`;
        plusOneElement.style.top = `${rect.top + rect.height / 2}px`;
        setTimeout(() => {
            plusOneElement.remove(); // حذف عنصر پس از یک ثانیه
        }, 1000);
    }

    // رویداد کلیک روی سکه
    coinElement.addEventListener('click', updateScore);

    // نمایش امتیاز اولیه
    scoreElement.textContent = `Score: ${score}`;
</script>

</body>
</html>
