<!DOCTYPE html>
<html lang="fa">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Coin Game</title>
    <style>
        body {
            background-color: white; /* پس‌زمینه سفید */
            margin: 0;
            font-family: Arial, sans-serif;
        }
        #score {
            display: block;
            position: absolute;
            top: 10px;
            left: 10px;
            font-size: 24px;
            color: black;
        }
        #coin {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 20px;
            background: url('ggg.png') no-repeat center center;
            background-size: contain;
            width: 100px;
            height: 100px;
            cursor: pointer;
        }
        .images-container {
            position: absolute;
            bottom: 150px; /* فاصله 150 پیکسل از پایین */
            left: 50%;
            transform: translateX(-50%);
        }
        .images-container img {
            margin: 10px; /* فاصله بین تصاویر */
            width: 100px;
        }
    </style>
</head>
<body>
    <div id="score">امتیاز: <span id="userScore">0</span></div>
    <div id="coin"></div>

    <div class="images-container">
        <img src="image1.png" alt="Image 1">
        <img src="image2.png" alt="Image 2">
        <img src="image3.png" alt="Image 3">
    </div>

    <script>
        const scoreElement = document.getElementById('userScore');
        const coinElement = document.getElementById('coin');
        
        // دریافت امتیاز از localStorage یا تنظیم آن به 0 اگر موجود نباشد
        let score = parseInt(localStorage.getItem('score')) || 0;
        scoreElement.textContent = score;

        // وقتی روی سکه کلیک می‌شود، امتیاز افزایش پیدا می‌کند
        coinElement.addEventListener('click', () => {
            score++;
            localStorage.setItem('score', score); // ذخیره امتیاز در localStorage
            scoreElement.textContent = score;
        });
    </script>
</body>
</html>
