<!DOCTYPE html>
<html lang="fa">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>بازی گردونه</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, sans-serif;
            direction: rtl;
            background-color: #f4f4f4;
            text-align: center;
            overflow: hidden;
            position: relative;
            height: 100vh;
        }

        .center-box {
            width: 300px;
            margin: auto;
            background-color: lightgray;
            border-radius: 10px;
            padding: 20px;
            margin-top: 20%;
        }

        input[type="text"] {
            width: 90%;
            height: 40px;
            border-radius: 20px;
            border: 1px solid #ccc;
            text-align: center;
            font-size: 16px;
            margin-bottom: 20px;
        }

        button {
            width: 90%;
            height: 40px;
            border-radius: 20px;
            border: none;
            background-color: green;
            color: white;
            font-size: 18px;
            cursor: pointer;
        }

        .header {
            width: 100%;
            padding: 15px;
            background-color: lightgray;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .header .left,
        .header .right {
            width: 120px;
            height: 40px;
            line-height: 40px;
            background-color: lightgray;
            border-radius: 20px;
            text-align: center;
            font-weight: bold;
        }

        .hidden {
            display: none;
        }

        .prizes-box {
            margin: 20px auto;
            background-color: lightgray;
            padding: 20px;
            border-radius: 10px;
            width: 300px;
        }

        .back-button {
            margin-top: 20px;
            width: 300px;
            height: 40px;
            background-color: blue;
            color: white;
            border: none;
            border-radius: 20px;
            font-size: 18px;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <!-- صفحه ورود شناسه -->
    <div id="login-page">
        <div class="center-box">
            <input type="text" id="user-id" placeholder="شناسه" maxlength="20">
            <button onclick="saveUserId()">تایید</button>
        </div>
    </div>

    <!-- صفحه گردونه -->
    <div id="wheel-page" class="hidden">
        <div class="header">
            <div class="left" id="user-display"></div>
            <div class="right" onclick="showPrizes()">جوایز</div>
        </div>

        <div class="wheel-container">
            <div class="pointer"></div>
            <div class="wheel" id="wheel"></div>
        </div>

        <button class="spin-button" id="spin-btn" onclick="spinWheel()">چرخاندن</button>
        <div class="result" id="result"></div>
    </div>

    <!-- صفحه جوایز -->
    <div id="prizes-page" class="hidden">
        <div class="header">صفحه جوایز</div>
        <div id="prizes-container"></div>
        <button class="back-button" onclick="backToWheel()">بازگشت</button>
    </div>

    <script>
        // مقداردهی اولیه
        const userIdInput = document.getElementById('user-id');
        const wheelPage = document.getElementById('wheel-page');
        const loginPage = document.getElementById('login-page');
        const prizesPage = document.getElementById('prizes-page');
        const userDisplay = document.getElementById('user-display');
        const prizesContainer = document.getElementById('prizes-container');

        const wheel = document.getElementById('wheel');
        const result = document.getElementById('result');
        let spinning = false;

        const prizeChances = [
            { angle: 360, prize: 30, chance: 35 },
            { angle: 60, prize: 60, chance: 35 },
            { angle: 120, prize: 90, chance: 20 },
            { angle: 180, prize: 120, chance: 10 },
            { angle: 240, prize: 150, chance: 10 },
            { angle: 300, prize: 180, chance: 10 },
        ];

        // ذخیره شناسه و نمایش صفحه گردونه
        function saveUserId() {
            const userId = userIdInput.value.trim();
            if (userId) {
                localStorage.setItem('userId', userId);
                loginPage.classList.add('hidden');
                wheelPage.classList.remove('hidden');
                userDisplay.textContent = userId;
            }
        }

        // گردونه را بچرخانید
        function spinWheel() {
            if (spinning) return;
            spinning = true;

            const spinBtn = document.getElementById("spin-btn");
            result.textContent = "";

            spinBtn.disabled = true;

            const selectedPrize = selectPrize();
            const randomSpin = selectedPrize.angle + 3600; // اضافه کردن چند دور کامل
            wheel.style.transform = `rotate(${randomSpin}deg)`;

            setTimeout(() => {
                result.textContent = `شما ${selectedPrize.prize} سکه بردید!`;
                savePrize(selectedPrize.prize);
                spinBtn.disabled = false;
                spinning = false;
            }, 3000);
        }

        // انتخاب جایزه بر اساس شانس
        function selectPrize() {
            const random = Math.random() * 100;
            let cumulativeChance = 0;

            for (const prize of prizeChances) {
                cumulativeChance += prize.chance;
                if (random <= cumulativeChance) {
                    return prize;
                }
            }

            return prizeChances[0];
        }

        // ذخیره جایزه
        function savePrize(prize) {
            const prizes = JSON.parse(localStorage.getItem('prizes') || '[]');
            const date = new Date().toLocaleDateString('fa-IR');
            prizes.push({ prize, date });
            localStorage.setItem('prizes', JSON.stringify(prizes));
        }

        // نمایش جوایز
        function showPrizes() {
            wheelPage.classList.add('hidden');
            prizesPage.classList.remove('hidden');

            const prizes = JSON.parse(localStorage.getItem('prizes') || '[]');
            prizesContainer.innerHTML = prizes.length
                ? prizes.map(p => `<div class="prizes-box">سکه: ${p.prize}<br>تاریخ: ${p.date}</div>`).join('')
                : '<p>شما هنوز جایزه‌ای دریافت نکرده‌اید.</p>';
        }

        // بازگشت به گردونه
        function backToWheel() {
            prizesPage.classList.add('hidden');
            wheelPage.classList.remove('hidden');
        }
    </script>
</body>
</html>
