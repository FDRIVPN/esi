<!DOCTYPE html>
<html lang="fa">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>بازی گردونه</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
            direction: rtl;
            text-align: center;
            overflow: hidden;
            position: relative;
            height: 100vh;
        }

        .header {
            background-color: black;
            color: white;
            padding: 15px 0;
            font-size: 20px;
            font-weight: bold;
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        .oval {
            position: absolute;
            width: 120px;
            height: 50px;
            background-color: lightgray;
            border-radius: 25px;
            line-height: 50px;
            font-weight: bold;
            text-align: center;
        }

        .oval.left {
            top: 20px;
            left: 20px;
        }

        .oval.right {
            top: 20px;
            right: 20px;
            cursor: pointer;
        }

        .wheel-container {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 300px;
            height: 300px;
        }

        .wheel {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            border: 5px solid #ccc;
            position: relative;
            background: conic-gradient(
                #ffcccb 0deg 45deg,
                #d4f7d4 45deg 90deg,
                #ffffcc 90deg 135deg,
                #cce5ff 135deg 180deg,
                #ffcccc 180deg 225deg,
                #e6ccff 225deg 270deg,
                #ffebcc 270deg 315deg,
                #cce5cc 315deg 360deg
            );
            transform: rotate(0deg);
            transition: transform 3s ease-out;
        }

        .wheel span {
            position: absolute;
            width: 100px;
            height: 30px;
            background-color: rgba(255, 255, 255, 0.7);
            line-height: 30px;
            border-radius: 5px;
            text-align: center;
            font-weight: bold;
            transform-origin: center 150px;
        }

        .pointer {
            width: 0;
            height: 0;
            border-left: 15px solid transparent;
            border-right: 15px solid transparent;
            border-bottom: 30px solid red;
            position: absolute;
            top: -40px;
            left: 50%;
            transform: translateX(-50%);
        }

        .spin-button {
            position: absolute;
            top: 70%;
            left: 50%;
            transform: translateX(-50%);
            width: 150px;
            height: 50px;
            border-radius: 25px;
            background-color: blue;
            color: white;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            border: none;
        }

        .result {
            margin-top: 20px;
            font-size: 18px;
            font-weight: bold;
        }

        .prizes-list {
            display: none;
            background-color: white;
            margin-top: 20px;
            padding: 20px;
            border-radius: 10px;
            border: 1px solid lightgray;
            text-align: center;
        }
    </style>
</head>
<body>
    <div class="header">بازی گردونه</div>

    <div class="oval left" id="user-info">کاربر</div>
    <div class="oval right" onclick="showPrizes()">جوایز</div>

    <div class="wheel-container">
        <div class="pointer"></div>
        <div class="wheel" id="wheel">
            <!-- اعداد گردونه -->
            <span style="transform: rotate(22.5deg);">30</span>
            <span style="transform: rotate(67.5deg);">60</span>
            <span style="transform: rotate(112.5deg);">90</span>
            <span style="transform: rotate(157.5deg);">120</span>
            <span style="transform: rotate(202.5deg);">150</span>
            <span style="transform: rotate(247.5deg);">180</span>
            <span style="transform: rotate(292.5deg);">210</span>
            <span style="transform: rotate(337.5deg);">240</span>
        </div>
    </div>

    <button class="spin-button" id="spin-btn" onclick="spinWheel()">چرخاندن</button>

    <div class="result" id="result"></div>

    <div class="prizes-list" id="prizes-list">
        <h3>جوایز شما</h3>
        <div id="prizes"></div>
    </div>

    <script>
        let prizes = [];
        let spinning = false;

        function spinWheel() {
            if (spinning) return;
            spinning = true;

            const spinBtn = document.getElementById("spin-btn");
            const wheel = document.getElementById("wheel");
            const result = document.getElementById("result");
            result.textContent = "";

            spinBtn.disabled = true;

            const randomSpin = Math.floor(Math.random() * 8) * 45 + 3600; // چرخش تصادفی
            wheel.style.transform = `rotate(${randomSpin}deg)`;

            setTimeout(() => {
                const finalAngle = randomSpin % 360;
                const prizeValues = [30, 60, 90, 120, 150, 180, 210, 240];
                const prizeIndex = Math.floor(finalAngle / 45);
                const prize = prizeValues[prizeIndex];

                result.textContent = `شما ${prize} سکه بردید!`;
                prizes.push({ value: prize, date: new Date().toLocaleDateString("fa-IR") });

                spinBtn.disabled = false;
                spinning = false;
            }, 3000);
        }

        function showPrizes() {
            const prizeList = document.getElementById("prizes");
            prizeList.innerHTML = prizes
                .map((p) => `<p>سکه: ${p.value} - تاریخ: ${p.date}</p>`)
                .join("");
            document.getElementById("prizes-list").style.display = "block";
        }
    </script>
</body>
</html>
