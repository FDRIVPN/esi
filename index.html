<!DOCTYPE html>
<html lang="fa">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Coin Game</title>
    <style>
        body {
            background-image: url('background.png'); /* پس‌زمینه از تصویر PNG */
            background-size: cover; /* اندازه پس‌زمینه */
            margin: 0;
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh; /* ارتفاع کامل صفحه */
            position: relative; /* برای موقعیت‌یابی */
        }
        #coin {
            background: url('ggg.png') no-repeat center center; /* تصویر سکه */
            background-size: contain;
            width: 350px; /* عرض سکه */
            height: 350px; /* ارتفاع سکه */
        }
        #coinIcon {
            background: url('Coin_6.png') no-repeat center center; /* تصویر زیبایی */
            background-size: contain;
            width: 50px; /* عرض تصویر زیبایی */
            height: 50px; /* ارتفاع تصویر زیبایی */
            position: absolute; /* موقعیت‌گذاری مطلق */
            top: 10px; /* فاصله از بالا */
            left: 50%; /* تراز افقی در وسط */
            transform: translateX(-50%); /* تراز افقی مرکز */
        }
        #score-container {
            display: flex;
            flex-direction: column; /* نمایش به صورت ستونی */
            align-items: center; /* تراز عمودی محتویات */
            margin-top: 30px; /* فاصله 30 پیکسل از بالا */
        }
        #userScore {
            font-size: 48px; /* اندازه متن امتیاز */
            color: black; /* رنگ امتیاز */
            margin-top: 10px; /* فاصله 10 پیکسل از سکه */
        }
    </style>
</head>
<body>
    <div id="score-container">
        <div id="coin"></div>
        <div id="coinIcon"></div>
        <span id="userScore">0</span>
    </div>

    <script>
        const scoreElement = document.getElementById('userScore');
        const coinElement = document.getElementById('coin');
        
        // دریافت امتیاز از localStorage یا تنظیم آن به 0 اگر موجود نباشد
        let score = parseInt(localStorage.getItem('score')) || 0;
        scoreElement.textContent = score;

        // وقتی روی سکه کلیک می‌شود، امتیاز افزایش پیدا می‌کند
        coinElement.addEventListener('click', () => {
            score++;
            localStorage.setItem('score', score); // ذخیره امتیاز در localStorage
            scoreElement.textContent = score;
        });
    </script>
</body>
</html>
