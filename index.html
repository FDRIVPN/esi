<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Coin Game</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            height: 100vh;
        }
        /* سبک‌ها برای صفحه مدیر */
        body.manager {
            background-image: url('background.png');
            background-size: cover;
            color: white;
        }
        /* سبک‌ها برای صفحه کاربر عادی */
        body.user {
            background-color: white;
            color: black;
            font-size: 24px;
            text-align: center;
        }
        #coin {
            width: 350px;
            height: 350px;
            cursor: pointer;
        }
        #score {
            position: absolute;
            top: 20px;
            left: 20px;
            font-size: 30px;
            color: white;
            font-family: sans-serif;
        }
        #userInfo {
            position: absolute;
            top: 20px;
            right: 20px;
            font-size: 18px;
            color: white;
        }
        .hidden {
            display: none;
        }
    </style>
</head>
<body>

<div id="score"></div>
<img id="coin" src="ggg.png" alt="Coin" class="hidden">

<div id="userInfo" class="hidden">
    <h2>User Information</h2>
    <p id="userName"></p>
    <p id="userCoins"></p>
</div>

<script>
    const managerId = 765041693;
    const managerUsername = "@r_rasol_l";
    const currentUserId = 765041693; // این را باید با متد تلگرام دریافت کنید
    const currentUsername = "@r_rasol_l"; // این را باید با متد تلگرام دریافت کنید

    const scoreElement = document.getElementById('score');
    const coinElement = document.getElementById('coin');
    const userInfo = document.getElementById('userInfo');
    const userNameElement = document.getElementById('userName');
    const userCoinsElement = document.getElementById('userCoins');

    let score = parseInt(localStorage.getItem('score')) || 0;

    function updateScore() {
        score++;
        localStorage.setItem('score', score);
        scoreElement.textContent = `Score: ${score}`;
    }

    coinElement.addEventListener('click', updateScore);

    // بررسی مدیر بودن کاربر
    function checkIfManager() {
        if (currentUserId === managerId || currentUsername === managerUsername) {
            document.body.classList.add('manager');
            coinElement.classList.remove('hidden');
            scoreElement.textContent = `Score: ${score}`;

            // نمایش اطلاعات کاربران برای مدیر
            userInfo.classList.remove('hidden');
            userNameElement.textContent = "Username: " + currentUsername;
            userCoinsElement.textContent = "Coins: " + score;

        } else {
            // نمایش صفحه تعمیر برای کاربران عادی
            document.body.classList.add('user');
            document.body.innerHTML = "<p>Mini App is under maintenance</p>";
        }
    }

    checkIfManager();
</script>

</body>
</html>
